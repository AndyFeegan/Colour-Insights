<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colour Insights — 16 Type Multilingual</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --border:#d8e1ec;
      --ink:#0f172a;
      --ink2:#475569;
      --ink3:#64748b;
      --accent:#2563eb;
      --accent2:#1d4ed8;
      --red:#e05a47;
      --yellow:#d8a73c;
      --green:#2f8f6b;
      --blue:#2563eb;
      --redSoft:#fff1ee;
      --yellowSoft:#fff8e8;
      --greenSoft:#eef9f4;
      --blueSoft:#eef4ff;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(180deg,#f7fafc 0%,#f3f7fb 100%);
      color:var(--ink);
    }
    .page{
      max-width:940px;
      margin:0 auto;
      padding:20px 18px 64px;
    }
    .toolbar{
      display:flex;
      justify-content:flex-end;
      margin-bottom:18px;
    }
    .lang-wrap{
      background:rgba(255,255,255,0.96);
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      min-width:260px;
      box-shadow:0 8px 24px rgba(15,23,42,0.06);
    }
    .lang-label{
      display:block;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--ink3);
      margin-bottom:8px;
      font-weight:700;
    }
    select,input{
      width:100%;
      padding:12px 14px;
      border:1px solid #cbd5e1;
      border-radius:10px;
      font-size:15px;
      background:#fff;
      color:var(--ink);
    }
    .screen{display:none}
    .screen.active{display:block}
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:24px;
      margin-bottom:16px;
      box-shadow:0 10px 28px rgba(15,23,42,0.04);
    }
    .eyebrow{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:var(--accent);
      margin-bottom:12px;
      font-weight:700;
    }
    h1{
      font-size:40px;
      line-height:1.04;
      margin:0 0 14px;
    }
    h2{
      font-size:28px;
      line-height:1.2;
      margin:0 0 16px;
    }
    h3{
      font-size:18px;
      margin:0 0 12px;
    }
    p{
      line-height:1.75;
      color:var(--ink2);
      margin:0 0 14px;
    }
    .legend{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      margin:22px 0 26px;
    }
    .legend-item{
      display:flex;
      gap:12px;
      align-items:center;
      border:1px solid var(--border);
      border-radius:12px;
      padding:14px;
      background:#fff;
    }
    .swatch{
      width:8px;height:38px;border-radius:999px;flex-shrink:0;
    }
    .legend-title{
      font-size:13px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.05em;
      margin-bottom:4px;
    }
    .legend-sub{
      color:var(--ink3);
      font-size:13px;
    }
    .field-label{
      display:block;
      margin:0 0 8px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--ink3);
      font-weight:700;
    }
    button{
      border:none;
      border-radius:12px;
      padding:14px 20px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }
    .btn-primary{
      background:var(--accent);
      color:#fff;
    }
    .btn-secondary{
      background:#fff;
      color:var(--ink2);
      border:1px solid #cbd5e1;
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .progress-top{
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:center;
      margin-bottom:10px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:var(--ink3);
      font-weight:700;
    }
    .progress-track{
      height:8px;
      background:#e7eef7;
      border-radius:999px;
      overflow:hidden;
      margin-bottom:20px;
    }
    .progress-fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#3b82f6,#2563eb);
    }
    .qnum{
      margin-bottom:12px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.14em;
      color:var(--ink3);
      font-weight:700;
    }
    .options{
      display:grid;
      gap:10px;
    }
    .option{
      width:100%;
      text-align:left;
      padding:16px;
      border:1px solid var(--border);
      border-radius:14px;
      background:#fff;
      color:var(--ink2);
      font-weight:500;
    }
    .option:hover{
      border-color:#93c5fd;
      background:#f8fbff;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      font-weight:700;
      margin-bottom:10px;
    }
    .badge-dot{
      width:8px;height:8px;border-radius:50%;
      flex-shrink:0;
    }
    .bars{
      display:grid;
      gap:12px;
    }
    .bar-row{
      display:grid;
      grid-template-columns:160px 1fr 48px;
      gap:12px;
      align-items:center;
    }
    .bar-track{
      height:10px;
      background:#e2e8f0;
      border-radius:999px;
      overflow:hidden;
    }
    .bar-fill{
      height:100%;
      width:0%;
    }
    .list{
      margin:0;
      padding-left:18px;
      color:var(--ink2);
      line-height:1.85;
    }
    .grid-2{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
    }
    .rtl{
      direction:rtl;
      text-align:right;
    }
    .rtl .toolbar{justify-content:flex-start}
    .rtl .bar-row{grid-template-columns:48px 1fr 160px}
    .rtl .list{padding-left:0;padding-right:18px}
    @media (max-width:760px){
      .legend,.grid-2{grid-template-columns:1fr}
      .bar-row{grid-template-columns:1fr}
      .rtl .bar-row{grid-template-columns:1fr}
      h1{font-size:30px}
      h2{font-size:24px}
    }
  </style>
</head>

        <div class="legend">

              <div class="legend-sub" id="redTag"></div>

          <div class="legend-item">

            <div>

            </div>
          </div>
          <div class="legend-item">

            <div>
              <div class="legend-title" id="greenName"></div>
              <div class="legend-sub" id="greenTag"></div>
            </div>
          </div>
          <div class="legend-item">
            <div class="swatch" style="background:var(--blue)"></div>
            <div>
              <div class="legend-title" id="blueName"></div>
              <div class="legend-sub" id="blueTag"></div>
            </div>
          </div>
        </div>

        <label class="field-label" id="nameLabel" for="userName"></label>
        <input id="userName" type="text" />

        <div class="actions">
          <button class="btn-primary" onclick="startQuiz()" id="startBtn"></button>
        </div>
      </div>
    </div>

    <div id="quiz" class="screen">
      <div class="card">
        <div class="progress-top">
          <span id="progressLabel"></span>
          <span id="progressPct"></span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="qnum" id="questionNumber"></div>
        <h2 id="questionText"></h2>
        <div class="options" id="options"></div>
      </div>
    </div>

    <div id="report" class="screen">
      <div class="card">
        <div class="eyebrow" id="reportEyebrow"></div>
        <h1 id="reportName"></h1>
        <div class="badge" id="reportBadge">
          <span class="badge-dot" id="badgeDot"></span>
          <span id="reportType"></span>
        </div>
        <p id="reportTagline"></p>
      </div>

      <div class="card">
        <h3 id="breakdownTitle"></h3>
        <div class="bars">
          <div class="bar-row">
            <div id="labelR"></div>
            <div class="bar-track"><div id="barR" class="bar-fill" style="background:var(--red)"></div></div>
            <div id="pctR"></div>
          </div>
          <div class="bar-row">
            <div id="labelY"></div>
            <div class="bar-track"><div id="barY" class="bar-fill" style="background:var(--yellow)"></div></div>
            <div id="pctY"></div>
          </div>
          <div class="bar-row">
            <div id="labelG"></div>
            <div class="bar-track"><div id="barG" class="bar-fill" style="background:var(--green)"></div></div>
            <div id="pctG"></div>
          </div>
          <div class="bar-row">
            <div id="labelB"></div>
            <div class="bar-track"><div id="barB" class="bar-fill" style="background:var(--blue)"></div></div>
            <div id="pctB"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3 id="overviewTitle"></h3>
        <p id="overviewText"></p>
      </div>

      <div class="card">
        <h3 id="communicationTitle"></h3>
        <p id="communicationText"></p>
      </div>

      <div class="grid-2">
        <div class="card">
          <h3 id="strengthsTitle"></h3>
          <ul class="list" id="strengthsList"></ul>
        </div>
        <div class="card">
          <h3 id="tipsTitle"></h3>
          <ul class="list" id="tipsList"></ul>
        </div>
      </div>

      <div class="card">
        <div class="actions">
          <button class="btn-secondary" onclick="restart()" id="restartBtn"></button>
        </div>
      </div>
    </div>
  </div>

          B: "Your secondary Blue energy adds structure, precision, and a stronger drive to get things right as well as get them done."
        },
        strengths: {
          RR:["Moves quickly to decisions","Sets direction clearly","Thrives with ownership"],
          RY:["Creates momentum fast","Combines drive with visibility","Persuades people into action"],
          RG:["Balances challenge with care","Builds trust while moving forward","Leads firmly without losing people"],
          RB:["Combines action with rigour","Makes sharp decisions","Focuses on both speed and quality"],
          YR:["Inspires and mobilises quickly","Brings optimism with ambition","Raises energy around goals"],
          YY:["Builds excitement naturally","Connects with people easily","Keeps energy high"],
          YG:["Creates warm, inclusive energy","Builds rapport quickly","Encourages people naturally"],
          YB:["Connects ideas creatively","Explains things in engaging ways","Balances curiosity with thoughtfulness"],
          GR:["Supports people while staying firm","Builds commitment through trust","Handles sensitive situations with strength"],
          GY:["Creates belonging and warmth","Lifts people gently","Keeps morale steady and positive"],
          GG:["Builds deep trust","Offers reliable support","Creates steadiness and calm"],
          GB:["Balances care with precision","Thinks carefully about impact","Builds dependable judgement"],
          BR:["Holds high standards","Acts with logic and authority","Brings discipline to decisions"],
          BY:["Combines depth with imagination","Brings fresh perspective","Makes complex ideas accessible"],
          BG:["Thinks carefully and acts responsibly","Brings calm judgement","Protects quality and people"],
          BB:["Analyses deeply","Protects standards","Brings consistency and accuracy"]
        },
        tips: {
          RR:["Be concise and direct","Focus on results and timelines","Give autonomy with clear targets"],
          RY:["Bring energy and pace","Connect work to visible wins","Avoid overloading with process"],
          RG:["Be honest and respectful","Show how outcomes help people","Balance clarity with support"],
          RB:["Arrive prepared","Use evidence and clear recommendations","Respect time and standards"],
          YR:["Make it feel exciting","Link work to impact and momentum","Give room for visibility and initiative"],
          YY:["Keep things positive and interactive","Recognise contributions openly","Avoid overly rigid structure"],
          YG:["Be warm and inclusive","Show genuine interest","Make collaboration feel safe and meaningful"],
          YB:["Engage curiosity","Mix inspiration with logic","Give space to think and explore"],
          GR:["Build trust first","Be clear without being cold","Show purpose as well as expectations"],
          GY:["Lead with kindness","Acknowledge effort and people impact","Avoid overly harsh delivery"],
          GG:["Be patient and genuine","Give feedback carefully","Create stability and trust"],
          GB:["Be thoughtful and prepared","Use written clarity when useful","Show both logic and human impact"],
          BR:["Be precise and well prepared","Come with evidence","Keep discussions efficient"],
          BY:["Bring interesting ideas","Allow exploration before closure","Back creativity with rationale"],
          BG:["Respect thought time","Be calm and clear","Show how decisions affect people and quality"],
          BB:["Be specific and organised","Use facts over emotion","Give time to process before deciding"]
        }
      }
    };

    function translateProfile(lang, type, name) {
      const fallback = profileTexts.en;
      const labels = colourLabels[lang] || colourLabels.en;
      const texts = profileTexts.en;
      const primary = type[0];
      const secondary = type[1];
      const tagline = (pairTaglines[lang] || pairTaglines.en)[type];
      const overview = texts.primary[primary].overview.replace("{name}", name) + " " + texts.secondary[secondary];
      const comm = texts.primary[primary].comm;
      const strengths = texts.strengths[type];
      const tips = texts.tips[type];
      return {tagline, overview, comm, strengths, tips, labels};
    }

    function t(key) {
      return (ui[currentLanguage] && ui[currentLanguage][key]) || ui.en[key] || key;
    }

    function fmt(str, vars) {
      return str.replace(/\{(\w+)\}/g, (_, k) => vars[k] ?? "");
    }

    function qFor(question) {
      return question[currentLanguage] || question.en;
    }

    const optionLetters = ["A","B","C","D"];
    let currentLanguage = localStorage.getItem("colourInsightsLang") || "en";
    let currentQuestion = 0;
    let answers = [];
    let participantName = "";

    function applyDirection() {
      const isRtl = RTL_LANGS.includes(currentLanguage);
      document.documentElement.lang = currentLanguage;
      document.documentElement.dir = isRtl ? "rtl" : "ltr";
      document.body.classList.toggle("rtl", isRtl);
    }

    function populateLanguageSelect() {
      const select = document.getElementById("languageSelect");
      select.innerHTML = Object.entries(languages)
        .map(([code, label]) => `<option value="${code}">${label}</option>`)
        .join("");
      if (!languages[currentLanguage]) currentLanguage = "en";
      select.value = currentLanguage;
      select.onchange = (e) => {
        currentLanguage = e.target.value;
        localStorage.setItem("colourInsightsLang", currentLanguage);
        renderApp();
      };
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      window.scrollTo({top:0,behavior:"smooth"});
    }

    function renderIntro() {
      const labels = colourLabels[currentLanguage] || colourLabels.en;
      document.getElementById("languageLabel").textContent = t("languageLabel");
      document.getElementById("introEyebrow").textContent = t("introEyebrow");
      document.getElementById("introTitle").textContent = t("introTitle");
      document.getElementById("introSubtitle").textContent = t("introSubtitle");
      document.getElementById("nameLabel").textContent = t("nameLabel");
      document.getElementById("userName").placeholder = t("namePlaceholder");
      document.getElementById("startBtn").textContent = t("startBtn");

      document.getElementById("redName").textContent = labels.R.name;
      document.getElementById("redTag").textContent = labels.R.tag;
      document.getElementById("yellowName").textContent = labels.Y.name;
      document.getElementById("yellowTag").textContent = labels.Y.tag;
      document.getElementById("greenName").textContent = labels.G.name;
      document.getElementById("greenTag").textContent = labels.G.tag;
      document.getElementById("blueName").textContent = labels.B.name;
      document.getElementById("blueTag").textContent = labels.B.tag;
    }

    function renderQuestion() {
      const q = questionBank[currentQuestion];
      const data = qFor(q);
      const total = questionBank.length;
      const pct = Math.round((currentQuestion / total) * 100);

      document.getElementById("progressLabel").textContent = fmt(t("questionOf"), {n: currentQuestion + 1, total});
      document.getElementById("progressPct").textContent = pct + "%";
      document.getElementById("progressFill").style.width = pct + "%";
      document.getElementById("questionNumber").textContent = fmt(t("qnum"), {n: String(currentQuestion + 1).padStart(2,"0"), total});
      document.getElementById("questionText").textContent = data.q;

      const options = document.getElementById("options");
      options.innerHTML = "";
      data.a.forEach((answerText, i) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.innerHTML = `<strong style="display:inline-block;width:28px">${optionLetters[i]}</strong> ${answerText}`;
        btn.onclick = () => {
          answers.push(q.c[i]);
          currentQuestion++;
          if (currentQuestion >= questionBank.length) {
            buildReport();
          } else {
            renderQuestion();
          }
        };
        options.appendChild(btn);
      });
    }

    function startQuiz() {
      participantName = document.getElementById("userName").value.trim() || t("participant");
      answers = [];
      currentQuestion = 0;
      showScreen("quiz");
      renderQuestion();
    }

    function computeScores() {
      const counts = {R:0,Y:0,G:0,B:0};
      answers.forEach(a => counts[a]++);
      const total = answers.length || 1;
      return {
        counts,
        pct: {
          R: Math.round(counts.R / total * 100),
          Y: Math.round(counts.Y / total * 100),
          G: Math.round(counts.G / total * 100),
          B: Math.round(counts.B / total * 100)
        }
      };
    }

    function buildReport() {
      const {counts, pct} = computeScores();
      const sorted = ["R","Y","G","B"].sort((a,b) => counts[b] - counts[a] || ["R","Y","G","B"].indexOf(a) - ["R","Y","G","B"].indexOf(b));
      const type = sorted[0] + sorted[1];
      const profile = translateProfile(currentLanguage, type, participantName);
      const labels = profile.labels;

      document.getElementById("reportEyebrow").textContent = t("reportEyebrow");
      document.getElementById("reportName").textContent = participantName;
      document.getElementById("reportType").textContent = labels[sorted[0]].name + " / " + labels[sorted[1]].name;
      document.getElementById("reportTagline").textContent = profile.tagline;

      const badge = document.getElementById("reportBadge");
      const dot = document.getElementById("badgeDot");
      dot.style.background = sorted[0] === "R" ? "var(--red)" : sorted[0] === "Y" ? "var(--yellow)" : sorted[0] === "G" ? "var(--green)" : "var(--blue)";
      if (sorted[0] === "R") { badge.style.background = "var(--redSoft)"; badge.style.color = "var(--red)"; }
      if (sorted[0] === "Y") { badge.style.background = "var(--yellowSoft)"; badge.style.color = "#946200"; }
      if (sorted[0] === "G") { badge.style.background = "var(--greenSoft)"; badge.style.color = "var(--green)"; }
      if (sorted[0] === "B") { badge.style.background = "var(--blueSoft)"; badge.style.color = "var(--blue)"; }

      document.getElementById("breakdownTitle").textContent = t("breakdownTitle");
      document.getElementById("overviewTitle").textContent = t("overviewTitle");
      document.getElementById("communicationTitle").textContent = t("communicationTitle");
      document.getElementById("strengthsTitle").textContent = t("strengthsTitle");
      document.getElementById("tipsTitle").textContent = t("tipsTitle");
      document.getElementById("restartBtn").textContent = t("restartBtn");

      document.getElementById("labelR").textContent = labels.R.name;
      document.getElementById("labelY").textContent = labels.Y.name;
      document.getElementById("labelG").textContent = labels.G.name;
      document.getElementById("labelB").textContent = labels.B.name;

      document.getElementById("pctR").textContent = pct.R + "%";
      document.getElementById("pctY").textContent = pct.Y + "%";
      document.getElementById("pctG").textContent = pct.G + "%";
      document.getElementById("pctB").textContent = pct.B + "%";

      document.getElementById("barR").style.width = pct.R + "%";
      document.getElementById("barY").style.width = pct.Y + "%";
      document.getElementById("barG").style.width = pct.G + "%";
      document.getElementById("barB").style.width = pct.B + "%";

      document.getElementById("overviewText").textContent = profile.overview;
      document.getElementById("communicationText").textContent = profile.comm;

      const strengthsList = document.getElementById("strengthsList");
      strengthsList.innerHTML = profile.strengths.map(item => `<li>${item}</li>`).join("");

      const tipsList = document.getElementById("tipsList");
      tipsList.innerHTML = profile.tips.map(item => `<li>${item}</li>`).join("");

      showScreen("report");
    }

    function restart() {
      showScreen("intro");
      renderIntro();
    }

    function renderApp() {
      applyDirection();
      populateLanguageSelect();
      renderIntro();

      const active = document.querySelector(".screen.active")?.id;
      if (active === "quiz") renderQuestion();
      if (active === "report") buildReport();
    }

    renderApp();
  </script>
</body>
</html>
