      { text: { en: "When a deeply important project gets aggressively cancelled without warning, you…", es: "Cuando un proyecto profundamente importante se cancela agresivamente sin previo aviso, tú…", fr: "Lorsqu'un projet profondément important est agressivement annulé sans avertissement, vous…", de: "Wenn ein zutiefst wichtiges Projekt ohne Vorwarnung aggressiv abgebrochen wird, Sie…", it: "Quando un progetto profondamente importante viene cancellato in modo aggressivo senza preavviso, tu…", pt: "Quando um projeto profundamente importante é agressivamente cancelado sem aviso prévio, você…", nl: "Als een zeer belangrijk project zonder waarschuwing agressief wordt geannuleerd, jij…", pl: "Kiedy bardzo ważny projekt zostaje agresywnie anulowany bez ostrzeżenia, ty…", tr: "Sizin için çok önemli bir proje uyarı yapılmadan agresif bir şekilde iptal edildiğinde, siz…", ar: "عندما يتم إلغاء مشروع مهم للغاية بقوة دون سابق إنذار، فإنك…" },
        options: [
          { c: 'R', text: { en: "Push back incredibly hard, demand answers, and pivot to the next goal instantly.", es: "Rechazas increíblemente fuerte, exiges respuestas y pasas al siguiente objetivo al instante.", fr: "Vous y opposez incroyablement fort, exigez des réponses et passez au prochain objectif instantanément.", de: "Sich unglaublich stark wehren, Antworten verlangen und sofort zum nächsten Ziel schwenken.", it: "Ti opponi incredibilmente duramente, esigi risposte e passi istantaneamente al prossimo obiettivo.", pt: "Opõe-se incrivelmente de forma dura, exige respostas e passa para o próximo objetivo instantaneamente.", nl: "Verzet je ongelooflijk hard, eist antwoorden en schakelt direct over naar het volgende doel.", pl: "Sprzeciwiasz się niesamowicie mocno, żądasz odpowiedzi i natychmiast przechodzisz do następnego celu.", tr: "İnanılmaz derecede sert bir şekilde karşı çıkar, cevaplar talep eder ve anında bir sonraki hedefe yönelirsiniz.", ar: "ترفض بشدة، وتطالب بإجابات، وتنتقل إلى الهدف التالي على الفور." } },
          { c: 'Y', text: { en: "Feel totally deflated for a brief moment, then immediately hunt for the next thrill.", es: "Te sientes totalmente desinflado por un breve momento, luego buscas inmediatamente la próxima emoción.", fr: "Vous vous sentez totalement découragé un bref instant, puis partez immédiatement à la recherche du prochain frisson.", de: "Sich für einen kurzen Moment völlig entmutigt fühlen und dann sofort nach dem nächsten Nervenkitzel suchen.", it: "Ti senti totalmente scoraggiato per un breve momento, poi cerchi immediatamente il prossimo brivido.", pt: "Sente-se totalmente desanimado por um breve momento, depois procura imediatamente a próxima emoção.", nl: "Voelt je een kort moment totaal uit het veld geslagen, waarna je direct op jacht gaat naar de volgende kick.", pl: "Przez krótką chwilę czujesz się całkowicie zniechęcony, a potem natychmiast polujesz na kolejny dreszczyk emocji.", tr: "Kısa bir an için tamamen hayal kırıklığına uğrar, ardından hemen bir sonraki heyecanı aramaya başlarsınız.", ar: "تشعر بالإحباط التام للحظة وجيزة، ثم تبحث فورًا عن الإثارة التالية." } },
          { c: 'G', text: { en: "Worry intensely about how the people involved are surviving the shock and check in.", es: "Te preocupas intensamente por cómo las personas involucradas están sobreviviendo al impacto y las consultas.", fr: "Vous inquiétez intensément de la façon dont les personnes impliquées survivent au choc et prenez de leurs nouvelles.", de: "Sich intensiv darum sorgen, wie die Beteiligten den Schock überstehen, und sich bei ihnen erkundigen.", it: "Ti preoccupi intensamente di come le persone coinvolte stanno sopravvivendo allo shock e le contatti.", pt: "Preocupa-se intensamente com a forma como as pessoas envolvidas estão a sobreviver ao choque e verifica como estão.", nl: "Maakt je intens zorgen over hoe de betrokkenen de schok overleven en neemt poolshoogte.", pl: "Intensywnie martwisz się o to, jak zaangażowane osoby znoszą szok i sprawdzasz, co u nich.", tr: "Dahil olan kişilerin şoku nasıl atlattığı konusunda yoğun bir şekilde endişelenir ve onları kontrol edersiniz.", ar: "تقلق بشدة حول كيف ينجو الأشخاص المعنيون من الصدمة وتطمئن عليهم." } },
          { c: 'B', text: { en: "Demand to understand exactly why the logical decision was made before accepting it.", es: "Exiges entender exactamente por qué se tomó la decisión lógica antes de aceptarla.", fr: "Exigez de comprendre exactement pourquoi la décision logique a été prise avant de l'accepter.", de: "Verlangen, genau zu verstehen, warum die logische Entscheidung getroffen wurde, bevor Sie sie akzeptieren.", it: "Esigi di capire esattamente perché è stata presa la decisione logica prima di accettarla.", pt: "Exige perceber exatamente por que a decisão lógica foi tomada antes de a aceitar.", nl: "Eist precies te begrijpen waarom de logische beslissing is genomen voordat je deze accepteert.", pl: "Żądasz dokładnego zrozumienia, dlaczego podjęto taką logiczną decyzję, zanim ją zaakceptujesz.", tr: "Kabul etmeden önce mantıksal kararın tam olarak neden alındığını anlamayı talep edersiniz.", ar: "تطالب بفهم سبب اتخاذ القرار المنطقي بالضبط قبل قبوله." } }
        ]

        RY:["Apportez un haut niveau d'énergie et un rythme de travail très agile","Assurez-vous de lier ses tâches à des succès à court terme et des résultats très visibles","Ne le surchargez pas avec trop de bureaucratie ou des processus excessivement rigides","Laissez-lui la marge nécessaire pour influencer les autres et donner le rythme au projet"],
        RG:["Traitez-le toujours avec la plus grande honnêteté, transparence et un profond respect","Aidez-le à voir comment les résultats concrets du projet bénéficient directement aux personnes","Cherchez un bon équilibre entre la clarté des objectifs et l'offre d'un soutien continu","Reconnaissez et valorisez ouvertement tant sa performance que sa capacité à soigner les relations"],
        RB:["Assurez-vous d'arriver aux réunions très bien préparé et avec vos dossiers maîtrisés","Apportez des preuves solides, des données vérifiées et des recommandations très claires","Soyez scrupuleusement respectueux de son temps et de ses hauts standards de qualité","Démontrez-lui que vos propositions ont du sens tant sur le plan commercial que qualitatif"],
        YR:["Efforcez-vous de présenter les choses d'une manière stimulante et profondément motivante","Connectez clairement ses tâches quotidiennes à l'impact final et à la dynamique du projet","Offrez-lui de l'espace pour avoir de la visibilité, apporter des idées et prendre l'initiative","Maintenez les projets en mouvement constant, en évitant qu'ils ne stagnent ou deviennent fastidieux"],
        YY:["Essayez de maintenir un environnement de travail toujours positif, optimiste et interactif","Reconnaissez ses succès et ses contributions de manière ouverte et, si possible, en public","Évitez de lui imposer des structures de travail ou des processus excessivement rigides ou limitants","Faites appel à son énergie, sa motivation et sa vision, ne vous contentez pas d'exiger qu'il suive un processus"],
        YG:["Montrez toujours une attitude chaleureuse, accessible et inclusive à son égard","Démontrez un intérêt sincère et humain pour sa personne, pas seulement pour son travail","Faites tout votre possible pour que les environnements de collaboration se sentent sûrs et avec un but clair","Lorsque vous devez lui donner un feedback d'amélioration, faites-le toujours avec beaucoup de tact et de gentillesse"],
        YB:["Présentez les défis de manière à éveiller son intellect et sa curiosité naturelle","Combinez dans vos arguments une vision inspirante avec un raisonnement logique et fondé","Donnez-lui le temps et l'espace nécessaires pour qu'il puisse réfléchir, analyser et explorer des options","Accompagnez toujours vos idées d'exemples concrets et pratiques, en fuyant les simples abstractions"],
        GR:["Avant d'exiger des résultats, investissez du temps pour construire une relation de confiance solide","Soyez très clair et direct dans vos communications, mais sans jamais paraître froid ou tranchant","Assurez-vous de toujours expliquer le 'pourquoi' (l'objectif profond) et pas seulement le 'quoi' (les attentes)","Montrez un respect sincère pour la préoccupation et l'intérêt qu'il porte aux autres personnes"],
        GY:["Adressez-vous à lui toujours avec gentillesse, une empathie claire et une véritable proximité humaine","Assurez-vous de reconnaître son effort et l'impact positif que son travail a sur le reste de l'équipe","Évitez d'utiliser un ton de voix, des manières ou des communications qui pourraient lui sembler excessivement dures","Avant de lui proposer un défi ou un changement, assurez-vous d'avoir créé un environnement de sécurité psychologique"],
        GG:["Armez-vous de patience et montrez-vous toujours comme une personne authentique et sincère","Lorsque vous lui donnez un feedback, choisissez vos mots avec beaucoup de soin et de délicatesse pour ne pas le blesser","Concentrez-vous sur la promotion d'un environnement de travail qui lui transmet le maximum de stabilité et de confiance possible","Évitez à tout prix de le presser ou de le forcer à prendre des décisions ou à donner des réponses de manière précipitée"],
        GB:["Traitez-le avec beaucoup de considération et assurez-vous d'apporter vos arguments très bien préparés","Chaque fois que possible, fournissez-lui les informations par écrit pour qu'il gagne en clarté et puisse les analyser","Dans vos propositions, assurez-vous d'exposer tant la logique technique que l'impact humain de celles-ci","Accordez-lui toujours le temps nécessaire pour réfléchir et traiter l'information avant d'exiger une décision"],
        BR:["Soyez extrêmement précis, très méticuleux et abordez-le toujours avec une immense préparation préalable","Appuyez toute proposition ou argument avec des données vérifiables et des preuves empiriques incroyablement solides","Allez droit au but et assurez-vous de garder les discussions et les réunions aussi efficaces que possible","Gardez à l'esprit que son style est profondément analytique ; ne confondez pas votre besoin de proximité avec le fait d'être vague ou imprécis"],
        BY:["Nourrissez son esprit en apportant des idées, des concepts ou des approches qui sont très intéressants et novateurs","Avant de forcer la conclusion d'une décision, permettez une phase préliminaire d'exploration de toutes les possibilités","Soutenez toute initiative hautement créative ou innovante avec un argumentaire profondément rationnel et bien structuré","Invitez-le d'abord à réfléchir profondément sur la question, et seulement ensuite cherchez un consensus sur les actions à entreprendre"],
        BG:["Soyez profondément respectueux du temps dont il a véritablement besoin pour penser, analyser et tirer des conclusions","Maintenez toujours une attitude calme et sereine et communiquez avec un maximum de clarté et d'ordre parfait","Expliquez-lui en détail comment les décisions affecteront tant les personnes que la qualité","Évitez de le presser ou d'exiger une immédiateté absolue lorsqu'il traite des problèmes hautement complexes"],
        BB:["Soyez suprêmement spécifique, hautement structuré et impeccablement organisé dans vos communications avec lui","Dans vos arguments, donnez toujours la priorité absolue aux faits objectifs et aux données dures bien au-dessus des émotions ou des intuitions","Offrez-lui le temps absolument nécessaire pour traiter et analyser l'information en profondeur avant de demander une décision","Assurez-vous que vos demandes, e-mails ou ordres soient clairs comme de l'eau de roche, très détaillés et parfaitement structurés"]

    profileTexts.de = {
      primary: {
        R: {
          overview: "{name}, Ihr Profil wird von einer starken roten Energie angetrieben. Sie sind eine direkte, entschlossene Person, die von Natur aus darauf ausgerichtet ist, Maßnahmen zu ergreifen, Verantwortung zu übernehmen und konkrete Ergebnisse zu erzielen.",
          comm: "Ihr Kommunikationsstil ist schnell, kristallklar und kommt direkt auf den Punkt. Sie neigen dazu, direkte Ehrlichkeit über Diplomatie zu stellen, und ziehen es vor, das Tempo beizubehalten, anstatt sich in Details zu verlieren. Andere nehmen Sie als selbstbewusst, offen und bereit wahr, eine Entscheidung zu treffen, während andere noch ihre Optionen diskutieren.",
          workStyle: "In Ihrem idealen Umfeld suchen Sie Klarheit, Autonomie, Agilität und gut sichtbare Fortschritte. Sie haben eine natürliche Neigung, Projekte voranzutreiben, Unklarheiten aggressiv in Frage zu stellen und einen unerschütterlichen Fokus auf das zu behalten, was wirklich wichtig ist. Sie laufen zur Höchstform auf, wenn die Erwartungen hoch sind und die Verantwortlichkeit absolut ist.",
          motivation: "Was Sie am meisten motiviert, sind greifbare Erfolge, schnelle Fortschritte, neue Herausforderungen und die Fähigkeit, das Endergebnis direkt zu beeinflussen. Umgekehrt werden Stagnation, Unentschlossenheit und unnötige Verzögerungen Ihre Energie schneller als alles andere aufzehren.",

        RR:["Kann übermäßig autoritär und fordernd werden, wenn sich das Arbeitstempo verlangsamt","Könnte in einem unerbittlichen Streben nach Geschwindigkeit die emotionalen Auswirkungen auf das Team völlig übersehen","Neigt stark dazu, von allen anderen zu erwarten, dass sie auf genau demselben Intensitätsniveau agieren"],
        RY:["Läuft sehr reale Gefahr, zu viel zu versprechen oder viel zu schnell vorankommen zu wollen","Kann Debatten leicht monopolisieren, angetrieben von ihrer enormen Energie und dem Wunsch nach Tempo","Könnte völlig die Geduld verlieren, wenn sie mit Aufgaben konfrontiert wird, die eine sehr akribische Ausführung erfordern"],
        RG:["Kann einen starken internen Konflikt zwischen ihrem Wunsch nach Harmonie und der Notwendigkeit, direkt zu sein, erleben","Übernimmt oft eine übermäßige Verantwortung für die Ergebnisse und Fehler anderer","Neigt dazu, konstruktive Kritik zu stark abzuschwächen, was sie ihrer Kraft und Wirksamkeit beraubt"],
        RB:["Kann übermäßig fordernd und unflexibel werden, wenn sie einen Abfall der Standards bemerken","Erwartet normalerweise, dass andere Informationen mit genau derselben Geschwindigkeit und analytischen Strenge verarbeiten","Kann aufgrund ihrer Direktheit stark einschüchternd wirken, selbst wenn sie nur beabsichtigen, klar zu sein"],
        YR:["Kann sich völlig vom anfänglichen Impuls mitreißen lassen, bevor eine solide Struktur etabliert ist","Hat die Tendenz, neuen Projekten viel zu voreilig und ohne Planung zuzustimmen","Könnte massiv damit kämpfen, Beständigkeit aufrechtzuerhalten, wenn die anfängliche Energie sinkt und Disziplin erforderlich ist"],
        YY:["Läuft Gefahr, den Fokus völlig zu verlieren, sobald der Neuheitsfaktor eines Projekts verschwindet","Versucht oft aktiv, Reibungen oder das Einfordern schwieriger Rechenschaftspflichten zu vermeiden","Kann die vitale Bedeutung der Nachverfolgung und des Abschlusses mühsamer Aufgaben ernsthaft unterschätzen"],
        YG:["Könnte ein gutes Umfeld zum schweren Nachteil von Klarheit und Effektivität überpriorisieren","Zweifelt oft stark oder wehrt sich dagegen, andere bei Bedarf zu konfrontieren oder direkt herauszufordern","Hat die Tendenz, eine übermäßige Menge an emotionaler Verantwortung am Arbeitsplatz zu absorbieren und zu tragen"],
        YB:["Läuft Gefahr, viel länger in der Ideenfindungsphase zu bleiben, als es die tatsächliche Ausführung erfordert","Kann ein Bild totaler äußerer Klarheit projizieren, während sie intern massive Zweifel hegen","Könnte erratisch zwischen einer Phase reiner Inspiration und totaler Analyseparalyse schwanken"],
        GR:["Könnte ihre Geduld weit über die Grenze hinaus verlängern, an der ein Handeln mit schonungsloser Offenheit erforderlich ist","Neigt dazu, die Arbeit anderer zu erledigen, anstatt sie zu zwingen, ihre eigene Verantwortung zu übernehmen","Versucht normalerweise aktiv, offene Konflikte zu vermeiden, selbst in Situationen, in denen sie absolut notwendig sind"],
        GY:["Hat eine starke Tendenz, ihre Enttäuschungen oder Frustrationen unter einer warmen Haltung zu tarnen","Hat oft große Schwierigkeiten, die eigenen Bedürfnisse klar und direkt auszudrücken","Könnte sich in ihrem Bestreben, sicherzustellen, dass alle glücklich sind, völlig mit Verpflichtungen überladen"],
        GG:["Läuft Gefahr, in sehr dominanten oder lauten Umgebungen zu still oder völlig unsichtbar zu werden","Hat eine starke Tendenz, schwierige oder angespannte Gespräche systematisch aufzuschieben oder auszuweichen","Unterschätzt und verharmlost oft das Gewicht und den Wert der eigenen Meinungen und Ansichten"],
        GB:["Könnte Informationen übermäßig verarbeiten oder überdenken, bevor sie es wagen, sich zu äußern oder eine Entscheidung zu treffen","Projiziert manchmal ein Bild, das viel kälter, distanzierter oder unzugänglicher ist, als sie beabsichtigen","Hält sich normalerweise zurück und nimmt nicht teil, bis sie das Gefühl haben, dass ihre interne Reflexion zu 100 % abgeschlossen ist"],
        BR:["Läuft unter Druck ernsthaft Gefahr, übermäßig perfektionistisch, unflexibel und fordernd zu werden","Ist sich oft des erdrückenden Maßes an Druck oder Intensität, das sie auf andere projizieren, überhaupt nicht bewusst","Könnte es in Konfliktsituationen vorziehen zu beweisen, dass sie recht haben, anstatt die persönliche Beziehung zu schützen"],
        BY:["Könnte sich in einem ständigen Tauziehen zwischen ihrer fantasievollen und ihrer umsichtigen Seite gefangen finden","Hat die Tendenz, die endgültige Entscheidungsfindung zu verzögern, weil sie alle möglichen Optionen ausloten müssen","Läuft Gefahr, einfache, direkte Lösungen unterzubewerten, indem sie weitaus komplexere Ansätze priorisieren"],
        BG:["Hat die Tendenz, potenziellen Risiken und Verantwortlichkeiten ein völlig übertriebenes Gewicht beizumessen","Behält normalerweise viele Informationen für sich, anstatt sie in den frühen Phasen zu teilen","Könnte beim Handeln auf Blockaden stoßen, wenn sie das Gefühl haben, nicht alle Variablen vollständig zu kontrollieren oder zu verstehen"],
        BB:["Läuft ernste Gefahr, in eine Analyseparalyse oder eine unerbittliche Suche nach absoluter Perfektion zu verfallen","In den Augen anderer können sie viel kälter, distanzierter oder empathieloser wirken, als sie wirklich sind","Könnte eine übermäßig kritische, harte und korrigierende Haltung einnehmen, wenn ihre hohen Standards nicht erfüllt werden"]
      },
      tips: {
        RR:["Seien Sie extrem direkt, absolut klar und kommen Sie immer gleich auf den Punkt","Konzentrieren Sie sich stark auf die wichtigsten Ziele, strengen Fristen und konkreten Ergebnisse","Bieten Sie ihnen totale Autonomie, solange die Ziele perfekt definiert sind","Vermeiden Sie es, sich in langen Erklärungen oder Details zu verlieren, es sei denn, sie bitten ausdrücklich darum"],
        RY:["Bringen Sie ein sehr hohes Energieniveau und ein hochgradig agiles Arbeitstempo in Ihre Interaktionen ein","Stellen Sie sicher, dass Sie ihre Aufgaben mit kurzfristigen Erfolgen und hochsichtbaren Ergebnissen verknüpfen","Überlasten Sie sie nicht mit zu viel Bürokratie oder übermäßig starren Prozessen","Geben Sie ihnen den Spielraum, um andere zu beeinflussen und das Tempo des Projekts vorzugeben"],
        RG:["Behandeln Sie sie immer mit äußerster Ehrlichkeit, absoluter Transparenz und tiefem Respekt","Helfen Sie ihnen, genau zu sehen, wie die konkreten Ergebnisse des Projekts den beteiligten Personen zugutekommen","Suchen Sie nach einer sehr guten Balance zwischen glasklaren Zielen und dem Angebot kontinuierlicher Unterstützung","Erkennen Sie sowohl ihre harte Leistung als auch ihre Fähigkeit, Beziehungen zu pflegen, offen an und schätzen Sie sie"],
        RB:["Stellen Sie sicher, dass Sie perfekt vorbereitet und mit gemachten Hausaufgaben zu Meetings erscheinen","Liefern Sie unglaublich solide Beweise, verifizierte Daten und sehr klare, logische Empfehlungen","Gehen Sie äußerst respektvoll mit ihrer Zeit und ihren außergewöhnlich hohen Qualitätsstandards um","Zeigen Sie ihnen, dass Ihre Vorschläge sowohl auf kommerzieller als auch auf qualitativer Ebene absolut Sinn machen"],
        YR:["Bemühen Sie sich, die Dinge auf eine Weise zu präsentieren, die hochgradig anregend und zutiefst motivierend ist","Verbinden Sie ihre täglichen Aufgaben klar mit der endgültigen Wirkung und der übergeordneten Eigendynamik des Projekts","Bieten Sie ihnen viel Raum, um sichtbar zu sein, große Ideen einzubringen und die Initiative zu ergreifen","Halten Sie Projekte in ständiger Bewegung und vermeiden Sie es vehement, dass sie stagnieren oder mühsam werden"],
        YY:["Versuchen Sie, ein Arbeitsumfeld aufrechtzuerhalten, das immer sehr positiv, optimistisch und interaktiv ist","Erkennen Sie ihre Erfolge und Beiträge offen und, wenn irgend möglich, öffentlich an","Vermeiden Sie es, ihnen Arbeitsstrukturen oder Prozesse aufzuzwingen, die übermäßig starr oder einschränkend sind","Sprechen Sie ihre Energie, ihre Motivation und ihre Vision an; verlangen Sie nicht einfach, dass sie einem Prozess folgen"],
        YG:["Zeigen Sie im Umgang mit ihnen immer eine sehr warme, zugängliche und integrative Haltung","Zeigen Sie ein echtes, aufrichtiges und menschliches Interesse an ihnen persönlich, nicht nur an ihrer Arbeit","Tun Sie alles Mögliche, damit sich kollaborative Umgebungen hochgradig sicher und mit einem klaren Zweck anfühlen","Wenn Sie ihnen Feedback zur Verbesserung geben müssen, tun Sie dies immer mit viel Taktgefühl, Freundlichkeit und Klarheit"],
        YB:["Präsentieren Sie Herausforderungen auf eine Weise, die ihren Intellekt und ihre natürliche Neugier stark weckt","Kombinieren Sie in Ihren Argumenten eine höchst inspirierende Vision mit zutiefst logischer, fundierter Argumentation","Geben Sie ihnen die nötige Zeit und den Raum, damit sie nachdenken, analysieren und Optionen tiefgreifend ausloten können","Begleiten Sie Ihre Ideen immer mit sehr konkreten und praktischen Beispielen und fliehen Sie vor bloßen Abstraktionen"],
        GR:["Bevor Sie Ergebnisse von ihnen verlangen, investieren Sie ernsthaft Zeit in den Aufbau einer soliden Vertrauensbeziehung","Seien Sie in Ihrer Kommunikation sehr klar und direkt, ohne jedoch jemals kalt oder verletzend zu wirken","Stellen Sie sicher, dass Sie immer das 'Warum' (den tieferen Zweck) und nicht nur das 'Was' (die Erwartungen) erklären","Zeigen Sie einen echten und tiefen Respekt für die Sorge und das Interesse, das sie anderen Menschen entgegenbringen"],
        GY:["Wenden Sie sich immer aus einer Haltung der Freundlichkeit, tiefen Empathie und echten menschlichen Nähe an sie","Stellen Sie sicher, dass Sie ihren intensiven Einsatz und die positiven Auswirkungen ihrer Arbeit auf den Rest des Teams anerkennen","Vermeiden Sie die Verwendung eines Tonfalls, von Umgangsformen oder von Kommunikationsweisen, die ihnen übermäßig hart erscheinen könnten","Bevor Sie sie mit einer Herausforderung oder Veränderung konfrontieren, stellen Sie sicher, dass Sie ein Umfeld psychologischer Sicherheit geschaffen haben"],
        GG:["Wappnen Sie sich mit tiefer Geduld und zeigen Sie sich immer als eine hochgradig aufrichtige und ehrliche Person","Wenn Sie ihnen Feedback geben, wählen Sie Ihre Worte mit extremer Sorgfalt und Feingefühl, um sie nicht zu verletzen","Konzentrieren Sie sich darauf, ein Arbeitsumfeld zu fördern, das ihnen die größtmögliche Stabilität und das größtmögliche Vertrauen vermittelt","Vermeiden Sie es um jeden Preis, sie unter Druck zu setzen oder zu zwingen, Entscheidungen zu treffen oder Antworten überstürzt zu geben"],
        GB:["Behandeln Sie sie mit großer Rücksichtnahme und stellen Sie sicher, dass Sie Ihre Argumente außergewöhnlich gut vorbereitet vorbringen","Stellen Sie ihnen Informationen nach Möglichkeit schriftlich zur Verfügung, damit sie Klarheit gewinnen und sie tiefgreifend analysieren können","Stellen Sie in Ihren Vorschlägen sicher, dass Sie sowohl die technische Logik als auch die menschlichen Auswirkungen davon darlegen","Gewähren Sie ihnen immer die nötige Zeit, um Informationen zu reflektieren und zu verarbeiten, bevor Sie eine Entscheidung verlangen"],
        BR:["Seien Sie extrem präzise, sehr akribisch und gehen Sie immer mit immenser Vorbereitung auf sie zu","Untermauern Sie jeden Vorschlag oder jedes Argument mit hochgradig überprüfbaren Daten und unglaublich soliden, empirischen Beweisen","Kommen Sie direkt auf den Punkt und stellen Sie sicher, dass Diskussionen und Besprechungen absolut effizient ablaufen","Denken Sie daran, dass ihr Stil zutiefst analytisch ist; verwechseln Sie Ihr Bedürfnis nach Nähe nicht damit, vage oder ungenau zu sein"],
        BY:["Nähren Sie ihren Geist, indem Sie Ideen, Konzepte oder Ansätze einbringen, die sehr interessant und neuartig sind","Bevor Sie den Abschluss einer Entscheidung erzwingen, erlauben Sie eine Vorbereitungsphase, in der alle Möglichkeiten ausgelotet werden","Untermauern Sie jede hochkreative oder innovative Initiative mit einem zutiefst rationalen und gut strukturierten Argument","Laden Sie sie zuerst ein, tief über die Angelegenheit nachzudenken, und suchen Sie erst danach einen Konsens über die zu ergreifenden Maßnahmen"],
        BG:["Respektieren Sie zutiefst die Zeit, die sie wirklich brauchen, um zu denken, zu analysieren und Schlussfolgerungen zu ziehen","Bewahren Sie immer eine ruhige, gelassene Haltung und kommunizieren Sie mit maximaler Klarheit und perfekter Ordnung","Erklären Sie ihnen bis ins kleinste Detail, wie sich die Entscheidungen sowohl auf die Menschen als auch auf die Qualität auswirken werden","Vermeiden Sie es, sie zu hetzen oder sofortige Antworten zu verlangen, wenn sie sich mit hochkomplexen Themen befassen"],
        BB:["Seien Sie in Ihrer Kommunikation mit ihnen überaus spezifisch, hochgradig strukturiert und tadellos organisiert","Priorisieren Sie in Ihren Argumenten immer objektive Fakten und harte Daten weit über Emotionen oder Intuitionen","Bieten Sie ihnen die absolut notwendige Zeit, um die Informationen tiefgreifend zu verarbeiten und zu analysieren, bevor Sie um eine Entscheidung bitten","Stellen Sie sicher, dass Ihre Anfragen, E-Mails oder Anweisungen kristallklar, sehr detailliert und perfekt strukturiert sind"]
      }
    };

    profileTexts.it = {
      primary: {
        R: {
          overview: "{name}, il tuo profilo è guidato da una forte energia Rossa. Sei una persona diretta, decisa, naturalmente orientata all'azione, all'assunzione di responsabilità e al raggiungimento di risultati concreti.",
          comm: "Il tuo stile di comunicazione è veloce, cristallino e strettamente focalizzato sul punto. Tendi a dare più importanza alla franchezza rispetto alla diplomazia e preferisci mantenere lo slancio piuttosto che impantanarti nei dettagli. Gli altri ti percepiscono come sicuro, schietto e pronto a prendere una decisione mentre gli altri stanno ancora discutendo le loro opzioni.",
          workStyle: "Nel tuo ambiente ideale, cerchi chiarezza, autonomia, agilità e progressi altamente visibili. Hai una naturale inclinazione a portare avanti i progetti, sfidare aggressivamente le ambiguità e mantenere un'attenzione incrollabile su ciò che conta davvero. Raggiungi il massimo quando le aspettative sono alte e la responsabilità è assoluta.",
          motivation: "Ciò che ti motiva di più sono i risultati tangibili, i progressi rapidi, le nuove sfide e la capacità di influenzare direttamente il risultato finale. Al contrario, la stagnazione, l'indecisione e i ritardi inutili prosciugheranno la tua energia più velocemente di qualsiasi altra cosa.",
          decisions: "Prendi decisioni con notevole rapidità e ti senti completamente a tuo agio a passare all'azione anche quando non possiedi tutte le variabili. Ti fidi del tuo giudizio, del tuo riconoscimento degli schemi e dell'inerzia del momento. Questo ti rende una risorsa inestimabile in ambienti dal ritmo serrato.",
          misread: "A volte, gli altri possono scambiare la tua chiarezza per durezza, la tua velocità per impazienza o la tua sicurezza per desiderio di controllo. In realtà, la tua intenzione di fondo è semplicemente quella di essere altamente efficiente e utile.",
          growth: "La tua più grande area di sviluppo sta nel comprendere che la tua velocità e chiarezza diventano esponenzialmente più potenti quando combinate con contesto, empatia e pazienza. Non si tratta di diventare 'morbidi'; si tratta di diventare altamente intenzionali nell'aiutare gli altri a tenere il tuo formidabile passo."
        },
        Y: {
          overview: "{name}, il tuo profilo brilla di una forte energia Gialla. Sei un individuo espressivo e profondamente ottimista, con un talento naturale, quasi magnetico, per contagiare chi ti circonda con il tuo entusiasmo.",
          comm: "Il tuo stile di comunicazione è incredibilmente caloroso, accessibile e altamente persuasivo. Generi slancio senza sforzo attraverso il tuo puro entusiasmo, la tua visione di ciò che è possibile e la tua innata capacità di connetterti con le persone. Gli altri sono attratti dalla tua energia e di solito si sentono sollevati semplicemente stando in tua presenza.",
          workStyle: "Dove brilli veramente è negli ambienti dinamici, collaborativi e traboccanti di nuove opportunità. Ti piace generare idee fresche, costruire vaste reti e infondere anima e dinamismo in compiti che altrimenti potrebbero sembrare monotoni o pesantemente procedurali.",
          motivation: "I tuoi più grandi motori interni sono l'energia del tuo ambiente, il riconoscimento pubblico, la libertà, la varietà, le interazioni umane significative e l'eccitazione condivisa di costruire qualcosa di nuovo. La monotonia, la rigidità estrema e le atmosfere emotivamente fredde spegneranno completamente la tua scintilla.",
          decisions: "Prendi spesso decisioni guidato dall'energia del momento, dal potenziale di fondo che intuisci e da come le cose si inseriscono nel più ampio contesto umano. Sei in grado di muoverti in modo straordinariamente veloce nell'istante in cui un progetto ispira la tua assoluta fiducia.",
          misread: "A volte, gli altri potrebbero presumere che tu sia meno rigoroso o strutturato di quanto non sia in realtà. Il tuo calore e la tua spontaneità possono mascherare pesantemente il fatto che possiedi una brillante capacità di 'leggere' le persone all'istante e guidare i risultati in modi incredibilmente sottili ma altamente efficaci.",
          growth: "La tua principale sfida di sviluppo è aggiungere uno strato di incrollabile coerenza e disciplina al tuo carisma naturale. Possiedi già il raro dono di mobilitare le persone con facilità; il tuo prossimo passo è dimostrare che la tua spinta esplosiva iniziale è supportata da una resistenza a lungo termine e da un'esecuzione impeccabile."
        },
        G: {
          overview: "{name}, sei guidato da una profonda energia Verde. Sei una persona eccezionalmente stabile ed empatica che si sintonizza in modo naturale e impeccabile con il clima emotivo del proprio team.",
          comm: "Il tuo stile di comunicazione è sereno, profondamente premuroso e sempre conciliante. Le persone di solito si fidano di te molto rapidamente perché irradi sicurezza psicologica, notevole coerenza e lasci sempre spazio agli altri. Raramente cerchi di imporre con la forza la tua presenza, ma il tuo impatto sulle persone è incredibilmente profondo e duraturo.",
          workStyle: "Dai il tuo meglio assoluto quando puoi lavorare con profonda cura, totale affidabilità e tranquilla riflessione. Apprezzi profondamente le relazioni umane, la fiducia reciproca e un progresso costante e sostenibile. Aiuti gli altri a tenere i piedi ben piantati per terra e sei spesso il pilastro invisibile che tiene insieme l'intero team.",
          motivation: "Ciò che ti ispira di più è sapere di aggiungere un valore autentico, provare un senso di fiducia e stabilità, coltivare relazioni di profondo supporto e vedere che il tuo lavoro quotidiano va tangibilmente a vantaggio degli altri. Gli ambienti aggressivi, caotici o intensamente freddi esauriscono rapidamente le tue riserve di energia.",
          decisions: "Quando prendi delle decisioni, soppesi abitualmente l'impatto umano, le conseguenze a lungo termine e la sostenibilità complessiva della misura. Preferisci di gran lunga non affrettare scelte importanti, specialmente se tali scelte influenzano direttamente il benessere di terzi.",
          misread: "A volte, la tua tipica tranquillità può essere interpretata erroneamente come passività, o la tua infinita pazienza come una netta mancanza di ambizione. In realtà, di solito possiedi convinzioni incredibilmente salde; semplicemente non senti assolutamente il bisogno di imporle alzando la voce.",
          growth: "La tua più grande area di crescita è imparare a sentirti completamente a tuo agio nell'essere molto diretto, stabilire confini di ferro e renderti visibile. La tua empatia è già un punto di forza formidabile; il passo successivo è assicurarti che la tua voce sia ascoltata con la stessa esatta forza del supporto silenzioso che offri."
        },
        B: {
          overview: "{name}, il tuo profilo è strutturato attorno a una potente energia Blu. Sei una persona altamente riflessiva e meticolosa, con una naturale inclinazione verso una chiarezza impeccabile, una logica assoluta e un lavoro eseguito alla perfezione.",
          comm: "Il tuo stile di comunicazione è misurato, altamente prudente e immancabilmente basato su dati oggettivi. Gli altri si rivolgono costantemente a te in cerca di giudizi fondati, analisi rigorose e standard di qualità eccezionalmente elevati. Porti rigore e struttura a dibattiti che, senza di te, rimarrebbero frustrantemente superficiali.",
          workStyle: "Il tuo ambiente ideale è quello in cui le aspettative sono cristalline, la qualità è profondamente apprezzata e hai il tempo necessario per pensare a fondo alle cose. Sei costantemente la persona che alza l'asticella, rileva difetti fatali nella logica o affina i processi per renderli a prova di bomba.",
          motivation: "Ciò che ti motiva genuinamente è una qualità impeccabile, l'esperienza tecnica, la competenza totale, il ragionamento logico e la profonda soddisfazione di fare le cose in modo ineccepibile. L'ambiguità, la mancanza di rigore e le decisioni affrettate e caotiche ti demotivano nel profondo.",
          decisions: "Il tuo processo decisionale si basa strettamente su prove empiriche, una logica incrollabile, confronti esaustivi e una valutazione cristallina dei rischi. Raramente fai un solo passo senza comprendere l'intera situazione, e il tuo giudizio brilla di più quando gli altri agiscono in modo sbadato e reattivo.",
          misread: "A volte, gli altri possono percepirti come qualcuno distante, eccessivamente critico o impossibile da decifrare. In realtà, non è che tu sia freddo; sei semplicemente eccezionalmente cauto, profondamente riflessivo e altamente responsabile riguardo al risultato.",
          growth: "La tua principale sfida di sviluppo è imparare a sentirti a tuo agio nell'intraprendere azioni decisive anche quando ti manca l'assoluta certezza. I tuoi standard altissimi sono la tua più grande risorsa; il tuo prossimo passo evolutivo è imparare a identificare con precisione quando una soluzione è 'abbastanza buona' per procedere in modo aggressivo."
        }
      },
      secondary: {
        R: { addition: "La tua energia Rossa secondaria ti fornisce un forte senso di urgenza, una sana competitività e una predisposizione molto più elevata per l'azione immediata.", blendWork: "Questo ti rende significativamente più disposto ad affrontare sfide difficili, prendere decisioni rapide e accelerare il ritmo rispetto a qualcuno che possiede solo il tuo colore primario.", blendRisk: "Nelle situazioni di forte stress, questa combinazione può manifestarsi come visibile impazienza, eccessiva schiettezza o un bisogno opprimente di prendere il controllo con la forza." },
        Y: { addition: "La tua energia Gialla secondaria ti dota di entusiasmo extra, maggiore visibilità e un'elevata capacità di influenzare positivamente gli altri attraverso l'ottimismo.", blendWork: "Generalmente, questo ti rende molto più espressivo, avvicinabile e altamente qualificato nel conquistare la fiducia e il supporto entusiasta dei tuoi colleghi.", blendRisk: "Sotto forte pressione, questo può tradursi in una tendenza a promettere più di quanto tu possa effettivamente consegnare, mancanza di concentrazione o un evitamento attivo di compiti noiosi e orientati ai dettagli." },
        G: { addition: "La tua energia Verde secondaria ti fa dono di una profonda empatia, temperanza e un istinto protettivo molto forte verso le persone che ti circondano.", blendWork: "Questo ti trasforma in qualcuno molto più concentrato sulle relazioni umane, profondamente degno di fiducia e molto più consapevole dell'impatto emotivo di quanto gli altri potrebbero percepire inizialmente.", blendRisk: "In situazioni altamente stressanti, potresti diventare eccessivamente accomodante, farti carico dei pesanti fardelli degli altri o annacquare completamente le tue vere opinioni per evitare un conflitto aperto." },
        B: { addition: "La tua energia Blu secondaria ti fornisce una struttura rigida, una precisione impeccabile e una spinta interiore ad eseguire i compiti con eccellenza assoluta.", blendWork: "Questo ti dota di un livello di ferrea disciplina, abilità analitica e controllo della qualità di gran lunga superiore a quello che le persone in genere notano a prima vista.", blendRisk: "Sotto uno stress immenso, questa combinazione può facilmente portare a una grave 'paralisi da analisi', a un eccesso di cautela paralizzante o a rendere i tuoi standard quasi impossibili da soddisfare per gli altri." }

      primary: {
        R: {
          overview: "{name}, Twój profil jest napędzany przez silną Czerwoną energię. Jesteś osobą bezpośrednią, decyzyjną, naturalnie zorientowaną na podejmowanie działań, przejmowanie odpowiedzialności i osiąganie konkretnych rezultatów.",
          comm: "Twój styl komunikacji jest szybki, krystalicznie czysty i ściśle skupiony na sednie sprawy. Zwykle cenisz sobie szczerą uczciwość bardziej niż dyplomację i wolisz utrzymywać tempo działań niż grzęznąć w szczegółach. Inni postrzegają Cię jako osobę pewną siebie, szczerą i gotową do podjęcia decyzji, podczas gdy inni wciąż dyskutują nad swoimi opcjami.",
          workStyle: "W swoim idealnym środowisku szukasz jasności, autonomii, zwinności i bardzo widocznych postępów. Masz naturalną skłonność do posuwania projektów do przodu, agresywnego rzucania wyzwania niejednoznaczności i utrzymywania niezachwianego skupienia na tym, co naprawdę ważne. Osiągasz szczyt możliwości, gdy oczekiwania są wysokie, a odpowiedzialność absolutna.",
          motivation: "To, co najbardziej Cię motywuje, to namacalne osiągnięcia, szybki postęp, nowe wyzwania oraz możliwość bezpośredniego wpływu na ostateczny wynik. Z drugiej strony, stagnacja, niezdecydowanie i niepotrzebne opóźnienia wyssą z Ciebie energię szybciej niż cokolwiek innego.",
          decisions: "Podejmujesz decyzje z niezwykłą szybkością i czujesz się w pełni komfortowo przechodząc do działania, nawet gdy nie znasz wszystkich zmiennych. Ufasz własnemu osądowi, zdolności rozpoznawania wzorców i inercji chwili. To czyni z Ciebie bezcenny atut w dynamicznych środowiskach.",
          misread: "Czasami inni mogą wziąć Twoją bezpośredniość za szorstkość, szybkość za niecierpliwość, a pewność siebie za chęć kontroli. W rzeczywistości Twoją główną intencją jest po prostu bycie wysoce wydajnym i użytecznym.",
          growth: "Twój największy obszar do rozwoju leży w zrozumieniu, że Twoja szybkość i klarowność stają się wykładniczo potężniejsze, gdy połączy się je z kontekstem, empatią i cierpliwością. Nie chodzi o to, by stać się 'miękkim'; chodzi o to, by z dużą świadomością pomagać innym dotrzymać kroku Twojemu imponującemu tempu."
        },
        Y: {
          overview: "{name}, Twój profil lśni silną Żółtą energią. Jesteś osobą wysoce ekspresyjną, głęboko optymistyczną, posiadającą naturalny, niemal magnetyczny talent do zarażania swoim entuzjazmem osób z otoczenia.",
          comm: "Twój styl komunikacji jest niezwykle ciepły, przystępny i bardzo przekonujący. Bez wysiłku generujesz rozmach poprzez swój czysty entuzjazm, wizję tego, co możliwe, oraz wrodzoną zdolność do nawiązywania kontaktów z ludźmi. Innych przyciąga Twoja energia i zazwyczaj czują się podniesieni na duchu po prostu przebywając w Twojej obecności.",
          workStyle: "To, gdzie naprawdę błyszczysz, to dynamiczne, oparte na współpracy środowiska, w których aż roi się od nowych możliwości. Czerpiesz ogromną radość z generowania świeżych pomysłów, budowania rozległych sieci kontaktów i tchnięcia duszy oraz dynamizmu w zadania, które w przeciwnym razie mogłyby wydawać się monotonne lub mocno sformalizowane.",
          motivation: "Twoimi największymi wewnętrznymi motywatorami są energia otoczenia, publiczne uznanie, wolność, różnorodność, znaczące interakcje z ludźmi oraz wspólna ekscytacja z budowania czegoś nowego. Monotonia, skrajna rygorystyczność i emocjonalnie chłodna atmosfera całkowicie ugaszą Twoją iskrę.",
          decisions: "Często podejmujesz decyzje kierując się energią danej chwili, ukrytym potencjałem, który wyczuwasz intuicyjnie, i tym, jak rzeczy wpisują się w szerszy ludzki kontekst. Jesteś w stanie działać niezwykle szybko w momencie, gdy projekt wzbudzi Twoje absolutne zaufanie.",
          misread: "Czasami inni mogą zakładać, że jesteś mniej rygorystyczny lub zorganizowany niż w rzeczywistości. Twoje ciepło i spontaniczność mogą skutecznie maskować fakt, że posiadasz błyskotliwą zdolność do błyskawicznego 'czytania' ludzi i kierowania wynikami w niezwykle subtelny, ale wysoce efektywny sposób.",
          growth: "Twoim głównym wyzwaniem rozwojowym jest dodanie warstwy niezachwianej konsekwencji i dyscypliny do Twojej naturalnej charyzmy. Posiadasz już rzadki dar zjednywania sobie i mobilizowania ludzi z łatwością; Twoim następnym krokiem jest udowodnienie, że Twój początkowy wybuchowy zapał jest poparty długoterminową wytrzymałością i bezbłędnym wykonaniem."
        },
        G: {
          overview: "{name}, prowadzona jesteś przez głęboką Zieloną energię. Jesteś wyjątkowo stabilną, empatyczną osobą, która naturalnie i bezbłędnie dostraja się do klimatu emocjonalnego swojego zespołu.",
          comm: "Twój styl komunikacji jest pogodny, niezwykle taktowny i zawsze ugodowy. Ludzie zazwyczaj bardzo szybko zaczynają Ci ufać, ponieważ emanujesz psychologicznym bezpieczeństwem, niezwykłą spójnością i zawsze pozostawiasz przestrzeń dla innych. Rzadko próbujesz na siłę narzucić swoją obecność, ale Twój wpływ na ludzi jest niezwykle głęboki i długotrwały.",
          workStyle: "Dajesz z siebie absolutnie wszystko, gdy możesz pracować z głęboką troską, całkowitą niezawodnością i w atmosferze spokojnej refleksji. Głęboko cenisz relacje międzyludzkie, wzajemne zaufanie oraz stały, zrównoważony postęp. Pomagasz innym twardo stąpać po ziemi i często jesteś niewidzialnym filarem utrzymującym cały zespół w jedności.",
          motivation: "To, co najbardziej Cię inspiruje, to wiedza, że wnosisz prawdziwą wartość, poczucie zaufania i stabilności, kultywowanie głęboko wspierających relacji oraz świadomość, że Twoja codzienna praca przynosi namacalne korzyści innym. Agresywne, chaotyczne lub mocno chłodne środowiska szybko wyczerpują Twoje zasoby energetyczne.",
          decisions: "Podejmując decyzje, masz w zwyczaju ważyć wpływ na ludzi, długoterminowe konsekwencje i ogólną trwałość podejmowanych działań. Zdecydowanie wolisz nie przyspieszać ważnych wyborów, zwłaszcza jeśli mogą one bezpośrednio wpłynąć na dobro osób trzecich.",
          misread: "Czasami Twój charakterystyczny spokój może zostać błędnie odebrany jako bierność, a Twoja nieskończona cierpliwość jako wyraźny brak ambicji. W rzeczywistości zazwyczaj posiadasz niesamowicie mocne przekonania; po prostu absolutnie nie czujesz potrzeby narzucania ich innym poprzez podnoszenie głosu.",
          growth: "Twoim największym obszarem do rozwoju jest nauka całkowitego komfortu w byciu osobą bardzo bezpośrednią, wyznaczaniu żelaznych granic i stawaniu się zauważalnym. Twoja empatia to już potężna siła; następnym krokiem jest upewnienie się, że Twój głos jest słyszany z taką samą siłą, z jaką oferujesz swoje ciche wsparcie."
        },
        B: {
          overview: "{name}, Twój profil jest zorganizowany wokół potężnej Niebieskiej energii. Jesteś wysoce refleksyjną, skrupulatną osobą z naturalną skłonnością do nieskazitelnej jasności, absolutnej logiki i pracy wykonanej perfekcyjnie.",
          comm: "Twój styl komunikacji jest wyważony, wysoce rozważny i niezmiennie oparty na obiektywnych danych. Inni nieustannie zwracają się do Ciebie w poszukiwaniu dobrze uzasadnionych opinii, rygorystycznych analiz i wyjątkowo wysokich standardów jakości. Wprowadzasz rygor i strukturę do debat, które bez Twojego udziału pozostałyby frustrująco powierzchowne.",
          workStyle: "Twoje idealne środowisko to takie, w którym oczekiwania są krystalicznie czyste, jakość jest głęboko ceniona, a Ty masz niezbędny czas na dokładne przemyślenie spraw. Jesteś niezmiennie osobą, która podnosi poprzeczkę, wykrywa fatalne błędy logiczne lub udoskonala procesy tak, by były całkowicie niezawodne.",
          motivation: "To, co prawdziwie Cię motywuje, to nienaganna jakość, specjalistyczna wiedza, pełna kompetencja, logiczne myślenie i głęboka satysfakcja z robienia rzeczy bez zarzutu. Niejednoznaczność, brak dyscypliny oraz pośpieszne, chaotyczne decyzje demotywują Cię do cna.",
          decisions: "Twój proces decyzyjny opiera się ściśle na dowodach empirycznych, niezachwianej logice, dogłębnych porównaniach i krystalicznie czystej ocenie ryzyk. Rzadko wykonujesz jakikolwiek krok bez zrozumienia całej sytuacji, a Twój osąd błyszczy najjaśniej, gdy inni działają w sposób nieostrożny i reaktywny.",
          misread: "Od czasu do czasu inni mogą postrzegać Cię jako osobę zdystansowaną, nadmiernie krytyczną lub niemożliwą do odszyfrowania. W rzeczywistości to nie tak, że jesteś oziębły; jesteś po prostu wyjątkowo ostrożny, głęboko refleksyjny i wysoce odpowiedzialny za końcowy rezultat.",
          growth: "Twoim głównym wyzwaniem rozwojowym jest nauka komfortu w podejmowaniu zdecydowanych działań, nawet gdy brakuje Ci absolutnej pewności. Twoje niebotyczne standardy są Twoim największym atutem; Twoim kolejnym ewolucyjnym krokiem jest nauka precyzyjnego rozpoznawania, kiedy rozwiązanie jest 'wystarczająco dobre', by agresywnie ruszyć naprzód."
        }
      },
      secondary: {
        R: { addition: "Twoja wtórna Czerwona energia zapewnia Ci silne poczucie pilności, zdrową rywalizację i znacznie wyższe predyspozycje do natychmiastowego działania.", blendWork: "To sprawia, że jesteś znacznie bardziej skłonny do podejmowania trudnych wyzwań, szybkiego podejmowania decyzji i przyspieszania tempa niż osoba, która posiadałaby tylko Twój kolor podstawowy.", blendRisk: "W wysoce stresujących sytuacjach, ta kombinacja może manifestować się jako widoczna niecierpliwość, nadmierna bezpośredniość lub obezwładniająca potrzeba siłowego przejęcia kontroli." },
        Y: { addition: "Twoja wtórna Żółta energia wyposaża Cię w dodatkowy entuzjazm, większą widoczność i spotęgowaną zdolność pozytywnego wpływania na innych poprzez optymizm.", blendWork: "Ogólnie rzecz biorąc, czyni Cię to osobą znacznie bardziej ekspresyjną, przystępną i wysoko wykwalifikowaną w zdobywaniu zaufania i entuzjastycznego poparcia swoich współpracowników.", blendRisk: "Pod silną presją, może to przełożyć się na tendencję do obiecywania więcej niż jesteś w stanie faktycznie dostarczyć, brak koncentracji lub aktywne unikanie żmudnych, zorientowanych na szczegóły zadań." },
        G: { addition: "Twoja wtórna Zielona energia obdarza Cię głęboką empatią, opanowaniem i bardzo silnym instynktem opiekuńczym w stosunku do osób z Twojego otoczenia.", blendWork: "Zmienia Cię to w kogoś znacznie bardziej skupionego na relacjach międzyludzkich, głęboko godnego zaufania i o wiele bardziej świadomego emocjonalnego wpływu swoich działań, niż inni mogliby początkowo przypuszczać.", blendRisk: "W wysoce stresujących sytuacjach, możesz stać się nadmiernie ustępliwy, brać na siebie ciężary innych lub całkowicie rozwodnić swoje prawdziwe opinie, byle tylko uniknąć otwartego konfliktu." },
        B: { addition: "Twoja wtórna Niebieska energia zapewnia Ci sztywną strukturę, bezbłędną precyzję i wewnętrzny napęd do wykonywania zadań z absolutną doskonałością.", blendWork: "To wyposaża Cię w poziom żelaznej dyscypliny, analitycznej sprawności i kontroli jakości znacznie przewyższający to, co ludzie zazwyczaj zauważają na pierwszy rzut oka.", blendRisk: "Pod ogromnym stresem ta kombinacja może łatwo prowadzić do poważnego 'paraliżu analitycznego', nadmiaru paraliżującej ostrożności lub stawiania wymagań, które inni nie są w stanie spełnić." }
      },
      strengths: {
        RR:["Wyjątkowa zwinność w podejmowaniu szybkich decyzji o wysokiej stawce","Wyznacza kurs zespołu z absolutną, niezachwianą jasnością","Rozwija się znakomicie przy przyjmowaniu dużej odpowiedzialności","Kieruje skomplikowanymi projektami z ogromną stanowczością","Utrzymuje nierozerwalne, laserowe skupienie na końcowych wynikach"],
        RY:["Generuje bez wysiłku inercję projektu i szybkie tempo pracy","Idealnie łączy agresywny napęd z wysoką widocznością w zespole","Posiada ogromną siłę perswazji w mobilizowaniu ludzi","Dokładnie wie, jak sprawić, by wielka ambicja była głęboko inspirująca","Wyraźnie podnosi energię i entuzjazm otaczający główne cele"],
        RG:["Po mistrzowsku równoważy wysokie wymagania z prawdziwą ludzką empatią","Buduje niezwykle solidne relacje zaufania w miarę postępu projektów","Prowadzi z absolutną stanowczością, nie zostawiając nikogo w tyle","Jest niesamowicie bezpośredni i jasny, nie będąc przy tym chłodnym","Wspiera wyniki najwyższej klasy, dbając jednocześnie o klimat w pracy"],
        RB:["Łączy ducha śmiałego działania z ogromnym analitycznym rygorem","Podejmuje wyjątkowo precyzyjne, wysoce uzasadnione decyzje","Nigdy nie poświęca długoterminowej jakości dla krótkotrwałej szybkości","Rozjaśnia zamieszanie i hałas, stosując bezbłędną logikę","Ustanawia i nieustępliwie utrzymuje bardzo wysokie standardy wydajności"],
        YR:["Posiada naturalną łatwość do szybkiego inspirowania i mobilizowania ludzi","Wnosi zaraźliwą mieszankę jasnego optymizmu i zdrowej ambicji","Dramatycznie podnosi poziom energii w całej grupie roboczej","Wie, jak przekazywać poczucie pilności i witalności nowym pomysłom","Zachęca do szybkiego działania poprzez głęboko zaraźliwy entuzjazm"],
        YY:["Generuje ekscytację i wysokie oczekiwania całkowicie naturalnie","Łączy się z ludźmi z zadziwiającą łatwością i autentycznością","Dokładnie wie, jak utrzymać wysoki poziom motywacji przez cały czas","Tworzy bardzo pozytywną i bezproblemową dynamikę pracy","Dba o to, by absolutnie wszyscy czuli się istotną częścią projektu"],
        YG:["Dostarcza głęboko ciepłą, przystępną i wysoce włączającą energię","Nawiązuje więzi absolutnego zaufania w rekordowym czasie","Wie, jak zachęcać i motywować innych w niezwykle naturalny sposób","Zmienia pracę zespołową w prawdziwie bezpieczną i produktywną przestrzeń","Doskonale łączy osobistą troskę z zaciekle pozytywnym nastawieniem"],
        YB:["Ma niezwykłą zdolność do łączenia pomysłów w bardzo kreatywny sposób","Wie, jak przekazywać złożone koncepcje w bardzo angażujący sposób","Idealnie równoważy naturalną ciekawość z głęboką analityczną refleksją","Jest w stanie ułatwić zrozumienie nawet najbardziej zawiłych kwestii","Bezbłędnie łączy szeroką wyobraźnię z analitycznym podejściem do detali"],
        GR:["Oferuje ogromne wsparcie, nigdy nie tracąc niezbędnej stanowczości","Osiąga pełne zaangażowanie zespołu, wspierając głębokie wzajemne zaufanie","Wie, jak zarządzać wysoce delikatnymi sytuacjami z dużym opanowaniem","Zapewnia bezpieczeństwo psychologiczne, nie tracąc z oczu celu","Utrzymuje absolutną stabilność relacji pod ogromną presją"],
        GY:["Sprzyja poczuciu ogromnej przynależności i prawdziwego ciepła","Dokładnie wie, jak w subtelny sposób poprawić nastrój ludzi","Utrzymuje niezwykle stabilny, zdrowy i pozytywny klimat w pracy","Jest niezłomnym obrońcą kultury zespołu i jego spójności","Zapewnia, by ludzie czuli się docenieni, zauważeni i uznani"],
        GG:["Jest absolutnym fundamentem dla budowania relacji głębokiego zaufania","Oferuje stałe, solidne i w pełni niezawodne wsparcie przez cały czas","Wnosi ogromną stabilność i spokój w do każdego chaotycznego otoczenia","Wyróżnia się wyjątkową zdolnością do aktywnego i empatycznego słuchania","Wzmacnia spójność grupy w cichy, ale niezwykle potężny sposób"],
        GB:["Wie, jak idealnie zrównoważyć osobistą opiekę z techniczną precyzją","Uważnie ocenia długoterminowy wpływ każdego pojedynczego działania","Posiada wysoce solidny, dobrze ugruntowany i wiarygodny osąd","Podejmuje się wsparcia zespołu kierując się ogromnym poczuciem odpowiedzialności","Nieskazitelnie łączy ludzką empatię z chłodną refleksją analityczną"],
        BR:["Zawsze utrzymuje wyjątkowo wysokie, bezkompromisowe standardy jakości","Działa kierując się czystą logiką, zapewniając wielki naturalny autorytet","Wprowadza ścisłą dyscyplinę i metodyczność we wszystkich procesach decyzyjnych","Jest ostatecznym strażnikiem jakości pod olbrzymią presją czasu","Ma rzadki talent do przewidywania słabości i zagrożeń przed innymi"],
        BY:["Łączy ogromne możliwości analityczne z bardzo bogatą wyobraźnią","Zazwyczaj wprowadza wysoce innowacyjne i głęboko oryginalne podejścia","Posiada umiejętność prostego i eleganckiego tłumaczenia trudnych koncepcji","Dostarcza kreatywne rozwiązania, nie tracąc wątku logicznego","Wie, jak powiązać analityczny rygor z nieskalaną oryginalnością"],
        BG:["Myśli z ogromną ostrożnością i działa z ogromną odpowiedzialnością","Wydaje spokojne, bezstronne i wysoce zrównoważone opinie","Jest potężnym obrońcą standardów jakości oraz całego zespołu ludzkiego","Ma wizję pozwalającą na ocenę ryzyka oraz wpływu na relacje międzyludzkie","Zdobywa absolutne zaufanie poprzez surowy rygor i szacunek dla reguł"],
        BB:["Posiada nadzwyczajne umiejętności do przeprowadzenia głębokich, bezbłędnych analiz","Jest bezwzględnym strażnikiem wszelkich norm, zasad i ustalonych procedur","Wprowadza nieskazitelną spójność i aptekarską precyzję w każdą pracę","Wyróżnia się niesamowitą zdolnością do prognozowania i szczegółowego planowania","Stale i nieustępliwie podnosi poziom jakości dzięki wielkiemu rygorowi"]
      },
      watchouts: {
        RR:["Może stać się nadmiernie autorytarny i wymagający, jeśli tempo pracy zwalnia","W bezlitosnym dążeniu do szybkości może całkowicie zignorować emocjonalny wpływ na zespół","Ma tendencję do silnego oczekiwania, że inni będą działać dokładnie na tym samym poziomie intensywności co on"],

        RG:["Może doświadczać silnego konfliktu wewnętrznego między pragnieniem harmonii a koniecznością bycia bezpośrednim","Często bierze na siebie nadmierny ciężar odpowiedzialności za wyniki i porażki innych osób","Zwykle łagodzi konstruktywną krytykę, co pozbawia ją mocy i ogólnej skuteczności"],

      strengths: {
        RR:["Yüksek riskli, hızlı kararlar almada olağanüstü bir çevikliğe sahiptir","Takımın rotasını mutlak, sarsılmaz bir netlikle anında belirler","Büyük sorumluluklar üstlendiğinde inanılmaz derecede gelişir ve büyür","Karmaşık projeleri çok muazzam bir kararlılıkla ileriye taşır","Nihai sonuçlara lazer benzeri, sarsılmaz bir şekilde odaklanmayı sürdürür"],
        RY:["Hiçbir çaba harcamadan projelere çok büyük bir atalet ve çalışma temposu yaratır","Mükemmel düzeyde, agresif bir çalışma gücünü çok yüksek bir takım görünürlüğü ile kusursuzca harmanlar","İnsanları çok hızlıca motive etmek ve aynı hizaya getirmek için devasa bir ikna gücüne sahiptir","Son derece yüksek tutkuları nasıl derin bir ilham verici duruma dönüştüreceğini çok iyi bilir","Temel veya asıl hedefleri çevreleyen o müthiş enerjiyi ve coşkuyu gözle görülür şekilde çok yükseltir"],
        RG:["Son derece yüksek talepleri, içten ve insanlara odaklı bir empatiyle zekice dengeler","Projeler ilerledikçe kaya gibi çok sağlam, güvenilir, karşılıklı destekleyici ilişkiler kurar","Arkada kesinlikle hiçbir kimseyi bırakmadan veya incitmeden mutlak bir kararlılıkla liderlik eder","Asla soğuk, mesafeli veya ilgisiz görünmeden inanılmaz derecede çok doğrudan ve nettir","Çalışma ortamının o sıcacık iklimini çok dikkatlice koruyarak en üst düzey performansı teşvik eder"],
        RB:["Oldukça cesur ve net bir eylem ruhunu, son derece muazzam bir analitik titizlikle çok iyi birleştirir","İstisnai derecede hassas, çok sağlam, kanıtlanmış veya temellendirilmiş mükemmel kararlar alır","Kısa vadede sağlanacak çok hızlı bir tempo uğruna uzun vadeli yüksek kaliteyi asla ama asla feda etmez","Tamamen kusursuz işleyen bir mantık kullanarak ortamdaki kafa karışıklığını ve gürültüyü silip atar","Çok yüksek, kaliteli ve şaşmaz performans standartlarını sarsılmaz bir şekilde kurar ve bunu acımasızca korur"],
        YR:["İnsanlara çok hızlı bir şekilde ilham verme, onları teşvik etme ve çok hızlıca harekete geçirme konusunda inanılmaz derecede doğal bir yeteneğe sahiptir","Göz kamaştırıcı ve çok parlak bir iyimserlik ile birlikte, son derece sağlıklı bir hırsı birbirine katarak müthiş ve bulaşıcı bir karışım sunar","Tüm çalışma grubunun veya devasa bir ekibin enerji ve duygu seviyesini tek bir anda olağanüstü, dramatik bir biçimde artırır","Yepyeni, hiç keşfedilmemiş fikirlere veya harika girişimlere, devasa bir aciliyet ile yepyeni taze bir canlılık hissini tam olarak nasıl ileteceğini bilir","Son derece derinlere işleyen, herkese yayılan ve çok bulaşıcı devasa bir coşku ile o an gerekli olan çok hızlı bir eylemi anında teşvik eder"],
        YY:["Topluluklarda heyecan dalgasını, beklenen büyük mutluluğu ve çok yüksek olumlu beklentileri tamamen çok saf ve doğal bir biçimde hemen üretir","İnsanlarla şaşırtıcı ve çok görülmemiş bir kolaylıkla, hiçbir maske olmadan büyük bir özgünlük ile harika bir bağ kurar","Tüm projede süregelen ve bir ekibi ayakta tutan motivasyon veya moral seviyelerini sürekli olarak en üst noktada nasıl tutacağını tam olarak çok iyi bilir","Oldukça yüksek oranda ve hiçbir şekilde sürtünme oluşturmayan, tamamen pozitif çalışma ortamları ve çalışma dinamikleri yaratır","İstisnasız bir şekilde projede bulunan veya yer alan kesinlikle herkesin projenin çok hayati ve büyük bir parçası gibi hissetmesini garantiler"],
        YG:["Son derece derin, çok kucaklayıcı, sıcak, çok ulaşılabilir ve son derece kapsayıcı çok büyük bir huzur enerjisi sağlar","Mutlak ve şaşmaz derecede tam bir güven içeren ilişkileri inanılmaz derecede büyük bir rekor sürede veya tek bir anda anında kurar","Başkalarını inanılmaz derecede çok doğal, zorlamasız ve sevgi dolu bir şekilde nasıl anında cesaretlendireceğini ve çabucak motive edeceğini tam olarak bilir","Toplulukla gerçekleştirilen her bir grup çalışmasını veya ortak mesaiyi gerçekten ve son derece çok güvenli ve oldukça üretken harika bir alana kolayca dönüştürür","Kişisel, yürekten sevecenliği ve insanlara gösterdiği büyük bir bakımı, son derece ateşli ve tamamen olumlu, pozitif bir tutumla çok mükemmel bir şekilde birleştirmeyi başarır"],
        YB:["Fikirleri birbiriyle son derece farklı ve son derece yaratıcı yollarla birbirine bağlama konusunda inanılmaz derecede kayda değer, nadir bir yeteneği ve kolaylığı vardır","Çok karmaşık yapıdaki kavramları, insanları tamamen olayın içine çekecek ve onları tamamen bağlayacak çok sürükleyici bir yolla tam olarak nasıl ileteceğini ve özetleyeceğini çok iyi bilir","Tamamen doğal gelişen bir merak dürtüsünü, oldukça derin ve fazlasıyla analitik kusursuz bir yansıma yeteneğiyle tek bir eylemde veya ifadede çok mükemmel bir şekilde dengeler","Anlaşılması ve incelenmesi en derin ve tartışmaya açık, tamamen en karmaşık ve son derece çapraşık konuları bile hiç zorluk çekmeden çok kolay erişilebilir ve anlaşılabilir kılma yeteneğine her durumda çok fazlasıyla sahiptir","Hiçbir sorun yaşamadan çok geniş ufuklara sahip bir hayal gücünü veya yaratıcılığı, mutlak surette detaylara sıkı sıkıya çok sert bir şekilde odaklanmış bir veri analizi ile hatasız bir şekilde çok harika bir biçimde mükemmelce birleştirir"],
        GR:["Hiçbir zaman, kati surette ve tamamen gereken mutlak sertliği veya kesin otoriterliği asla ve asla çok ufak da olsa bir kaybetme yaşamadan, tüm insanlara hayal edilemez büyük bir muazzam sınırsız destek sunar","Topluluktaki çok büyük bir derinliğe sahip ve mutlak tamamen karşılıklı sadakat içeren güveni teşvik ederek ve büyüterek tüm ekibin çok tam ve sonsuz olan sarsılmaz koşulsuz taahhüdüne tamamen ulaşır","Yüksek riskli veya son derece aşırı derecede fazlasıyla hassas ve incelikli bir yapıda gelişen durumları çok büyük ve muazzam sarsılmaz bir sükunetle, sakinlikle nasıl harika yönetip organize edeceğini tam ve net olarak harika bilir","Hedefte olan veya ulaşılması beklenen o büyük amaca, vizyona ulaşma hedefini tamamen asla ve de asla bir saniye dahi kesinlikle gözden ve akıldan hiç kaçırmadan çok mutlak ve kocaman bir sonsuz psikolojik tam güvenlik kalkanı sağlar","Büyük veya sonsuz derecede çok muazzam güçlü bir baskı ve çok ağır bir iş yoğunluğu yükünün mutlak altında bile iken dahi ilişkilerdeki sarsılmaz sonsuz kesin mutlak istikrarı hiçbir anında bile korumayı başarır"],
        GY:["Topluluk içerisinde gerçekten son derece samimi olan, çok muazzam kocaman, sarsılmaz, devasa büyük bir sonsuz aidiyetlik derin hissini ve çok çok tamamen son derece inanılmaz dürüst, çok büyük, sıcak ve çok güçlü bir insan dostu, samimiyet sıcaklığını sürekli çok güçlüce besler","Tüm kişilerin ruh halini tam olarak ne şekilde, inanılmaz, harika çok ustaca muhteşem büyük ve son derece bir incelikle yukarı kaldıracağını tek hamlede çok çok iyi ve harika bir şekilde bilir","Tüm ofisteki o devasa ortamdaki ve genel projedeki çalışma içsel ve işleyiş iklimini inanılmaz derecede çok aşırı bir şekilde istikrarlı, devamlı, gerçekten çok dürüst sağlıklı ve hiç bitmeyen durmayan çok aşırı seviyede büyük bir pozitif, harika bir şekilde muhafaza eder","Şirketteki takım iç kültürünün veya oluşan topluluk kültürünün, ekip sadakatinin ve birbirine derinden bağlılığının, sonsuz harika büyük, yıkılmaz ve her duruma mutlak direnen tamamen inanılmaz, çok güçlü bir sağlam savunucusu, muhafızıdır","Ekipte bulunan tüm insanların kendilerini içtenlikle derinden inanılmaz, harika sonsuz değer verilmiş, çok iyi bir şekilde görülmüş, tümüyle duyulmuş ve tam olarak mutlak büyük takdir edilmiş olarak çok güçlü hissetmelerini mutlak ve her şekilde tüm benliği ile kesin olarak sağlar"],
        GG:["Son derece derinlere işleyen güçlü bir bağ kurmak, çok derin büyük sarsılmaz ilişkiler geliştirmek veya sarsılmaz bir harika sonsuz güven inşa etmek veya tamamen çok büyük ilişki kurmak adına tek bir mutlak kırılmaz sonsuz direk ve harika, çok güçlü mutlak büyük temel sağlam bir duvardır","İhtiyaç duyulan o andan tamamen sonsuza dek tüm, her bir zaman zarfı harika diliminde mutlak her daim sürekli, çok fazlasıyla, sonsuz ve harika, son derece büyük bir sağlam ve her an kesin olarak, tamamen harika çok inanılmaz büyük derecede sonsuz güvenilir bir eşsiz, sarsılmaz sığınak veya destek sunar","Çok tehlikeli, fırtınalı çok zor veya kaotik olabilen, yıkıcı duran, çok büyük her nevi çılgınca ortama inanılmaz harika büyük, muazzam şahane bir devasa stabilite, huzur harika büyük bir sağlam derinlik, istikrar ve mutlak çok harika bir sonsuz sükunet getirir","Özellikle ama özellikle çok aktif, eyleme geçmiş, aktif büyük devasa aktif, mükemmel empatik olan çok ama çok güçlü çok inanılmaz bir, son derece, mükemmel, harika eşsiz bir tamamen üstün olağanüstü sarsılmaz, mükemmel eşsiz pürüzsüz mutlak dinleme ve kulak asma çok muhteşem kapasitesiyle açık ara hemen en önce çok harika bir şekilde göze çarpar","Herkesi içine alan, takımın o güçlü grubun o çok sıkı dayanışmasını ve tüm o bütünleyici eşsiz mutlak birleşik ortak güçlü harika grup dinamiği kohezyonunu, tamamen eşsiz ve harika, son derece muazzam sessiz fakat aynı zamanda harika, muazzam inanılmaz boyutlarda çok şahane büyük ve de sarsılmaz güçlü bir tarzda mükemmel pekiştirir ve kuvvetlendirir"],
        GB:["Çok değerli kişisel veya eşsiz insani tam ve kusursuz bakım ve insan dostu özenini tamamen üstün mutlak yüksek, eşsiz teknik uzman harika pürüzsüz hassasiyet ve sarsılmaz, doğru, mükemmel şahane tam kesinlik ile nasıl çok en doğru mutlak şekilde ve kusursuz mükemmel, harika tam çok güçlü devasa harika mükemmel harika dengeleyeceğini sarsılmaz, kusursuz tam tamamen gerçekten en şahane en harika ve çok ama çok mükemmel net biçimde en doğru bilir","Yapılan veya her bir harika eşsiz tek büyük bir güçlü tek bireysel tam işlemin eylemin, uygulamanın kararının en derin tam potansiyel çok muazzam olan tüm uzun harika dev vadeli etkisini çok son derece ama inanılmaz oldukça büyük titiz dikkatli detaylı incelikle ile değerlendirir harika, güçlü büyük tam kusursuzca sarsılmaz şahane olarak inceler","Her daim çok son derece tam mutlak mükemmel son derece, son derece tam gerçekten çok harika pürüzsüz büyük sağlam ve son derece iyi çok güçlü çok sıkı derin mutlak pürüzsüz, harika mükemmel tam hatasız son derece şahane pürüzsüz güçlü net temellendirilmiş açık ve de son derece inanılmaz harika eşsiz güçlü büyük mutlak tamamen çok, çok tam güvenilir pürüzsüz çok büyük tam sağduyu veya eşsiz yargı kararına veya pürüzsüz güce tam olarak mükemmel şahane büyük olarak en eksiksiz mutlak biçimde gerçekten tam çok sağlam harika büyük sarsılmaz devasa biçimde son derece sahiptir","Zorda olan büyük takıma destek harika yardım etme yükünü sorumluluğunu her durumda tamamen üstün kocaman muazzam büyük ebedi sonsuz sarsılmaz dev harika büyük mutlak muazzam ve harika kocaman bir büyük devasa ebedi şahane büyük üstün çok derin hissel bir sarsılmaz tam yüksek büyük sağlam çok büyük dürüst tam ebedi kocaman sarsılmaz ve mükemmel sorumluluk tamamen duygusu harika içsel pürüzsüz hissinden tam olarak tamamen gerçekten şahane büyük mutlak biçimde alıp ve sonsuz yüksek mutlak biçimde kusursuz büyük olarak tam kesin dev olarak çok büyük eşsiz harika üstlenir"],
        BR:["Hiçbir zaman, hiçbir durumda hiçbir, ama hiçbir, ne de son derece tek tam an mutlak tam büyük, kocaman muazzam yüksek standartlarını bir zerre milim olsun bile tam dahi düşürmeden ve de tam kesin olarak katiyen asla harika büyük katiyen taviz kati büyük taviz harika tam olarak tamamen son derece büyük çok vermeden, harika daima mutlak büyük, her tam koşulda her mükemmel tam zaman harika her bir koşul tam istisnasız büyük dev üstün tam istisnai olarak harika üstün, son derece tamamen mükemmel pürüzsüz çok harika yüksek, sarsılmaz, kesin mükemmel pürüzsüz çok şahane yüksek kaliteli eşsiz standartlarını tamamen mutlak hep sarsılmaz büyük korur"],
        BY:["Tam olarak büyük mükemmel pürüzsüz zengin harika büyük kusursuz zengin bir mükemmel tam yetenek olan sarsılmaz yüksek analitik gücünü tam harika mutlak muazzam büyük son derece geniş, oldukça büyük eşsiz son derece zengin tam mükemmel tam zengin mutlak oldukça sarsılmaz büyük zengin oldukça mükemmel tam çok dev hayalperest tam kocaman çok yüksek derecede eşsiz harika son derece hayal dünyası çok eşsiz büyük geniş son derece harika geniş ve çok güçlü, çok zengin, çok oldukça yüksek muazzam inanılmaz yaratıcı muazzam muhteşem eşsiz çok son derece şahane eşsiz pürüzsüz olan büyük geniş zengin harika muhteşem derin oldukça yüksek güçlü bir şahane büyük harika pürüzsüz güzel zihinle mutlak tam şahane eşsiz olarak kusursuz biçimde mükemmel pürüzsüz güçlü çok harika mutlak olarak birleştirir"],
        BG:["Adımlarını oldukça harika tam muazzam pürüzsüz dikkatli son derece oldukça yüksek mükemmel çok harika çok inanılmaz oldukça eşsiz büyük sonsuz derece harika muazzam tam yüksek pürüzsüz eşsiz oldukça çok şahane büyük oldukça harika mutlak son derece çok harika tamamen muazzam derece büyük uç aşırı, son derece çok yoğun çok büyük eşsiz dikkat mükemmel muazzam yüksek tedbir, mutlak pürüzsüz ve çok şahane yoğun büyük sarsılmaz eşsiz mutlak çok büyük tam mükemmel güçlü oldukça harika çok yüksek eşsiz büyük özen pürüzsüz tedbir mutlak ihtiyat ve pürüzsüz sağduyu ile mükemmel mutlak düşünüp ve atacağı tek büyük sarsılmaz her tam bir adamı tam oldukça eşsiz son derece yüksek çok sarsılmaz çok mutlak inanılmaz devasa yüksek harika eşsiz çok mutlak dev büyük sarsılmaz tam şahane sorumluluk duygusu ile son derece çok dikkatlice yapar"],
        BB:["Tüm incelemeleri yaparken çok eşsiz pürüzsüz olağanüstü mutlak tam harika yüksek derecede büyük tam derin şahane sarsılmaz uç derin harika çok yüksek uç eşsiz büyük mutlak çok son derece mutlak sarsılmaz oldukça uç çok eşsiz tam derinlemesine harika büyük pürüzsüz mutlak ve oldukça şahane hiçbir şeklide harika en küçük mutlak tek kusuru veya uç büyük zayıflığı zerre tam olarak bulunmayan hiçbir harika mutlak hiçbir en ufak tam çok son derece oldukça ufak hata veya hiçbir çok tam pürüzsüz küçük leke kusur tam olarak kesin mutlak barındırmayan sarsılmaz, pürüzsüz, çok mükemmel oldukça eşsiz tam kusursuz uç mükemmel pürüzsüz şahane mutlak eşsiz harika ve son derece eksiksiz uç çok mükemmel tam hatasız pürüzsüz ve mükemmel mutlak derin harika pürüzsüz büyük bir oldukça uç yüksek mükemmel sarsılmaz uç analiz muazzam dev tam analitik harika şahane pürüzsüz eşsiz potansiyele ve sarsılmaz, mükemmel tam kapasiteye mükemmel eşsiz sahip sarsılmaz mutlak tam mutlak pürüzsüz harika eşsiz uç çok yüksek tam çok mutlak büyük uç yetenekleri kendisinde barındırır"]
      },
      watchouts: {
        RR:["İş akışının genel ritmi, temposu çok hafif veya kısmen biraz düştüğünde ya da biraz veya tamamen aşırı mutlak yavaşladığında dahi oldukça hemen hızlıca son derece gereğinden çok aşırı fazla emredici diktatör baskıcı çok son derece yüksek uç otoriter mutlak uç ve son derece aşırı büyük baskıcı zorlayıcı ve inanılmaz derecede mutlak oldukça son derece aşırı ve fazla uç aşırı seviyede ezici veya çok aşırı baskın derecede talepkar sıkı buyurgan bir tam diktatör haline çok hemen hızla veya uç anında çok sarsılmaz biçimde mutlak son derece hemen çok süratle gelebilir veya anında hızla böyle bir pozisyonu duruşu veya hemen tutumu süratle dev anında hemen hızla takınabilir"],
        RY:["Görevini yerine getirirken hissettiği o devasa aşırı son derece uç çok son derece büyük hız isteği ve hiç tükenmeyen o dev hiç bitmeyen muazzam büyük son derece son derece güçlü uç dev tempo dürtüsü veya yüksek heyecan telaş nedeniyle, kendisini veya etrafı aşırı şekilde sarsılmaz biçimde tamamen dev yutabilecek veya son derece tamamen ezebilecek o büyük son derece çok güçlü son derece tamamen aşırı uç muazzam büyük veya oldukça tam aşırı yüksek tamamen ve kesin tamamen olan oldukça son derece gerçek oldukça son derece devasa uç büyük aşırı reel olan çok uç derece büyük ciddi potansiyel olan o tamamen son derece ciddi çok uç yüksek olan dev veya çok gerçekten oldukça tam son derece çok büyük son derece uç büyük devasa kesin riskli olan her büyük mutlak tam son derece muazzam her bir tamamen yüksek dereceli en ufak detay içeren çok büyük tam çok muazzam büyük olası uç büyük pürüzü ya da son derece tam mutlak çok aşırı son derece olan pürüzü zorluğu anında körü körüne mutlak hiç bilmeden son derece görmezden uç derece hemen çok hızla gelebilir ve devasa büyük tam mutlak bir büyük hata olarak büyük hiç görmeden tam atlayabilir"],
        RG:["Kararlar verirken içindeki o son derece derin mutlak ve çok aşırı yüksek güçlü harika tam son derece güçlü son derece yoğun derin barış uyum veya tatlı anlaşma arzusu ile hiç durmadan karşısındakilere tamamen büyük ve her şeyi hemen dosdoğru hemen oldukça aşırı son derece açık, net tam çok yüksek sarsılmaz doğrudan ve hiç eğip bükmeden açık olmak mecburiyeti tam hissi ve aciliyeti veya açık yüksek ihtiyacı arasında kendisini iki dev güç arasında kalmış gibi hissedip kendi dev kalbinde büyük son derece oldukça ve sarsılmaz hiç durmayan bir son derece çok yoğun büyük devasa, zorlu veya çok acımasız ve acı verici, çok yıpratıcı yoran çok uç yüksek ve aşırı yorucu keskin çok dev güçlü sarsılmaz mutlak büyük bir iç savaş yüksek veya zorlayıcı, çok ezici son derece oldukça veya dev gerilim çatışma tam mutlak veya dev ikilem sarsılmaz çıkmaz gerilim yaşayabilir"],
        RB:["Standartların veya koyduğu hedeflerin küçük veya en hafif ufak bir oranla bile hiç beklenmedik şekilde çok ufak biraz düşmesi durumunda dahi bir anda çok hızlı veya oldukça çok ani ve oldukça hemen veya anında sarsılmaz son derece tamamen anında o an büyük çok hızla son derece mutlak hemen oldukça son derece son derece uç yoğun hemen katı kuralcı aşırı derece hiç sarsılmaz biçimde tavizsiz asla son derece hiç son derece bükülmez çok son derece mutlak kesin acımasız oldukça uç derece sert katı ve veya toleranssız veya aşırı uç katı tavizsiz şekilde dev boyutta oldukça uç acımasız kuralcı toleranssız sert birisi olabilir"],
        YR:["İçsel bir plana uygun tam veya gerçek güçlü stabil herhangi bir temel hiç olmadan tamamen son derece çok büyük dev bir aşırı yüksek ilk son derece tamamen çok sarsılmaz ilk o mutlak tamamen sarsılmaz anlık aşırı uç ilk andaki muazzam o yüksek harika dev büyük hız ve o dev dürtü, heyecan ile her projeye hemen son derece uç büyük ilk aşırı hız o an büyük aceleci veya tamamen plansız, çok aşırı tam çok acele olan o büyük hiç anlık bir coşku anında hemen çok plansız hızla o büyük tamamen hız anında veya bir ilk uç andaki sevinçle yüksek oldukça mutlak ve hemen tamamen düşünmeden sarsılmaz ve son derece son derece hemen plansız biçimde hemen tam son derece ani acele anında çok hızla 'evet' deyip sonrasında oldukça yüksek uç çok aşırı tamamen büyük bir mutlak uç organizasyon çok son derece dev aşırı ciddi plan veya çok son derece sıkı organizasyon ve devam sorunu veya dev büyük son derece eksiklik sarsılmaz veya disiplin çok büyük noksanlık ya da eksiklik son derece uç dereceli çok tam eksiklik anında çok yaşayabilir"],
        YY:["Bir projenin, kendisine olan o son derece yepyeni ışıltılı harika o parlak canlı ve o ilk anda göz kamaştıran ve aydınlatan hiç beklenmeyen son derece son derece tamamen ışıltılı büyüleyici o taze heyecan verici ve parlak olan ilgi çekici çok son derece ilk heyecan verici büyülü, hiç çok olağanüstü yüksek ve pürüzsüz olan harika olan o büyük ilgi harika çeken devasa aşırı son derece büyük harika tatlı çok taze ilk muazzam parlaklık ve göz alıcı o uç yenilik ve ilk tatlı harika dev eşsiz büyü veya dev yenilik faktörü, veya ilk çok son derece taze tazelik veya eşsiz o büyük aşırı heyecan uyandıran yüksek ilgi harika kısmı en ufak anında ortadan hemen anında hızla yavaş yavaş mutlak tam ve çok hızlı olarak son derece hızlı hemen oldukça anında hemen yavaşça hızla, anında hemen veya çok hemen süratle hızla biraz silindiği çok ufak tamamen sarsılmaz hızla kaybolduğu veya azaldığı ve biraz o dev ilgi tamamen azaldığı uç çok son derece anında her şeyden önce hemen büyük hızla dikkati anında anında son derece çok aşırı derecede tamamen çok uç hemen mutlak hızla sarsılmaz bir sarsılmaz biçimde tam olarak çok anında tamamen oldukça uç hızla dikkati ve o dev büyük odaklanmayı konsantrasyonu tamamen anında oldukça uç bir anda hemen tamamen devasa kaybedebilir"],
        YG:["İlişkilere, dostluğa ve sıcak uyuma olan güçlü ve aşırı derecede çok derin son derece o tatlı son derece harika uç o sarsılmaz derin iyi o tam sıcak olan yüksek güçlü bağı, şahane eşsiz bir büyük iş yeri çevresine olan sarsılmaz yüksek uç tamamen sıcak o büyük harika dostça iyi niyet bağı isteğine olan son derece mutlak, eşsiz güçlü çok yüksek bağlılığı veya sevgisi nedeniyle bazen aşırı son derece uç çok yüksek derecede sarsılmaz büyük bir tam istekle her türlü ne olursa olsun herhangi son derece her mutlak büyük her bir pürüzü çatışmayı o çok büyük, net olan büyük, iş odaklı o yüksek çok aşırı son derece uç derecede çok sert netliği veya son derece pürüzsüz tamamen tam olan iş odaklı büyük yüksek dürüst şeffaflığı tam verimliliği veya doğruluğu büyük dev gerçeği oldukça tamamen büyük sarsılmaz derecede büyük net ve çok katı verimliliğin ya da açık mutlak gerçeğin kendisinin son derece aşırı büyük ölçüde mutlak tam çok yüksek zararına veya onun son derece devasa o büyük ve aşırı dev yüksek uç tamamen net büyük yıkımına sebebiyet verecek dereceye kadar ulaştıracak biçimde son derece tamamen veya oldukça pürüzsüz harika bir şekilde tamamen veya oldukça uç boyuta çok büyük boyuta veya feci boyuta hemen uç taşıyarak ona her büyük derecede hemen çok aşırı ve tamamen çok fazla son derece büyük veya tamamen tam son derece uç büyük boyutta çok son derece büyük bir ağırlık veya uç aşırı dereceli aşırı yoğun çok yüksek önem ya da çok aşırı son derece yüksek öncelik ya da o ilk tam son derece o muazzam dev tam son derece o çok yüksek ilk sırayı veya sırayı hemen bir öncelik verip önceliği o uç seviyeye veya oldukça mutlak o üst ilk büyük dev dereceye son derece anında son derece hemen her şeyden yüksek çok büyük taşıyabilir"],
        YB:["Uygulamada olması gereken veya mutlak gerçek hayatta hemen acilen pratik bir oldukça yüksek ve tamamen hızlıca çok acil olarak eyleme sarsılmaz bir biçimde hemen hızla eyleme dönüşmesi için veya anında geçmesi için tamamen çok yüksek bir mutlak ihtiyaç çok duyulan, gereken ve oldukça beklenen çok anlık hemen eyleme dökülmesi tam gereken kararlardan veya çok tamamen pürüzsüz güçlü o hızlı uygulamalardan çok çok aşırı mutlak derece fazla, gerçekten inanılmaz derece son derece oldukça aşırı ve çok büyük çok yüksek veya sarsılmaz biçimde tamamen devasa oldukça oranda çok büyük derecede uzunca daha tamamen aşırı derecede çok daha fazla bir süre tamamen sadece ve sarsılmaz, sadece ve mutlak sırf sadece fikir üretme çok uç seviyede fikir geliştirme ideasyon hayal veya sadece tam zihinsel aşama, taslak fikir evresi plan veya teori ya da o ilk pürüzsüz eşsiz harika düşünsel veya fikir hayal plan evresinde çok tamamen oldukça mutlak seviyede kalma veya çok son derece sıkışıp orada sadece tıkılıp sonsuz orada sadece takılıp zihinsel kısımda kalarak veya sarsılmaz tamamen uç o tek aşamada o hayal sürecinde öylece orada donup o an çok aşırı büyük derecede kalma ve uç tamamen durma riskini, oldukça sarsılmaz büyük muazzam seviyede her an son derece o tam aşırı büyük derecede büyük tehlikesini her an veya oldukça mutlak devamlı taşır"],
