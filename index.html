      tips: {
        RR:["Onunla iletişim kurarken çok doğrudan, son derece net olun ve konuların ana hatlarına çok hızlı bir biçimde geçin","Bütün konuşmaların veya tartışmaların ana odak noktasını temel hedefler, son tarihler ve kesin sonuçlar olarak belirleyin","Hedefler açıkça ve kesin bir şekilde tanımlandığı sürece ona işleri yönetebileceği tam bir özgürlük ve esneklik tanıyın","Sizden özellikle bir ayrıntı talep etmediği sürece uzun açıklamalarda, derin analizlerde veya gereksiz yan yollarda kaybolmaktan kaçının"],
        RY:["Herhangi bir etkileşiminizde yüksek bir enerji, son derece çevik bir çalışma temposu ve dinamizm getirin","Görevlerini her zaman, kısa sürede görünür olan sonuçlara ve ekibin motivasyonunu artıracak başarı hikayelerine bağlamayı unutmayın","Onu çok ağır ve hantal bürokratik prosedürler veya gereksiz yere çok katı ve karmaşık kurallar ile bunaltmaktan her zaman kaçının","Projenin gidişatına dahil olmasına, başkalarını etkilemesine ve olayların genel temposunu veya hızını belirlemesine izin verin"],
        RG:["Onunla her durumda maksimum derecede dürüstlük, derin bir saygı ve olabildiğince şeffaf bir dille iletişim kurmaya gayret edin","Projeden veya kararlardan ortaya çıkacak olan belirli sonuçların insanlara, ekibe ve büyük resme doğrudan nasıl bir fayda sağlayacağını netleştirin","Beklentiler konusunda veya hedeflerde son derece net olmanın yanı sıra sürekli ve nazik bir destek sunduğunuzdan her zaman emin olun","Hem bireysel olarak elde ettiği çalışma performansını hem de çevresiyle geliştirdiği olumlu insan ilişkilerini açıkça ve cömertçe takdir edin"],
        RB:["Toplantılarına, görüşmelerine daima önceden çalışarak, çok iyi düşünülmüş argümanlarla ve tam bir hazırlık içerisinde katıldığınızdan emin olun","Önerilerinizin her birini çok sağlam kanıtlarla, incelenmiş verilerle ve oldukça spesifik net önerilerle desteklemeyi ihmal etmeyin","Onun çalışma zamanına ve doğal olarak talep ettiği çok yüksek düzeydeki kalite, düzen ve analiz standartlarına her zaman büyük bir saygı gösterin","Ona sunduğunuz veya yönlendirdiğiniz tekliflerin hem genel işleyiş ve ticari açılardan hem de kalite açısından çok mantıklı olduğunu ispat edin"],
        YR:["İletişiminizi sağlarken konuları veya görevleri son derece teşvik edici, heyecanlandırıcı ve ilgi çekici bir biçimde sunmaya çalışın","Günlük olarak yaptıkları işleri projenin nihai olumlu etkisi ve genel yarattığı rüzgarla her defasında net bir biçimde birbirine bağlayın","Onlara düşüncelerini sergileyebilecekleri, yeni fikirler geliştirebilecekleri ve oldukça bağımsız inisiyatif alabilecekleri geniş bir alan yaratın","Projelerin herhangi bir durağanlığa uğramaması, hareketli, ritimli ve sıkıcılaşmaktan uzak bir hızda ilerlemesini sürekli olarak sağlayın"],
        YY:["Çalışma ortamını daima son derece neşeli, etkileşimi güçlü, işbirlikçi, motive edici ve tamamen pozitif bir seviyede tutmaya gayret edin","Kişisel katkılarını, sergiledikleri eforları ve başarıları herkesin içinde çok açık, yüksek sesle ve oldukça cömert bir biçimde takdir edin","Önlerine son derece katı işleyiş kuralları veya hareket alanlarını sıkıntıya düşüren ağır, esneklikten uzak yöntemler koymaktan kaçının","Sadece katı çalışma ilkelerine güvenmek yerine projeyi destekleyecek enerjilerini, vizyonlarını ve yaratıcılıklarını en yoğun şekilde kullanmaya çalışın"],
        YG:["Ona karşı sergilediğiniz iletişim dilinin her zaman çok kapsayıcı, kucaklayıcı, sıcakkanlı ve açık bir tavır barındırdığından emin olun","İlişkilerinizde sadece onun o an yürüttüğü proje çalışmasına değil, dürüst ve tamamen doğal, insani bir kişisel ilgi göstermeye gayret edin","İşbirliği yapılan veya çalışma ortamlarının her bir noktasını güvenli, pozitif, huzurlu ve açık bir hedefe hizmet edecek bir alan haline getirin","Eğer herhangi bir konuda onu eleştirmeniz gerekiyorsa, bunu daima nezaket kuralları çerçevesinde, düşünerek ve oldukça hassas bir dille yapın"],
        YB:["Yeni konuları sunarken, zihnini canlandırmak, entelektüelliğini harekete geçirmek ve onun yüksek doğal merakını ateşlemek üzere planlamalar yapın","Ona yaklaşırken bir vizyonun ve ilhamın gücü ile beraber kesin bir mantıksal veya temellendirilmiş mükemmel düşünce dengesini çok iyi kurun","Konuları tamamen analiz edebilmesi, dikkatlice işleyebilmesi ve farklı çözüm alternatiflerini harmanlayabilmesi için ihtiyaç duyduğu tam özgürlüğü verin","Düşüncelerinizi daima çok büyük genellemelerle veya salt soyut kavramlarla sınırlı bırakmayın; bunları her zaman çok açık ve pratik örneklerle destekleyin"],
        GR:["Ona projeyle alakalı ilk adımları ve doğrudan çalışma hedeflerini belirtmeden çok önce derin bir insan güveni ve sarsılmaz bir ilişki oluşturun","Tüm iletişimlerinizde çok doğrudan ve konuya net odaklı olun; ancak bunu asla insanlıktan uzak, soğuk veya duyarsız hissettiren bir biçimde yapmayın","Yapması beklenen eylemlerin sadece görevlerini veya beklentileri değil, aynı zamanda eylemin temel amacını (nedenini) da detaylıca açıklamayı ihmal etmeyin","Onun sahip olduğu veya taşıdığı başkaları hakkındaki doğal şefkate, ilgiye ve güçlü duygusal korumacılığa her zaman en üst seviyede saygı gösterin"],
        GY:["Liderliğinizi ve taleplerinizi daima empati, destekleyicilik, son derece yüksek anlayış, kibarlık ve insanlara olan büyük bir yakınlık üzerinden gerçekleştirin","Hem sarf ettiği büyük çabaları hem de genel olarak çalışmasının ekip arkadaşları ve etrafındakiler üzerinde yarattığı sıcak etkiyi samimiyetle kabul edin","İletişim sırasında gereğinden fazla otoriter, keskin ses tonlarına sahip veya kişisel algılanabilecek çok sert, kırıcı ve soğuk konuşmalardan her zaman kaçının","Ona yeni veya farklı bir meydan okuma sunmadan, önce çalışma alanının psikolojik güvenliğini her şeyden tamamen arınmış bir biçimde tam olarak sağladığınızdan emin olun"],
        GG:["Kendinizi bir zırh kadar büyük bir sabırla ve insanlık dolu gerçek bir samimiyetle donatın ve ona karşı her durumda dürüst olmaya büyük bir çaba sarf edin","İyileştirici bir geri bildirim vermeniz gerektiğinde bu kelimeleri asla incitmeden, en büyük özenle ve gerçekten tamamen yardım edici bir niyetle yapın","Tüm çalışma koşullarını veya ekip dinamiklerini olabildiğince her açıdan istikrar sunan, huzurlu ve en üst düzeyde güvenilir bir ortam olarak koruyun","Küçük veya çok büyük kararlar fark etmeksizin hiçbir zaman hızlı, ani cevaplar vermesi yönünde ona aşırı bir ağırlık veya anlamsız bir baskı yaratmaktan kaçının"],
        GB:["Ona çok saygılı, her durumu hesaba katan, değerini bildiğinizi gösteren ve argümanlarınızı özenle hazırlamış bir düşünce yöntemiyle her zaman yaklaşın","Hem okumak hem de anlamak açısından ek bir açıklık kazanması amacıyla iletişim detaylarını, planlamaları ve metinleri genellikle yazılı formatlarda sağlayın","Sadece salt projenin getirdiği aşırı mantıksal gerçekleri değil, bunun yanında alacağı herhangi bir kararın insanlarda nasıl bir sonuç doğuracağını çok detaylı anlatın","Siz onlardan tam bir karar açıklamalarını ve işleyişi bitirmelerini talep etmeden önce konuyu tüm boyutlarıyla analiz etmelerine tamamen yetecek kocaman bir düşünme süresi verin"],
        BR:["İlişkilerinizde son derece spesifik, kusursuz derecede dikkatli olun ve hiçbir randevu veya tartışmaya gerekli bütünsel hazırlıkları tam olarak bitirmeden katılmayın","Bir fikri, savı veya sonucu ispatlarken bunları kesinlikle en inkar edilemez kanıtlar, güvenilir sağlam belgeler ve titizlikle çok iyi doğrulanmış yüksek kalite verilerle destekleyin","Zamanından israf edilmemesi için diyalogları gereksiz yan yollara sapmadan daima en çok etkili, spesifik duruma odaklı ve en verimli tartışma biçiminde muhafaza edin","Kendi doğanızdan kaynaklanabilecek veya onun yapısı gereği olan kişisel mesafeyi, onun büyük bir ciddiyetsizlik veya bulanıklık zannetmesine izin vermeden aşırı sıcaklıkla belirsizlik yaratmayın"],
        BY:["Tartışmalara yön verirken zihnini yeniye açık tutması ve tamamen ilgisini çekebilmesi adına oldukça ilgi uyandıran, eşi benzeri az bulunan çok yenilikçi konseptlerle gelmeye çalışın","Kesin, mutlak kararı vermesi adına konuyu ani bir biçimde kapatıp bitirmeden hemen önce bir dönem olasılıkları özgürce keşfedeceği çok zengin bir alan tanıyın","Ortaya koyacağınız tüm inisiyatiflerin veya oldukça farklı ve yaratıcı projelerin mantıksal, iyi hesaplanmış bir iş yapısına veya rasyonel arka plana sahip olduğunu ispatlayın","Adımları zorlamak yerine ilk aşamada kendisini bağımsız düşünceye davet edin, hemen sonrasında tüm süreçlerin pratik adımlarını beraber uzlaşma içerisinde ve büyük bir konsensüs ile belirleyin"],
        BG:["Tüm düşüncelerini derleyip, çıkarımlarda bulunmak ve nihai sonuca varmak üzere talep ettiği devasa, gerekli zamana ve alan ihtiyacına büyük bir sadakatle sonsuz bir saygı gösterin","Ne olursa olsun ve hangi stres şartlarında bulunursanız bulunun her durumda sakin, sakinliğinden taviz vermeyen ve bilgileri çok net, temiz, düzenli bir üslupla ileten biri olun","Alınan veya alınması muhtemel bu yeni kararların hem işin tam kalitesini hem de bu proje içinde bulunan tüm insanların durumunu tam olarak ne şekilde değiştireceğini eksiksiz anlatın","Ortada gerçekten devasa veya olağanüstü karmaşıklık içeren konular varsa, bu konuların hızlandırılması veya çabucak çözülmesi için onlara aciliyet veya anlamsız kısa süreler dayatmaktan uzak durun"],
        BB:["Kuracağınız her türlü iletişimi daima ama daima çok iyi organize edilmiş, en küçük ayrıntısına kadar belli, yüksek derecede yapılandırılmış ve olabildiğince doğrudan bir şekilde yürütün","Argüman veya analiz süreçlerinizde duygular, sezgiler veya varsayımlar yerine her defasında nesnel gerçeklerin, doğruluk belgelerinin ve açık verilerin üstünlüğüne en büyük önceliği verin","Ona sormadan önce ya da onun karar vermesini mutlak bir şekilde beklemeden evvel bu aşırı detaylı ve karmaşık verileri rahatlıkla ve özgürce inceleyebilmesi için sınırsız bir süre tahsis edin","Göndereceğiniz veya paylaşacağınız e-postalarınızın, bilgi notlarınızın ya da siparişlerinizin sadece net değil, adeta bir cam kadar berrak, inanılmaz detaylı ve yapısal olarak mükemmel olduğundan emin olun"]
      }
    };

    profileTexts.ar = {
      primary: {
        R: {
          overview: "{name}، ملفك الشخصي مدفوع بطاقة حمراء قوية. أنت شخص مباشر، حازم، وموجه بطبيعتك نحو اتخاذ الإجراءات السريعة، وتحمل المسؤولية الكاملة، وتحقيق النتائج الملموسة.",
          comm: "أسلوب تواصلك يتميز بالسرعة والوضوح والتوجه المباشر نحو الهدف. تميل عادة إلى تقييم الصدق والشفافية أكثر بكثير من الدبلوماسية، وتفضل الحفاظ على الزخم وسرعة الإنجاز بدلاً من التباطؤ. ينظر إليك الآخرون كشخص واثق بنفسه، صريح للغاية، ومستعد تماماً لاتخاذ القرار في الوقت الذي لا يزال فيه الآخرون يناقشون الخيارات المتاحة.",
          workStyle: "في بيئة عملك المثالية، تبحث باستمرار عن الوضوح، والاستقلالية، والسرعة، والتقدم الملحوظ. لديك ميل طبيعي لدفع المشاريع إلى الأمام، وتحدي أي غموض، والحفاظ على التركيز التام على ما يهم حقاً. تصل إلى أقصى درجات الفعالية عندما تكون التوقعات عالية وتكون الأدوار محددة بوضوح تام.",
          motivation: "أكثر ما يلهمك ويحفزك هو الإنجازات الملموسة، والتقدم السريع، والتحديات، والقدرة على التأثير الفعلي في النتيجة النهائية. في المقابل، فإن الركود، والتردد، والتأخير غير المبرر يستنزف طاقتك وحماسك بسرعة كبيرة.",
          decisions: "تتخذ القرارات بسرعة كبيرة وتشعر براحة تامة في الانتقال إلى العمل حتى عندما لا تتوفر لديك كل المعلومات. تثق بحكمك الشخصي، وقدرتك على قراءة الأنماط، وزخم اللحظة، مما يجعلك عنصراً رئيسياً وأساسياً في البيئات سريعة الحركة.",
          misread: "في بعض الأحيان، قد يخلط الآخرون بين وضوحك الشديد والقسوة، أو سرعتك بنفاد الصبر، أو ثقتك الكبيرة بالرغبة في السيطرة. في الواقع، نيتك ببساطة هي التصرف بكفاءة وفعالية وأن تكون مفيداً.",
          growth: "مساحة النمو لديك هي تعلم أن السرعة والوضوح يكونان أكثر قوة وتأثيراً عندما تدمجهما مع السياق المناسب، والتعاطف، وقليل من الصبر. لا يتعلق الأمر بأن تصبح 'ليناً'، بل بأن تكون أكثر قصداً ووعياً في مساعدة الآخرين على مواكبة وتيرتك."
        },
        Y: {

function translateProfile(lang, type, name) {
      const labels = colourLabels[lang] || colourLabels.en;
      const primary = type[0];
      const secondary = type[1];
      const tagline = (pairTaglines[lang] || pairTaglines.en)[type] || pairTaglines.en[type];

      const texts = profileTexts[lang] || profileTexts.en;

      const primaryBlock = texts.primary[primary] || profileTexts.en.primary[primary];
      const secondaryBlock = texts.secondary[secondary] || profileTexts.en.secondary[secondary];

      const overview = (primaryBlock.overview || profileTexts.en.primary[primary].overview).replace("{name}", name) + " " + (secondaryBlock.addition || profileTexts.en.secondary[secondary].addition) + " " + (secondaryBlock.blendWork || profileTexts.en.secondary[secondary].blendWork);
      const comm = (primaryBlock.comm || profileTexts.en.primary[primary].comm) + " " + (secondaryBlock.addition || profileTexts.en.secondary[secondary].addition);
      const workStyle = (primaryBlock.workStyle || profileTexts.en.primary[primary].workStyle) + " " + (secondaryBlock.blendWork || profileTexts.en.secondary[secondary].blendWork);
      const motivation = primaryBlock.motivation || profileTexts.en.primary[primary].motivation;
      const decisions = (primaryBlock.decisions || profileTexts.en.primary[primary].decisions) + " " + (secondaryBlock.blendWork || profileTexts.en.secondary[secondary].blendWork);
      const misread = primaryBlock.misread || profileTexts.en.primary[primary].misread;
      const growth = (primaryBlock.growth || profileTexts.en.primary[primary].growth) + " " + (secondaryBlock.blendRisk || profileTexts.en.secondary[secondary].blendRisk);

      const strengths = texts.strengths[type] || profileTexts.en.strengths[type];
      const watchouts = texts.watchouts[type] || profileTexts.en.watchouts[type];
      const tips = texts.tips[type] || profileTexts.en.tips[type];

      return { tagline, overview, comm, workStyle, motivation, decisions, misread, growth, strengths, watchouts, tips, labels };
    }

    function t(key) { return (ui[currentLanguage] && ui[currentLanguage][key]) || ui.en[key] || key; }
    function fmt(str, vars) { return str.replace(/\{(\w+)\}/g, (_, k) => vars[k] ?? ""); }

    const optionLetters = ["A","B","C","D"];
    let currentLanguage = localStorage.getItem("colourInsightsLang") || "en";
    let currentQuestion = 0;
    let answers = [];
    let participantName = "";
    let shuffledQuestions = [];

    function applyDirection() {
      const isRtl = RTL_LANGS.includes(currentLanguage);
      document.documentElement.lang = currentLanguage;
      document.documentElement.dir = isRtl ? "rtl" : "ltr";
      document.body.classList.toggle("rtl", isRtl);
    }

    function populateLanguageSelect() {
      const select = document.getElementById("languageSelect");
      if (!select) return;
      select.innerHTML = Object.entries(languages).map(([code, label]) => `<option value="${code}">${label}</option>`).join("");
      if (!languages[currentLanguage]) currentLanguage = "en";
      select.value = currentLanguage;
      select.onchange = (e) => {
        currentLanguage = e.target.value;
        localStorage.setItem("colourInsightsLang", currentLanguage);
        renderApp();
      };
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      const el = document.getElementById(id);
      if (el) el.classList.add("active");
      window.scrollTo({top:0,behavior:"smooth"});
    }

    function renderIntro() {
      const labels = colourLabels[currentLanguage] || colourLabels.en;
      const languageLabel = document.getElementById("languageLabel");
      if (languageLabel) languageLabel.textContent = t("languageLabel");
      document.getElementById("introEyebrow").textContent = t("introEyebrow");
      document.getElementById("introTitle").textContent = t("introTitle");
      document.getElementById("introSubtitle").textContent = t("introSubtitle");
      document.getElementById("nameLabel").textContent = t("nameLabel");
      document.getElementById("userName").placeholder = t("namePlaceholder");
      document.getElementById("startBtn").textContent = t("startBtn");

      document.getElementById("redName").textContent = labels.R.name;
      document.getElementById("redTag").textContent = labels.R.tag;
      document.getElementById("yellowName").textContent = labels.Y.name;
      document.getElementById("yellowTag").textContent = labels.Y.tag;
      document.getElementById("greenName").textContent = labels.G.name;
      document.getElementById("greenTag").textContent = labels.G.tag;
      document.getElementById("blueName").textContent = labels.B.name;
      document.getElementById("blueTag").textContent = labels.B.tag;
    }

    function startQuiz() {
      participantName = document.getElementById("userName").value.trim() || t("participant");
      answers = [];
      currentQuestion = 0;

      shuffledQuestions = originalQuestions.map(q => {
        let indices = [0, 1, 2, 3];
        for (let i = indices.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [indices[i], indices[j]] = [indices[j], indices[i]];
        }
        return { originalQ: q, shuffledIndices: indices };
      });

      for (let i = shuffledQuestions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [shuffledQuestions[i], shuffledQuestions[j]] = [shuffledQuestions[j], shuffledQuestions[i]];
      }

      showScreen("quiz");
      renderQuestion();
    }

    function renderQuestion() {
      const qItem = shuffledQuestions[currentQuestion];
      const qData = qItem.originalQ; 
      const total = shuffledQuestions.length;
      const pct = Math.round((currentQuestion / total) * 100);

      document.getElementById("progressLabel").textContent = fmt(t("questionOf"), {n: currentQuestion + 1, total});
      document.getElementById("progressPct").textContent = pct + "%";
      document.getElementById("progressFill").style.width = pct + "%";
      document.getElementById("questionNumber").textContent = fmt(t("qnum"), {n: String(currentQuestion + 1).padStart(2, "0"), total});
      
      document.getElementById("questionText").textContent = qData.text[currentLanguage] || qData.text.en;

      const options = document.getElementById("options");
      options.innerHTML = "";
      
      qItem.shuffledIndices.forEach((idx, letterIdx) => {
        const opt = qData.options[idx];
        const btn = document.createElement("button");
        btn.className = "option";
        
        const optText = opt.text[currentLanguage] || opt.text.en;
        
        btn.innerHTML = `<strong style="display:inline-block;width:28px">${optionLetters[letterIdx]}</strong> ${optText}`;
        btn.onclick = () => {
          answers.push(opt.c);
          currentQuestion++;
          if (currentQuestion >= shuffledQuestions.length) {
            buildReport();
          } else {
            renderQuestion();
          }
        };
        options.appendChild(btn);
      });
    }

    function computeScores() {
      const counts = {R:0,Y:0,G:0,B:0};
      answers.forEach(a => counts[a]++);
      const total = answers.length || 1;
      return {
        counts,
        pct: {
          R: Math.round(counts.R / total * 100),
          Y: Math.round(counts.Y / total * 100),
          G: Math.round(counts.G / total * 100),
          B: Math.round(counts.B / total * 100)
        }
      };
    }

    function buildReportUrl(type, sorted, pct) {
      const params = new URLSearchParams({
        report: "1", lang: currentLanguage, name: participantName, type: type,
        primary: sorted[0], secondary: sorted[1], R: String(pct.R), Y: String(pct.Y), G: String(pct.G), B: String(pct.B)
      });
      const url = new URL(window.location.href);
      url.search = params.toString();
      url.hash = "";
      return url.toString();
    }

    function setOpenReportLink(type, sorted, pct) {
      const btn = document.getElementById("openReportBtn");
      const text = document.getElementById("openReportText");
      if (!btn || !text) return;
      btn.href = buildReportUrl(type, sorted, pct);
      text.textContent = t("openReportBtn");
    }

    function buildReport() {
      const { counts, pct } = computeScores();
      const sorted = ["R","Y","G","B"].sort((a,b) => counts[b] - counts[a] || ["R","Y","G","B"].indexOf(a) - ["R","Y","G","B"].indexOf(b));
      const type = sorted[0] + sorted[1];
      const profile = translateProfile(currentLanguage, type, participantName);
      const labels = profile.labels;

      document.getElementById("reportEyebrow").textContent = t("reportEyebrow");
      document.getElementById("reportName").textContent = participantName;
      document.getElementById("reportType").textContent = labels[sorted[0]].name + " / " + labels[sorted[1]].name;
      document.getElementById("reportTagline").textContent = profile.tagline;

      const badge = document.getElementById("reportBadge");
      const dot = document.getElementById("badgeDot");
      dot.style.background = sorted[0] === "R" ? "var(--red)" : sorted[0] === "Y" ? "var(--yellow)" : sorted[0] === "G" ? "var(--green)" : "var(--blue)";

      if (sorted[0] === "R") { badge.style.background = "var(--redSoft)"; badge.style.color = "var(--red)"; }
      if (sorted[0] === "Y") { badge.style.background = "var(--yellowSoft)"; badge.style.color = "#946200"; }
      if (sorted[0] === "G") { badge.style.background = "var(--greenSoft)"; badge.style.color = "var(--green)"; }
      if (sorted[0] === "B") { badge.style.background = "var(--blueSoft)"; badge.style.color = "var(--blue)"; }

      document.getElementById("breakdownTitle").textContent = t("breakdownTitle");
      document.getElementById("overviewTitle").textContent = t("overviewTitle");
      document.getElementById("communicationTitle").textContent = t("communicationTitle");
      document.getElementById("workStyleTitle").textContent = t("workStyleTitle");
      document.getElementById("motivationTitle").textContent = t("motivationTitle");
      document.getElementById("decisionTitle").textContent = t("decisionTitle");
      document.getElementById("misreadTitle").textContent = t("misreadTitle");
      document.getElementById("strengthsTitle").textContent = t("strengthsTitle");
      document.getElementById("watchoutsTitle").textContent = t("watchoutsTitle");
      document.getElementById("tipsTitle").textContent = t("tipsTitle");
      document.getElementById("growthTitle").textContent = t("growthTitle");
      document.getElementById("restartBtn").textContent = t("restartBtn");

      document.getElementById("labelR").textContent = labels.R.name;
      document.getElementById("labelY").textContent = labels.Y.name;
      document.getElementById("labelG").textContent = labels.G.name;
      document.getElementById("labelB").textContent = labels.B.name;

      document.getElementById("pctR").textContent = pct.R + "%";
      document.getElementById("pctY").textContent = pct.Y + "%";
      document.getElementById("pctG").textContent = pct.G + "%";
      document.getElementById("pctB").textContent = pct.B + "%";

      document.getElementById("barR").style.width = pct.R + "%";
      document.getElementById("barY").style.width = pct.Y + "%";
      document.getElementById("barG").style.width = pct.G + "%";
      document.getElementById("barB").style.width = pct.B + "%";

      document.getElementById("overviewText").textContent = profile.overview;
      document.getElementById("communicationText").textContent = profile.comm;
      document.getElementById("workStyleText").textContent = profile.workStyle;
      document.getElementById("motivationText").textContent = profile.motivation;
      document.getElementById("decisionText").textContent = profile.decisions;
      document.getElementById("misreadText").textContent = profile.misread;
      document.getElementById("growthText").textContent = profile.growth;

      document.getElementById("strengthsList").innerHTML = profile.strengths.map(item => `<li>${item}</li>`).join("");
      document.getElementById("watchoutsList").innerHTML = profile.watchouts.map(item => `<li>${item}</li>`).join("");
      document.getElementById("tipsList").innerHTML = profile.tips.map(item => `<li>${item}</li>`).join("");

      setOpenReportLink(type, sorted, pct);
      showScreen("report");
    }

    function renderStandaloneReportFromUrl() {
      const params = new URLSearchParams(window.location.search);
      if (params.get("report") !== "1") return false;

      currentLanguage = params.get("lang") || currentLanguage;
      participantName = params.get("name") || t("participant");

      applyDirection();

      const type = params.get("type") || "RY";
      const primary = params.get("primary") || type[0];
      const secondary = params.get("secondary") || type[1];
      const pct = {
        R: parseInt(params.get("R") || "0", 10),
        Y: parseInt(params.get("Y") || "0", 10),
        G: parseInt(params.get("G") || "0", 10),
        B: parseInt(params.get("B") || "0", 10)
      };

      const profile = translateProfile(currentLanguage, type, participantName);
      const labels = profile.labels;

      document.querySelector(".page").innerHTML = `
        <div class="card">
          <div class="eyebrow">${t("reportEyebrow")}</div>
          <h1>${participantName}</h1>
          <div class="badge" style="
            background:${primary === "R" ? "var(--redSoft)" : primary === "Y" ? "var(--yellowSoft)" : primary === "G" ? "var(--greenSoft)" : "var(--blueSoft)"};
            color:${primary === "R" ? "var(--red)" : primary === "Y" ? "#946200" : primary === "G" ? "var(--green)" : "var(--blue)"};
          ">
            <span class="badge-dot" style="background:${primary === "R" ? "var(--red)" : primary === "Y" ? "var(--yellow)" : primary === "G" ? "var(--green)" : "var(--blue)"}"></span>
            <span>${labels[primary].name} / ${labels[secondary].name}</span>
          </div>
          <p>${profile.tagline}</p>
        </div>
        <div class="card">
          <h3>${t("breakdownTitle")}</h3>
          <div class="bars">
            <div class="bar-row"><div>${labels.R.name}</div><div class="bar-track"><div class="bar-fill" style="background:var(--red);width:${pct.R}%"></div></div><div>${pct.R}%</div></div>
            <div class="bar-row"><div>${labels.Y.name}</div><div class="bar-track"><div class="bar-fill" style="background:var(--yellow);width:${pct.Y}%"></div></div><div>${pct.Y}%</div></div>
            <div class="bar-row"><div>${labels.G.name}</div><div class="bar-track"><div class="bar-fill" style="background:var(--green);width:${pct.G}%"></div></div><div>${pct.G}%</div></div>
            <div class="bar-row"><div>${labels.B.name}</div><div class="bar-track"><div class="bar-fill" style="background:var(--blue);width:${pct.B}%"></div></div><div>${pct.B}%</div></div>
          </div>
        </div>
        <div class="card"><h3>${t("overviewTitle")}</h3><p>${profile.overview}</p></div>
        <div class="card"><h3>${t("communicationTitle")}</h3><p>${profile.comm}</p></div>
        <div class="grid-2">
          <div class="card"><h3>${t("workStyleTitle")}</h3><p>${profile.workStyle}</p></div>
          <div class="card"><h3>${t("motivationTitle")}</h3><p>${profile.motivation}</p></div>
        </div>
        <div class="grid-2">
          <div class="card"><h3>${t("decisionTitle")}</h3><p>${profile.decisions}</p></div>
          <div class="card"><h3>${t("misreadTitle")}</h3><p>${profile.misread}</p></div>
        </div>
        <div class="grid-2">
          <div class="card"><h3>${t("strengthsTitle")}</h3><ul class="list">${profile.strengths.map(item => `<li>${item}</li>`).join("")}</ul></div>
          <div class="card"><h3>${t("watchoutsTitle")}</h3><ul class="list">${profile.watchouts.map(item => `<li>${item}</li>`).join("")}</ul></div>
        </div>
        <div class="grid-2">
          <div class="card"><h3>${t("tipsTitle")}</h3><ul class="list">${profile.tips.map(item => `<li>${item}</li>`).join("")}</ul></div>
          <div class="card"><h3>${t("growthTitle")}</h3><p>${profile.growth}</p></div>
        </div>
        <div class="card no-print" style="text-align:center"><button class="btn-primary" onclick="window.print()">${t("printBtn")}</button></div>
      `;
      return true;
    }

    function restart() { answers = []; currentQuestion = 0; shuffledQuestions = []; showScreen("intro"); renderIntro(); }
    function renderApp() { applyDirection(); if (renderStandaloneReportFromUrl()) { return; } populateLanguageSelect(); renderIntro(); const active = document.querySelector(".screen.active")?.id; if (active === "quiz" && shuffledQuestions.length) renderQuestion(); if (active === "report") buildReport(); }
    
    // START THE APP
    renderApp();
  </script>
</body>
</html>
