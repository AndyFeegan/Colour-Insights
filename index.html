<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colour Insights — Professional Assessment</title>
  <style>
    :root{
      --bg:#f4f7fb; --card:#ffffff; --border:#d8e1ec; --ink:#0f172a; --ink2:#475569; --ink3:#64748b;
      --accent:#2563eb; --red:#e05a47; --yellow:#d8a73c; --green:#2f8f6b; --blue:#2563eb;
      --redSoft:#fff1ee; --yellowSoft:#fff8e8; --greenSoft:#eef9f4; --blueSoft:#eef4ff;
    }
    *{box-sizing:border-box} html{scroll-behavior:smooth}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#f7fafc 0%,#f3f7fb 100%);color:var(--ink);}
    .page{max-width:980px;margin:0 auto;padding:20px 18px 64px;}
    .toolbar{display:flex;justify-content:flex-end;margin-bottom:18px;}
    .lang-wrap{background:rgba(255,255,255,0.96);border:1px solid var(--border);border-radius:16px;padding:14px;min-width:260px;box-shadow:0 8px 24px rgba(15,23,42,0.06);}
    .lang-label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:8px;font-weight:700;}
    select,input{width:100%;padding:12px 14px;border:1px solid #cbd5e1;border-radius:10px;font-size:15px;background:#fff;color:var(--ink);}
    .screen{display:none} .screen.active{display:block}
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px;margin-bottom:16px;box-shadow:0 10px 28px rgba(15,23,42,0.04);}
    .eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--accent);margin-bottom:12px;font-weight:700;}
    h1{font-size:40px;line-height:1.04;margin:0 0 14px;} h2{font-size:28px;line-height:1.2;margin:0 0 16px;} h3{font-size:18px;margin:0 0 12px;}
    p{line-height:1.75;color:var(--ink2);margin:0 0 14px;}
    .legend{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:22px 0 26px;}
    .legend-item{display:flex;gap:12px;align-items:center;border:1px solid var(--border);border-radius:12px;padding:14px;background:#fff;}
    .swatch{width:8px;height:38px;border-radius:999px;flex-shrink:0;}
    .legend-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
    .legend-sub{color:var(--ink3);font-size:13px;}
    .field-label{display:block;margin:0 0 8px;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);font-weight:700;}
    button{border:none;border-radius:12px;padding:14px 20px;font-size:15px;font-weight:700;cursor:pointer;transition:transform 0.1s;}
    button:active{transform:scale(0.98);}
    .btn-primary{background:var(--accent);color:#fff;} .btn-secondary{background:#fff;color:var(--ink2);border:1px solid #cbd5e1;}
    .btn-link{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:12px;padding:14px 20px;font-size:15px;font-weight:700;cursor:pointer;background:var(--accent);color:#fff;text-decoration:none;}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
    .progress-top{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:10px;font-size:12px;text-transform:uppercase;letter-spacing:.12em;color:var(--ink3);font-weight:700;}
    .progress-track{height:8px;background:#e7eef7;border-radius:999px;overflow:hidden;margin-bottom:20px;}
    .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#3b82f6,#2563eb);transition:width 0.4s ease;}
    .qnum{margin-bottom:12px;font-size:12px;text-transform:uppercase;letter-spacing:.14em;color:var(--ink3);font-weight:700;}
    .options{display:grid;gap:10px;}
    .option{width:100%;text-align:left;padding:16px;border:1px solid var(--border);border-radius:14px;background:#fff;color:var(--ink2);font-weight:500;transition:border-color 0.2s;}
    .option:hover{border-color:#93c5fd;background:#f8fbff;}
    .badge{display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;font-size:12px;text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin-bottom:10px;}
    .badge-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .bars{display:grid;gap:12px;} .bar-row{display:grid;grid-template-columns:160px 1fr 48px;gap:12px;align-items:center;}
    .bar-track{height:10px;background:#e2e8f0;border-radius:999px;overflow:hidden;} .bar-fill{height:100%;width:0%;transition:width 1s ease;}
    .list{margin:0;padding-left:18px;color:var(--ink2);line-height:1.85;}
    .grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;}
    .rtl{direction:rtl;text-align:right;} .rtl .toolbar{justify-content:flex-start;} .rtl .bar-row{grid-template-columns:48px 1fr 160px;} .rtl .list{padding-left:0;padding-right:18px;} .rtl .option{text-align:right;}
    @media print{.toolbar{display:none !important;} .no-print{display:none !important;} body{background:#fff;} .card{box-shadow:none;border:none;}}
    @media (max-width:760px){.legend,.grid-2{grid-template-columns:1fr;} .bar-row{grid-template-columns:1fr;} .rtl .bar-row{grid-template-columns:1fr;} h1{font-size:30px;} h2{font-size:24px;}}
  </style>
</head>
<body>
  <div class="page">
    <div class="toolbar no-print">
      <div class="lang-wrap">
        <label class="lang-label" id="languageLabel" for="languageSelect">Language</label>
        <select id="languageSelect"></select>
      </div>
    </div>

    <div id="intro" class="screen active">
      <div class="card">
        <div class="eyebrow" id="introEyebrow"></div><h1 id="introTitle"></h1><p id="introSubtitle"></p>
        <div class="legend">
          <div class="legend-item"><div class="swatch" style="background:var(--red)"></div><div><div class="legend-title" id="redName"></div><div class="legend-sub" id="redTag"></div></div></div>
          <div class="legend-item"><div class="swatch" style="background:var(--yellow)"></div><div><div class="legend-title" id="yellowName"></div><div class="legend-sub" id="yellowTag"></div></div></div>
          <div class="legend-item"><div class="swatch" style="background:var(--green)"></div><div><div class="legend-title" id="greenName"></div><div class="legend-sub" id="greenTag"></div></div></div>
          <div class="legend-item"><div class="swatch" style="background:var(--blue)"></div><div><div class="legend-title" id="blueName"></div><div class="legend-sub" id="blueTag"></div></div></div>
        </div>
        <label class="field-label" id="nameLabel" for="userName"></label><input id="userName" type="text" />
        <div class="actions"><button class="btn-primary" onclick="startQuiz()" id="startBtn"></button></div>
      </div>
    </div>

    <div id="quiz" class="screen">
      <div class="card">
        <div class="progress-top"><span id="progressLabel"></span><span id="progressPct"></span></div>
        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <div class="qnum" id="questionNumber"></div><h2 id="questionText"></h2><div class="options" id="options"></div>
      </div>
    </div>

    <div id="report" class="screen">
      <div class="card">
        <div class="eyebrow" id="reportEyebrow"></div><h1 id="reportName"></h1>
        <div class="badge" id="reportBadge"><span class="badge-dot" id="badgeDot"></span><span id="reportType"></span></div><p id="reportTagline"></p>
      </div>
      <div class="card">
        <h3 id="breakdownTitle"></h3>
        <div class="bars">
          <div class="bar-row"><div id="labelR"></div><div class="bar-track"><div id="barR" class="bar-fill" style="background:var(--red)"></div></div><div id="pctR"></div></div>
          <div class="bar-row"><div id="labelY"></div><div class="bar-track"><div id="barY" class="bar-fill" style="background:var(--yellow)"></div></div><div id="pctY"></div></div>
          <div class="bar-row"><div id="labelG"></div><div class="bar-track"><div id="barG" class="bar-fill" style="background:var(--green)"></div></div><div id="pctG"></div></div>
          <div class="bar-row"><div id="labelB"></div><div class="bar-track"><div id="barB" class="bar-fill" style="background:var(--blue)"></div></div><div id="pctB"></div></div>
        </div>
      </div>
      <div class="card"><h3 id="overviewTitle"></h3><p id="overviewText"></p></div>
      <div class="card"><h3 id="communicationTitle"></h3><p id="communicationText"></p></div>
      <div class="grid-2">
        <div class="card"><h3 id="workStyleTitle"></h3><p id="workStyleText"></p></div>
        <div class="card"><h3 id="motivationTitle"></h3><p id="motivationText"></p></div>
      </div>
      <div class="grid-2">
        <div class="card"><h3 id="decisionTitle"></h3><p id="decisionText"></p></div>
        <div class="card"><h3 id="misreadTitle"></h3><p id="misreadText"></p></div>
      </div>
      <div class="grid-2">
        <div class="card"><h3 id="strengthsTitle"></h3><ul class="list" id="strengthsList"></ul></div>
        <div class="card"><h3 id="watchoutsTitle"></h3><ul class="list" id="watchoutsList"></ul></div>
      </div>
      <div class="grid-2">
        <div class="card"><h3 id="tipsTitle"></h3><ul class="list" id="tipsList"></ul></div>
        <div class="card"><h3 id="growthTitle"></h3><p id="growthText"></p></div>
      </div>
      <div class="card no-print">
        <div class="actions">
          <a id="openReportBtn" class="btn-link" href="#" target="_blank" rel="noreferrer"><span id="openReportText"></span></a>
          <button class="btn-secondary" onclick="restart()" id="restartBtn"></button>
        </div>
      </div>
    </div>
  </div>

        options: [
          { c: 'R', text: { en: "Decisive action and cutting clearly through complex ambiguity.", es: "Acción decisiva y para abrirse paso claramente a través de la ambigüedad compleja.", fr: "Des actions décisives et pour trancher clairement dans une ambiguïté complexe.", de: "Entschlossenes Handeln und um klare Wege durch komplexe Unklarheiten zu finden.", it: "Un'azione decisa e per superare chiaramente la complessa ambiguità.", pt: "Ação decisiva e para dissipar claramente a ambiguidade complexa.", nl: "Daadkrachtige actie en om helderheid te scheppen in complexe onduidelijkheden.", pl: "Zdecydowane działanie i wyraźne przebijanie się przez złożoną niejednoznaczność.", tr: "Kararlı eylem ve karmaşık belirsizlikleri net bir şekilde ortadan kaldırmak.", ar: "إجراء حاسم وتوضيح الغموض المعقد بوضوح." } },
          { c: 'Y', text: { en: "Highly creative ideas and keeping team morale consistently high.", es: "Ideas muy creativas y para mantener la moral del equipo constantemente alta.", fr: "Des idées très créatives et pour maintenir le moral de l'équipe à un niveau toujours élevé.", de: "Sehr kreative Ideen und um die Teammoral konstant hoch zu halten.", it: "Idee altamente creative e per mantenere il morale del team costantemente alto.", pt: "Ideias altamente criativas e para manter o moral da equipa consistentemente alto.", nl: "Zeer creatieve ideeën en om het moreel van het team constant hoog te houden.", pl: "Bardzo kreatywne pomysły i utrzymywanie morale zespołu na stale wysokim poziomie.", tr: "Son derece yaratıcı fikirler ve takımın moralini sürekli yüksek tutmak.", ar: "أفكار إبداعية للغاية والحفاظ على معنويات الفريق عالية باستمرار." } },
          { c: 'G', text: { en: "Genuine emotional support, empathy, and thoughtful guidance.", es: "Apoyo emocional genuino, empatía y orientación reflexiva.", fr: "Un véritable soutien émotionnel, de l'empathie et des conseils réfléchis.", de: "Echte emotionale Unterstützung, Empathie und durchdachte Führung.", it: "Vero supporto emotivo, empatia e una guida ponderata.", pt: "Apoio emocional genuíno, empatia e orientação ponderada.", nl: "Oprechte emotionele steun, empathie en bedachtzame begeleiding.", pl: "Szczere wsparcie emocjonalne, empatię i przemyślane wskazówki.", tr: "Gerçek duygusal destek, empati ve düşünceli rehberlik.", ar: "دعم عاطفي حقيقي، وتعاطف، وتوجيه مدروس." } },
          { c: 'B', text: { en: "Pinpoint accurate information and incredibly careful analysis.", es: "Información sumamente precisa y un análisis increíblemente cuidadoso.", fr: "Des informations d'une grande précision et une analyse incroyablement minutieuse.", de: "Haargenaue Informationen und unglaublich sorgfältige Analysen.", it: "Informazioni estremamente precise e un'analisi incredibilmente accurata.", pt: "Informações extremamente precisas e uma análise incrivelmente cuidadosa.", nl: "Zeer nauwkeurige informatie en een ongelooflijk zorgvuldige analyse.", pl: "Niezwykle dokładne informacje i niewiarygodnie staranną analizę.", tr: "Nokta atışı doğru bilgi ve inanılmaz derecede dikkatli analiz.", ar: "معلومات دقيقة للغاية وتحليل دقيق بشكل لا يصدق." } }
        ]
      },
      { text: { en: "How do you honestly feel about following strict rules and established processes?", es: "¿Cómo te sientes honestamente respecto a seguir reglas estrictas y procesos establecidos?", fr: "Que pensez-vous sincèrement du fait de suivre des règles strictes et des processus établis ?", de: "Wie denken Sie ehrlich darüber, strenge Regeln und etablierte Prozesse zu befolgen?", it: "Come ti senti onestamente riguardo al seguire regole rigide e processi stabiliti?", pt: "Como se sente honestamente em relação a seguir regras estritas e processos estabelecidos?", nl: "Hoe voel je je oprecht over het volgen van strikte regels en vastgestelde processen?", pl: "Co szczerze myślisz o przestrzeganiu surowych zasad i ustalonych procesów?", tr: "Katı kuralları ve yerleşik süreçleri takip etme konusunda dürüstçe ne hissediyorsunuz?", ar: "كيف تشعر بصدق حيال اتباع القواعد الصارمة والعمليات المعمول بها؟" },
        options: [
          { c: 'R', text: { en: "I'll follow them if they prove efficient — otherwise I will challenge them.", es: "Las seguiré si demuestran ser eficientes; de lo contrario, las desafiaré.", fr: "Je les suivrai s'ils s'avèrent efficaces — sinon je les remettrai en question.", de: "Ich befolge sie, wenn sie sich als effizient erweisen – sonst werde ich sie in Frage stellen.", it: "Le seguirò se si dimostrano efficienti — altrimenti le contesterò.", pt: "Segui-las-ei se provarem ser eficientes — caso contrário, irei desafiá-las.", nl: "Ik zal ze volgen als ze efficiënt blijken te zijn — anders zal ik ze aanvechten.", pl: "Będę ich przestrzegać, jeśli okażą się skuteczne — w przeciwnym razie będę je kwestionować.", tr: "Eğer verimli olduklarını kanıtlarlarsa izlerim — aksi takdirde onlara meydan okurum.", ar: "سأتبعها إذا أثبتت كفاءتها — وإلا فسأتحدى ذلك." } },
          { c: 'Y', text: { en: "I deeply value flexibility — overly rigid rules simply stifle real creativity.", es: "Valoro profundamente la flexibilidad: las reglas excesivamente rígidas simplemente asfixian la creatividad real.", fr: "J'apprécie profondément la flexibilité — les règles trop rigides étouffent tout simplement la vraie créativité.", de: "Ich schätze Flexibilität sehr – übermäßig starre Regeln ersticken einfach echte Kreativität.", it: "Apprezzo profondamente la flessibilità — le regole troppo rigide soffocano semplicemente la vera creatività.", pt: "Valorizo profundamente a flexibilidade — regras excessivamente rígidas simplesmente sufocam a verdadeira criatividade.", nl: "Ik hecht veel waarde aan flexibiliteit — al te starre regels verstikken gewoon echte creativiteit.", pl: "Głęboko cenię elastyczność — zbyt sztywne zasady po prostu tłumią prawdziwą kreatywność.", tr: "Esnekliğe derinden değer veririm — aşırı katı kurallar gerçek yaratıcılığı boğar.", ar: "أقدر المرونة بشدة — القواعد الصارمة للغاية تخنق الإبداع الحقيقي." } },
          { c: 'G', text: { en: "I respect them completely; they are vital for keeping things fair for everyone.", es: "Las respeto por completo; son vitales para mantener las cosas justas para todos.", fr: "Je les respecte totalement ; ils sont essentiels pour garantir l'équité pour tous.", de: "Ich respektiere sie voll und ganz; sie sind wichtig, um die Dinge für alle fair zu halten.", it: "Le rispetto completamente; sono vitali per mantenere le cose eque per tutti.", pt: "Respeito-as totalmente; são vitais para manter as coisas justas para todos.", nl: "Ik respecteer ze volledig; ze zijn essentieel om het voor iedereen eerlijk te houden.", pl: "Szanuję je całkowicie; są niezbędne, aby zapewnić sprawiedliwość dla wszystkich.", tr: "Onlara tamamen saygı duyuyorum; işleri herkes için adil tutmak adına hayati önem taşırlar.", ar: "أحترمهم تمامًا؛ فهي حيوية للحفاظ على العدل للجميع." } },
          { c: 'B', text: { en: "I follow them very carefully — they were designed and implemented for good reason.", es: "Las sigo muy cuidadosamente: fueron diseñadas e implementadas por una buena razón.", fr: "Je les suis très attentivement — ils ont été conçus et mis en œuvre pour de bonnes raisons.", de: "Ich befolge sie sehr sorgfältig – sie wurden aus gutem Grund entworfen und implementiert.", it: "Le seguo molto attentamente — sono state concepite e implementate per un buon motivo.", pt: "Sigo-as com muito cuidado — foram concebidas e implementadas por um bom motivo.", nl: "Ik volg ze zeer zorgvuldig — ze zijn niet voor niets bedacht en geïmplementeerd.", pl: "Przestrzegam ich bardzo uważnie — zostały zaprojektowane i wdrożone z ważnego powodu.", tr: "Onları çok dikkatli bir şekilde takip ederim — iyi bir nedenle tasarlanmış ve uygulanmışlardır.", ar: "أتبعها بعناية شديدة — فقد تم تصميمها وتنفيذها لسبب وجيه." } }
        ]
      },
      { text: { en: "Deep down, what genuinely motivates you the absolute most at work?", es: "En el fondo, ¿qué es lo que genuinamente te motiva más en el trabajo?", fr: "Au fond, qu'est-ce qui vous motive sincèrement le plus au travail ?", de: "Tief im Inneren, was motiviert Sie bei der Arbeit wirklich am allermeisten?", it: "In fondo, cosa ti motiva genuinamente in assoluto di più sul lavoro?", pt: "No fundo, o que é que genuinamente o motiva mais no trabalho?", nl: "Diep van binnen, wat motiveert jou oprecht het allerbest op het werk?", pl: "W głębi duszy, co tak naprawdę najbardziej motywuje cię w pracy?", tr: "İçten içe, işte sizi gerçekten en çok motive eden şey nedir?", ar: "في أعماقك، ما الذي يحفزك حقًا أكثر من غيره في العمل؟" },
        options: [
          { c: 'R', text: { en: "Winning, smashing targets, and being seen as number one.", es: "Ganar, destrozar objetivos y ser visto como el número uno.", fr: "Gagner, pulvériser les objectifs et être perçu comme le numéro un.", de: "Gewinnen, Ziele übertreffen und als Nummer eins gesehen werden.", it: "Vincere, polverizzare gli obiettivi ed essere considerato il numero uno.", pt: "Vencer, arrasar objetivos e ser visto como o número um.", nl: "Winnen, doelen verpletteren en gezien worden als de nummer één.", pl: "Zwyciężanie, rozbijanie celów i bycie postrzeganym jako numer jeden.", tr: "Kazanmak, hedefleri parçalamak ve bir numara olarak görülmek.", ar: "الفوز، وتحطيم الأهداف، وأن يُنظر إليك على أنك رقم واحد." } },
          { c: 'Y', text: { en: "Earning recognition, having genuine fun, and inspiring the wider team.", es: "Obtener reconocimiento, divertirse genuinamente e inspirar al equipo en general.", fr: "Obtenir de la reconnaissance, s'amuser sincèrement et inspirer l'équipe au sens large.", de: "Anerkennung verdienen, echten Spaß haben und das gesamte Team inspirieren.", it: "Ottenere riconoscimenti, divertirsi genuinamente e ispirare il team in generale.", pt: "Ganhar reconhecimento, divertir-se genuinamente e inspirar a equipa em geral.", nl: "Erkenning krijgen, oprecht plezier hebben en het bredere team inspireren.", pl: "Zdobywanie uznania, szczera zabawa i inspirowanie szerszego zespołu.", tr: "Takdir kazanmak, gerçekten eğlenmek ve daha geniş ekibe ilham vermek.", ar: "كسب التقدير، والاستمتاع الحقيقي، وإلهام الفريق الأوسع." } },
          { c: 'G', text: { en: "Making a highly meaningful contribution and truly helping others.", es: "Hacer una contribución muy significativa y ayudar verdaderamente a los demás.", fr: "Apporter une contribution très significative et aider véritablement les autres.", de: "Einen sehr sinnvollen Beitrag leisten und anderen wirklich helfen.", it: "Dare un contributo altamente significativo e aiutare veramente gli altri.", pt: "Fazer uma contribuição altamente significativa e ajudar verdadeiramente os outros.", nl: "Een zeer betekenisvolle bijdrage leveren en anderen echt helpen.", pl: "Wnoszenie wysoce znaczącego wkładu i prawdziwa pomoc innym.", tr: "Son derece anlamlı bir katkı sağlamak ve başkalarına gerçekten yardımcı olmak.", ar: "تقديم مساهمة ذات مغزى كبير ومساعدة الآخرين حقًا." } },
          { c: 'B', text: { en: "Achieving mastery, learning deeply, and delivering flawless quality.", es: "Alcanzar la maestría, aprender profundamente y ofrecer una calidad impecable.", fr: "Atteindre la maîtrise, apprendre en profondeur et offrir une qualité irréprochable.", de: "Meisterschaft erlangen, tiefgreifend lernen und makellose Qualität liefern.", it: "Raggiungere la maestria, imparare profondamente e fornire una qualità impeccabile.", pt: "Alcançar a mestria, aprender profundamente e entregar qualidade impecável.", nl: "Meesterschap bereiken, diepgaand leren en onberispelijke kwaliteit leveren.", pl: "Osiągnięcie mistrzostwa, dogłębne uczenie się i dostarczanie bezbłędnej jakości.", tr: "Ustalığa ulaşmak, derinlemesine öğrenmek ve kusursuz kalite sunmak.", ar: "تحقيق الإتقان، والتعلم العميق، وتقديم جودة لا تشوبها شائبة." } }
        ]
      },
      { text: { en: "When it comes time to make a major, high-stakes decision, you rely most on…", es: "Cuando llega el momento de tomar una decisión importante y de alto riesgo, confías más en…", fr: "Au moment de prendre une décision majeure et à fort enjeu, vous vous fiez principalement à…", de: "Wenn es an der Zeit ist, eine wichtige Entscheidung mit hohem Einsatz zu treffen, verlassen Sie sich am meisten auf…", it: "Quando è il momento di prendere una decisione importante e ad alto rischio, fai maggiore affidamento su…", pt: "Quando chega a hora de tomar uma decisão importante e de alto risco, confia mais em…", nl: "Als het tijd is om een belangrijke beslissing met grote belangen te nemen, vertrouw je het meest op…", pl: "Kiedy przychodzi czas na podjęcie ważnej decyzji o wysokiej stawce, najbardziej polegasz na…", tr: "Büyük ve yüksek riskli bir karar verme zamanı geldiğinde en çok şuna güvenirsiniz…", ar: "عندما يحين وقت اتخاذ قرار كبير وعالي المخاطر، فإنك تعتمد أكثر على…" },
        options: [
          { c: 'R', text: { en: "Your strong gut instinct — you implicitly trust your own judgement.", es: "Tu fuerte instinto: confías implícitamente en tu propio juicio.", fr: "Votre fort instinct — vous faites implicitement confiance à votre propre jugement.", de: "Ihr starkes Bauchgefühl – Sie vertrauen implizit Ihrem eigenen Urteilsvermögen.", it: "Il tuo forte istinto — ti fidi ciecamente del tuo giudizio.", pt: "O seu forte instinto — confia implicitamente no seu próprio julgamento.", nl: "Je sterke onderbuikgevoel — je vertrouwt blindelings op je eigen oordeel.", pl: "Swoim silnym instynkcie — bezgranicznie ufasz własnemu osądowi.", tr: "Güçlü içgüdünüz — kendi yargınıza kayıtsız şartsız güvenirsiniz.", ar: "حدسك القوي - أنت تثق تمامًا في حكمك الخاص." } },
          { c: 'Y', text: { en: "Talking to trusted others and reading the intuitive energy of the room.", es: "Hablar con personas de confianza y leer la energía intuitiva de la sala.", fr: "Parler à des personnes de confiance et lire l'énergie intuitive de la pièce.", de: "Gespräche mit Vertrauten und das intuitive Lesen der Energie im Raum.", it: "Parlare con persone di fiducia e leggere l'energia intuitiva della stanza.", pt: "Falar com pessoas de confiança e ler a energia intuitiva da sala.", nl: "Praten met vertrouwde anderen en de intuïtieve energie in de kamer lezen.", pl: "Rozmowach z zaufanymi osobami i czytaniu intuicyjnej energii pomieszczenia.", tr: "Güvendiğiniz kişilerle konuşmak ve odadaki sezgisel enerjiyi okumak.", ar: "التحدث إلى أشخاص موثوق بهم وقراءة الطاقة البديهية للغرفة." } },
          { c: 'G', text: { en: "Building consensus to ensure the outcome feels right for everyone involved.", es: "Llegar a un consenso para garantizar que el resultado se sienta correcto para todos los involucrados.", fr: "Rechercher un consensus pour s'assurer que le résultat convienne à toutes les personnes impliquées.", de: "Einen Konsens bilden, um sicherzustellen, dass sich das Ergebnis für alle Beteiligten richtig anfühlt.", it: "Costruire un consenso per garantire che il risultato sembri giusto a tutte le persone coinvolte.", pt: "Construir um consenso para garantir que o resultado pareça correto para todos os envolvidos.", nl: "Consensus bouwen om ervoor te zorgen dat de uitkomst goed voelt voor alle betrokkenen.", pl: "Budowaniu konsensusu, aby upewnić się, że wynik będzie odpowiedni dla wszystkich zaangażowanych.", tr: "Sonucun dahil olan herkes için doğru hissettirdiğinden emin olmak adına fikir birliği oluşturmak.", ar: "بناء توافق في الآراء للتأكد من أن النتيجة تبدو صحيحة لجميع المعنيين." } },
          { c: 'B', text: { en: "Hard data, empirical evidence, and flawless logical reasoning.", es: "Datos concretos, evidencia empírica y un razonamiento lógico impecable.", fr: "Des données concrètes, des preuves empiriques et un raisonnement logique sans faille.", de: "Harte Daten, empirische Beweise und fehlerfreies logisches Denken.", it: "Dati concreti, prove empiriche e un ragionamento logico impeccabile.", pt: "Dados concretos, evidências empíricas e um raciocínio lógico impecável.", nl: "Harde gegevens, empirisch bewijs en onberispelijk logisch redeneren.", pl: "Twardych danych, dowodach empirycznych i bezbłędnym logicznym rozumowaniu.", tr: "Somut veriler, ampirik kanıtlar ve kusursuz mantıksal akıl yürütme.", ar: "البيانات الصلبة والأدلة التجريبية والتفكير المنطقي الذي لا تشوبه شائبة." } }
        ]
      },
      { text: { en: "When operating in a highly volatile, fast-changing environment, you typically…", es: "Al operar en un entorno altamente volátil y de cambios rápidos, normalmente…", fr: "Lorsque vous évoluez dans un environnement très volatil et en évolution rapide, vous avez tendance à…", de: "Wenn Sie in einem sehr volatilen, sich schnell verändernden Umfeld agieren, werden Sie typischerweise…", it: "Quando operi in un ambiente altamente volatile e in rapida evoluzione, di solito…", pt: "Ao operar num ambiente altamente volátil e em rápida mudança, costuma…", nl: "Wanneer je opereert in een zeer volatiele, snel veranderende omgeving, zul je meestal…", pl: "Działając w wysoce niestabilnym, szybko zmieniającym się środowisku, zazwyczaj…", tr: "Oldukça değişken ve hızla değişen bir ortamda çalışırken genellikle…", ar: "عند العمل في بيئة شديدة التقلب وسريعة التغير، فإنك عادةً..." },
        options: [
          { c: 'R', text: { en: "Thrive powerfully — you love the aggressive pace and push even harder.", es: "Prosperas de manera poderosa: amas el ritmo agresivo y presionas aún más.", fr: "Prospérez avec force — vous aimez ce rythme agressif et vous vous donnez encore plus.", de: "Kraftvoll aufblühen – Sie lieben das aggressive Tempo und strengen sich noch mehr an.", it: "Prosperi con forza — ami il ritmo aggressivo e spingi ancora di più.", pt: "Prosperar intensamente — adora o ritmo agressivo e esforça-se ainda mais.", nl: "Krachtig gedijen — je houdt van het agressieve tempo en gaat nog harder pushen.", pl: "Silnie rozkwitasz — uwielbiasz agresywne tempo i naciskasz jeszcze mocniej.", tr: "Güçlü bir şekilde gelişirsiniz — agresif tempoyu seversiniz ve daha da zorlarsınız.", ar: "تزدهر بقوة — تحب الوتيرة العنيفة وتدفع بقوة أكبر." } },
          { c: 'Y', text: { en: "Adapt swiftly and find the shifting landscape deeply exciting.", es: "Te adaptas rápidamente y encuentras el panorama cambiante profundamente emocionante.", fr: "Vous adaptez rapidement et trouvez ce paysage changeant profondément excitant.", de: "Sich schnell anpassen und die sich verändernde Landschaft zutiefst aufregend finden.", it: "Ti adatti rapidamente e trovi il panorama in evoluzione profondamente eccitante.", pt: "Adaptar-se rapidamente e achar o cenário em mudança profundamente empolgante.", nl: "Je snel aanpassen en het veranderende landschap erg opwindend vinden.", pl: "Szybko się dostosowujesz i uważasz zmieniający się krajobraz za bardzo ekscytujący.", tr: "Hızla uyum sağlar ve değişen manzarayı derinden heyecan verici bulursunuz.", ar: "تتكيف بسرعة وتجد المشهد المتغير مثيرًا للغاية." } },
          { c: 'G', text: { en: "Remain completely steady, focusing entirely on keeping the team grounded.", es: "Te mantienes completamente firme, enfocándote por completo en mantener al equipo centrado.", fr: "Restez totalement stable, en vous concentrant entièrement pour que l'équipe garde les pieds sur terre.", de: "Völlig ruhig bleiben und sich ganz darauf konzentrieren, das Team geerdet zu halten.", it: "Rimani completamente saldo, concentrandoti interamente sul mantenere il team ancorato a terra.", pt: "Manter-se completamente firme, focando-se inteiramente em manter a equipa com os pés no chão.", nl: "Volledig stabiel blijven en je er volledig op focussen om het team geaard te houden.", pl: "Pozostajesz całkowicie stabilny, skupiając się w pełni na uziemieniu zespołu.", tr: "Tamamen sabit kalır, tamamen ekibin ayaklarının yere basmasına odaklanırsınız.", ar: "تبقى ثابتًا تمامًا، مع التركيز كليًا على إبقاء الفريق متماسكًا." } },
          { c: 'B', text: { en: "Request time to re-evaluate, knowing change demands careful, structured thought.", es: "Solicitas tiempo para reevaluar, sabiendo que el cambio exige un pensamiento cuidadoso y estructurado.", fr: "Demandez du temps pour réévaluer, sachant que le changement exige une réflexion prudente et structurée.", de: "Zeit zur Neubewertung einfordern, da Veränderung sorgfältiges, strukturiertes Denken erfordert.", it: "Richiedi tempo per rivalutare, sapendo che il cambiamento richiede un pensiero attento e strutturato.", pt: "Solicitar tempo para reavaliar, sabendo que a mudança exige um pensamento cuidadoso e estruturado.", nl: "Tijd vragen om te heroverwegen, wetende dat verandering om zorgvuldig, gestructureerd nadenken vraagt.", pl: "Prosisz o czas na ponowną ocenę, wiedząc, że zmiana wymaga starannego, ustrukturyzowanego myślenia.", tr: "Değişimin dikkatli, yapılandırılmış bir düşünce gerektirdiğini bilerek yeniden değerlendirmek için zaman istersiniz.", ar: "اطلب وقتًا لإعادة التقييم، مع العلم أن التغيير يتطلب تفكيرًا دقيقًا ومنظمًا." } }
        ]
      },
      { text: { en: "When operating under extreme pressure, your colleagues might notice you become…", es: "Al operar bajo una presión extrema, tus colegas podrían notar que te vuelves…", fr: "Lorsque vous agissez sous une pression extrême, vos collègues pourraient remarquer que vous devenez…", de: "Wenn Sie unter extremem Druck arbeiten, könnten Ihre Kollegen bemerken, dass Sie... werden.", it: "Quando operi sotto pressione estrema, i tuoi colleghi potrebbero notare che diventi…", pt: "Ao operar sob extrema pressão, os seus colegas podem notar que se torna…", nl: "Wanneer je onder extreme druk opereert, kunnen je collega's merken dat je... wordt.", pl: "Gdy działasz pod ekstremalną presją, twoi współpracownicy mogą zauważyć, że stajesz się…", tr: "Aşırı baskı altında çalışırken, meslektaşlarınız sizin şu hale geldiğinizi fark edebilir…", ar: "عند العمل تحت ضغط شديد، قد يلاحظ زملاؤك أنك تصبح…" },
        options: [
          { c: 'R', text: { en: "Significantly more demanding, sharp, and controlling.", es: "Significativamente más exigente, cortante y controlador.", fr: "Considérablement plus exigeant, cassant et contrôlant.", de: "Deutlich fordernder, schroffer und kontrollierender.", it: "Significativamente più esigente, tagliente e controllante.", pt: "Significativamente mais exigente, ríspido e controlador.", nl: "Aanzienlijk veeleisender, scherper en controlerender.", pl: "Znacznie bardziej wymagający, ostry i kontrolujący.", tr: "Önemli ölçüde daha talepkar, keskin ve kontrolcü.", ar: "أكثر تطلبًا وحدة وسيطرة بشكل ملحوظ." } },
          { c: 'Y', text: { en: "Visibly frantic, rushed, or blindly over-optimistic.", es: "Visiblemente frenético, apresurado o ciegamente sobreoptimista.", fr: "Visiblement frénétique, pressé ou aveuglément trop optimiste.", de: "Sichtbar hektisch, gehetzt oder blindlings überoptimistisch.", it: "Visibilmente frenetico, frettoloso o ciecamente troppo ottimista.", pt: "Visivelmente frenético, apressado ou cegamente demasiado otimista.", nl: "Zichtbaar hectisch, gehaast of blindelings over-optimistisch.", pl: "Widocznie gorączkowy, pospieszny lub ślepo nadmiernie optymistyczny.", tr: "Görünür şekilde telaşlı, aceleci veya körü körüne aşırı iyimser.", ar: "محموم أو متسرع أو مفرط التفاؤل بشكل واضح." } },
          { c: 'G', text: { en: "Overly accommodating to others or highly reluctant to speak your truth.", es: "Demasiado complaciente con los demás o muy reacio a decir tu verdad.", fr: "Trop accommodant envers les autres ou très réticent à dire votre vérité.", de: "Zu entgegenkommend anderen gegenüber oder sehr zögerlich, Ihre Wahrheit auszusprechen.", it: "Eccessivamente accomodante con gli altri o molto riluttante a dire la tua verità.", pt: "Excessivamente complacente com os outros ou altamente relutante em dizer a sua verdade.", nl: "Overdreven meegaand naar anderen toe of zeer terughoudend om jouw waarheid te spreken.", pl: "Zbyt ugodowy wobec innych lub bardzo niechętny do mówienia swojej prawdy.", tr: "Başkalarına karşı aşırı uyumlu veya kendi doğrunuzu söylemekte oldukça isteksiz.", ar: "مفرط في الاستيعاب للآخرين أو متردد للغاية في قول حقيقتك." } },
          { c: 'B', text: { en: "Emotionally withdrawn, rigid, and overly critical of tiny details.", es: "Emocionalmente retraído, rígido y demasiado crítico con los pequeños detalles.", fr: "Émotionnellement en retrait, rigide et excessivement critique sur les petits détails.", de: "Emotional zurückgezogen, starr und übermäßig kritisch gegenüber winzigen Details.", it: "Emotivamente distaccato, rigido ed eccessivamente critico sui piccoli dettagli.", pt: "Emocionalmente retraído, rígido e excessivamente crítico em relação a pequenos detalhes.", nl: "Emotioneel teruggetrokken, rigide en overdreven kritisch op kleine details.", pl: "Emocjonalnie wycofany, sztywny i nadmiernie krytyczny wobec drobnych szczegółów.", tr: "Duygusal olarak içine kapanık, katı ve küçük detaylar konusunda aşırı eleştirel.", ar: "منسحب عاطفيًا، وصارم، ومفرط في النقد للتفاصيل الدقيقة." } }
        ]
      },
      { text: { en: "How do you overwhelmingly prefer to receive constructive feedback?", es: "¿Cómo prefieres abrumadoramente recibir críticas constructivas?", fr: "Comment préférez-vous très nettement recevoir des critiques constructives ?", de: "Wie bevorzugen Sie es mit überwältigender Mehrheit, konstruktives Feedback zu erhalten?", it: "Come preferisci in assoluto ricevere feedback costruttivi?", pt: "Como prefere esmagadoramente receber feedback construtivo?", nl: "Hoe ontvang je veruit het liefst constructieve feedback?", pl: "Jak zdecydowanie wolisz otrzymywać konstruktywne informacje zwrotne?", tr: "Yapıcı geri bildirimi ezici bir çoğunlukla nasıl almayı tercih edersiniz?", ar: "كيف تفضل بشكل كبير تلقي الملاحظات البناءة؟" },
        options: [
          { c: 'R', text: { en: "Keep it short, incredibly direct, and immediately actionable.", es: "Mantenlo breve, increíblemente directo e inmediatamente procesable.", fr: "Faites court, incroyablement direct et immédiatement applicable.", de: "Halten Sie es kurz, unglaublich direkt und sofort umsetzbar.", it: "Tienilo breve, incredibilmente diretto e immediatamente attuabile.", pt: "Mantenha-o curto, incrivelmente direto e imediatamente acionável.", nl: "Houd het kort, ongelooflijk direct en onmiddellijk bruikbaar.", pl: "Niech będzie krótko, niesamowicie bezpośrednio i od razu do działania.", tr: "Kısa, inanılmaz derecede doğrudan ve hemen eyleme geçirilebilir tutun.", ar: "اجعلها قصيرة ومباشرة بشكل لا يصدق وقابلة للتنفيذ على الفور." } },
          { c: 'Y', text: { en: "Start with the positive, and frame the growth areas encouragingly.", es: "Comienza con lo positivo y enmarca las áreas de crecimiento de manera alentadora.", fr: "Commencez par le positif et formulez les axes de développement de manière encourageante.", de: "Beginnen Sie mit dem Positiven und formulieren Sie die Entwicklungsbereiche ermutigend.", it: "Inizia con il lato positivo e inquadra le aree di crescita in modo incoraggiante.", pt: "Comece com o positivo e enquadre as áreas de crescimento de forma encorajadora.", nl: "Begin met het positieve en formuleer de groeigebieden op een aanmoedigende manier.", pl: "Zacznij od pozytywów i zachęcająco sformułuj obszary do rozwoju.", tr: "Olumlu olanla başlayın ve gelişim alanlarını teşvik edici bir şekilde çerçeveleyin.", ar: "ابدأ بالإيجابية، وقم بصياغة مجالات النمو بطريقة مشجعة." } },
          { c: 'G', text: { en: "Deliver it gently, privately, and with obvious care for my feelings.", es: "Entrégalo suavemente, en privado y con un evidente cuidado por mis sentimientos.", fr: "Annoncez-le doucement, en privé, et avec une attention évidente à mes sentiments.", de: "Überbringen Sie es sanft, unter vier Augen und mit offensichtlicher Rücksicht auf meine Gefühle.", it: "Comunicalo con delicatezza, in privato e con evidente attenzione ai miei sentimenti.", pt: "Entregue-o suavemente, em privado e com evidente cuidado pelos meus sentimentos.", nl: "Breng het voorzichtig, privé en met duidelijke zorg voor mijn gevoelens.", pl: "Przekaż to delikatnie, na osobności i z wyraźną troską o moje uczucia.", tr: "Nazikçe, özel olarak ve duygularıma açık bir özen göstererek iletin.", ar: "قدمها بلطف، على انفراد، ومع رعاية واضحة لمشاعري." } },
          { c: 'B', text: { en: "Make it highly specific, heavily evidence-based, and well-reasoned.", es: "Haz que sea muy específico, basado en gran medida en evidencia y bien razonado.", fr: "Rendez-le très spécifique, fortement basé sur des preuves et bien argumenté.", de: "Machen Sie es sehr spezifisch, stark evidenzbasiert und gut begründet.", it: "Rendilo altamente specifico, fortemente basato su prove e ben argomentato.", pt: "Torne-o altamente específico, fortemente baseado em evidências e bem fundamentado.", nl: "Maak het zeer specifiek, zwaar op bewijs gebaseerd en goed beredeneerd.", pl: "Niech będzie bardzo szczegółowe, mocno oparte na dowodach i dobrze uzasadnione.", tr: "Oldukça spesifik, büyük ölçüde kanıtlara dayalı ve iyi gerekçelendirilmiş hale getirin.", ar: "اجعلها محددة للغاية، ومبنية بشكل كبير على الأدلة، ومبررة جيدًا." } }
        ]
      },
      { text: { en: "When a colleague pitches a brand new strategy to you, you immediately want to know…", es: "Cuando un colega te propone una estrategia completamente nueva, inmediatamente quieres saber…", fr: "Lorsqu'un collègue vous présente une toute nouvelle stratégie, vous voulez immédiatement savoir…", de: "Wenn ein Kollege Ihnen eine brandneue Strategie vorschlägt, möchten Sie sofort wissen…", it: "Quando un collega ti propone una strategia completamente nuova, vuoi immediatamente sapere…", pt: "Quando um colega lhe propõe uma estratégia totalmente nova, quer imediatamente saber…", nl: "Wanneer een collega een gloednieuwe strategie aan je voorstelt, wil je onmiddellijk weten…", pl: "Kiedy współpracownik proponuje ci zupełnie nową strategię, natychmiast chcesz wiedzieć…", tr: "Bir meslektaşınız size yepyeni bir strateji sunduğunda, hemen şunu bilmek istersiniz…", ar: "عندما يعرض عليك زميل استراتيجية جديدة تمامًا، فإنك تريد أن تعرف على الفور…" },
        options: [
          { c: 'R', text: { en: "What is the exact outcome, and is it genuinely worth my time?", es: "¿Cuál es el resultado exacto y si realmente vale la pena mi tiempo?", fr: "Quel est le résultat exact, et est-ce que cela en vaut vraiment la peine ?", de: "Was ist das genaue Ergebnis und ist es meine Zeit wirklich wert?", it: "Qual è l'esito esatto, e vale davvero il mio tempo?", pt: "Qual é o resultado exato e se genuinamente vale o meu tempo?", nl: "Wat is de exacte uitkomst en is het mijn tijd echt waard?", pl: "Jaki jest dokładny wynik i czy to naprawdę jest warte mojego czasu?", tr: "Kesin sonuç nedir ve bu gerçekten zaman ayırmaya değer mi?", ar: "ما هي النتيجة الدقيقة، وهل تستحق وقتي حقًا؟" } },
          { c: 'Y', text: { en: "How exciting is the vision, and what does the big picture look like?", es: "¿Qué tan emocionante es la visión y cómo se ve el panorama general?", fr: "À quel point la vision est-elle excitante, et à quoi ressemble la situation dans son ensemble ?", de: "Wie aufregend ist die Vision und wie sieht das große Ganze aus?", it: "Quanto è entusiasmante la visione, e qual è il quadro generale?", pt: "Quão empolgante é a visão e como é o panorama geral?", nl: "Hoe opwindend is de visie, en hoe ziet het grote geheel eruit?", pl: "Jak ekscytująca jest wizja i jak wygląda szerszy obraz?", tr: "Vizyon ne kadar heyecan verici ve büyük resim nasıl görünüyor?", ar: "ما مدى إثارة الرؤية، وكيف تبدو الصورة الكبيرة؟" } },
          { c: 'G', text: { en: "How will this ultimately affect the team's workload and wellbeing?", es: "¿Cómo afectará esto en última instancia la carga de trabajo y el bienestar del equipo?", fr: "Comment cela affectera-t-il au final la charge de travail et le bien-être de l'équipe ?", de: "Wie wird sich das letztendlich auf die Arbeitsbelastung und das Wohlbefinden des Teams auswirken?", it: "Come influirà in ultima analisi sul carico di lavoro e sul benessere del team?", pt: "Como é que isto irá, em última análise, afetar a carga de trabalho e o bem-estar da equipa?", nl: "Hoe zal dit uiteindelijk de werkdruk en het welzijn van het team beïnvloeden?", pl: "Jak to ostatecznie wpłynie na obciążenie pracą i samopoczucie zespołu?", tr: "Bu durum nihayetinde ekibin iş yükünü ve refahını nasıl etkileyecek?", ar: "كيف سيؤثر هذا في النهاية على عبء عمل الفريق ورفاهيته؟" } },
          { c: 'B', text: { en: "Where is the empirical evidence, and what are the detailed risks?", es: "¿Dónde está la evidencia empírica y cuáles son los riesgos detallados?", fr: "Où sont les preuves empiriques, et quels sont les risques détaillés ?", de: "Wo sind die empirischen Beweise und was sind die detaillierten Risiken?", it: "Dov'è la prova empirica, e quali sono i rischi dettagliati?", pt: "Onde estão as evidências empíricas e quais são os riscos detalhados?", nl: "Waar is het empirische bewijs en wat zijn de gedetailleerde risico's?", pl: "Gdzie są dowody empiryczne i jakie są szczegółowe ryzyka?", tr: "Ampirik kanıt nerede ve detaylı riskler nelerdir?", ar: "أين هي الأدلة التجريبية، وما هي المخاطر التفصيلية؟" } }
        ]
      },
      { text: { en: "If you could design your absolute ideal working environment, it would be…", es: "Si pudieras diseñar tu entorno de trabajo absolutamente ideal, sería…", fr: "Si vous pouviez concevoir votre environnement de travail absolument idéal, ce serait…", de: "Wenn Sie Ihr absolut ideales Arbeitsumfeld entwerfen könnten, wäre es…", it: "Se potessi progettare il tuo ambiente di lavoro assolutamente ideale, sarebbe…", pt: "Se pudesse desenhar o seu ambiente de trabalho absolutamente ideal, seria…", nl: "Als je jouw absoluut ideale werkomgeving zou kunnen ontwerpen, zou dat zijn…", pl: "Gdybyś mógł zaprojektować swoje absolutnie idealne środowisko pracy, byłoby ono…", tr: "Kesinlikle ideal çalışma ortamınızı tasarlayabilseydiniz, bu şöyle olurdu…", ar: "إذا كان بإمكانك تصميم بيئة عملك المثالية تمامًا، فستكون…" },
        options: [
          { c: 'R', text: { en: "Fiercely competitive, incredibly fast-paced, and strictly results-driven.", es: "Ferozmente competitivo, de ritmo increíblemente rápido y estrictamente orientado a resultados.", fr: "Féroce compétitif, au rythme incroyablement rapide et strictement axé sur les résultats.", de: "Scharf umkämpft, unglaublich schnelllebig und strikt ergebnisorientiert.", it: "Ferocemente competitivo, dal ritmo incredibilmente incalzante e strettamente orientato ai risultati.", pt: "Ferozmente competitivo, com um ritmo incrivelmente acelerado e estritamente orientado para resultados.", nl: "Fel competitief, ongelooflijk snel en strikt resultaatgericht.", pl: "Zaciekle konkurencyjne, niesamowicie szybkie i ściśle nastawione na wyniki.", tr: "Son derece rekabetçi, inanılmaz derecede hızlı tempolu ve kesinlikle sonuç odaklı.", ar: "تنافسية بشراسة، وسريعة الخطى بشكل لا يصدق، وموجهة نحو النتائج بدقة." } },
          { c: 'Y', text: { en: "Vibrantly creative, highly social, and buzzing with positive energy.", es: "Vibrantemente creativo, muy social y lleno de energía positiva.", fr: "Vibrante de créativité, très social et bourdonnant d'énergie positive.", de: "Lebendig kreativ, sehr sozial und voller positiver Energie.", it: "Vibrantemente creativo, altamente sociale e vibrante di energia positiva.", pt: "Vibrantemente criativo, altamente social e a fervilhar de energia positiva.", nl: "Levendig creatief, zeer sociaal en bruisend van positieve energie.", pl: "Tętniące kreatywnością, wysoce towarzyskie i buzujące pozytywną energią.", tr: "Canlı bir şekilde yaratıcı, oldukça sosyal ve pozitif enerjiyle dolup taşan.", ar: "إبداعية نابضة بالحياة، واجتماعية للغاية، وتضج بالطاقة الإيجابية." } },
          { c: 'G', text: { en: "Deeply collaborative, mutually supportive, and peacefully harmonious.", es: "Profundamente colaborativo, de apoyo mutuo y pacíficamente armonioso.", fr: "Profondément collaboratif, mutuellement solidaire et paisiblement harmonieux.", de: "Zutiefst kollaborativ, gegenseitig unterstützend und friedlich harmonisch.", it: "Profondamente collaborativo, di supporto reciproco e pacificamente armonioso.", pt: "Profundamente colaborativo, de apoio mútuo e pacificamente harmonioso.", nl: "Diepgaand samenwerkend, wederzijds ondersteunend en vreedzaam harmonieus.", pl: "Głęboko oparte na współpracy, wzajemnie wspierające się i spokojnie harmonijne.", tr: "Derinden işbirlikçi, karşılıklı destekleyici ve huzurlu bir şekilde uyumlu.", ar: "تعاونية بعمق، وداعمة للطرفين، ومتناغمة بسلام." } },
          { c: 'B', text: { en: "Impeccably structured, quiet, and flawlessly organised.", es: "Impecablemente estructurado, silencioso y perfectamente organizado.", fr: "Impeccablement structuré, calme et parfaitement organisé.", de: "Tadellos strukturiert, ruhig und fehlerfrei organisiert.", it: "Impeccabilmente strutturato, tranquillo e organizzato in modo impeccabile.", pt: "Impecavelmente estruturado, tranquilo e perfeitamente organizado.", nl: "Onberispelijk gestructureerd, rustig en vlekkeloos georganiseerd.", pl: "Nienagannie ustrukturyzowane, ciche i bezbłędnie zorganizowane.", tr: "Kusursuz bir şekilde yapılandırılmış, sessiz ve hatasız organize edilmiş.", ar: "منظمة بشكل لا تشوبه شائبة، وهادئة، ومرتبة بلا عيب." } }
        ]
      },
      { text: { en: "How do you successfully go about building unbreakable trust with people?", es: "¿Cómo logras construir con éxito una confianza inquebrantable con las personas?", fr: "Comment parvenez-vous à instaurer une confiance inébranlable avec les gens ?", de: "Wie gehen Sie erfolgreich vor, um unzerbrechliches Vertrauen zu Menschen aufzubauen?", it: "Come riesci a costruire con successo una fiducia incrollabile con le persone?", pt: "Como é que constrói com sucesso uma confiança inabalável com as pessoas?", nl: "Hoe ga je succesvol te werk bij het opbouwen van onbreekbaar vertrouwen bij mensen?", pl: "Jak z powodzeniem budujesz niezłomne zaufanie wśród ludzi?", tr: "İnsanlarla sarsılmaz bir güveni başarılı bir şekilde nasıl inşa edersiniz?", ar: "كيف تنجح في بناء ثقة لا تتزعزع مع الناس؟" },
        options: [
          { c: 'R', text: { en: "By delivering exactly what I promise and remaining a rock under pressure.", es: "Entregando exactamente lo que prometo y manteniéndome firme como una roca bajo presión.", fr: "En livrant exactement ce que je promets et en restant un roc sous la pression.", de: "Indem ich genau das liefere, was ich verspreche, und unter Druck ein Fels in der Brandung bleibe.", it: "Fornendo esattamente ciò che prometto e rimanendo una roccia sotto pressione.", pt: "Entregando exatamente o que prometo e mantendo-me firme como uma rocha sob pressão.", nl: "Door precies te leveren wat ik beloof en een rots in de branding te blijven onder druk.", pl: "Dostarczając dokładnie to, co obiecuję i pozostając opoką pod presją.", tr: "Tam olarak söz verdiğim şeyi sunarak ve baskı altında bir kaya gibi sağlam kalarak.", ar: "من خلال تقديم ما أعد به بالضبط والبقاء كالصخرة تحت الضغط." } },
          { c: 'Y', text: { en: "By being authentically open, highly likeable, and making the journey enjoyable.", es: "Siendo auténticamente abierto, muy agradable y haciendo que el viaje sea placentero.", fr: "En étant authentiquement ouvert, très sympathique et en rendant le voyage agréable.", de: "Indem ich authentisch offen und sehr sympathisch bin und den Weg dorthin angenehm gestalte.", it: "Essendo autenticamente aperto, molto simpatico e rendendo il viaggio piacevole.", pt: "Sendo autenticamente aberto, muito simpático e tornando a jornada agradável.", nl: "Door authentiek open en zeer sympathiek te zijn en de reis plezierig te maken.", pl: "Będąc autentycznie otwartym, bardzo sympatycznym i sprawiając, że podróż jest przyjemna.", tr: "Otantik olarak açık, son derece sevimli olarak ve yolculuğu keyifli hale getirerek.", ar: "من خلال الانفتاح الأصيل، والود الكبير، وجعل الرحلة ممتعة." } },
          { c: 'G', text: { en: "By being steadily genuine, deeply consistent, and showing I genuinely care.", es: "Siendo constantemente genuino, profundamente coherente y demostrando que me importa de verdad.", fr: "En étant constamment authentique, profondément cohérent et en montrant que je m'en soucie vraiment.", de: "Indem ich stetig aufrichtig und zutiefst konsequent bin und zeige, dass ich mich ehrlich kümmere.", it: "Essendo costantemente genuino, profondamente coerente e mostrando che ci tengo sinceramente.", pt: "Sendo constantemente genuíno, profundamente consistente e mostrando que me importo genuinamente.", nl: "Door gestaag oprecht, diepgaand consistent te zijn en te laten zien dat ik er echt om geef.", pl: "Będąc stale szczerym, głęboko konsekwentnym i pokazując, że naprawdę mi zależy.", tr: "Sürekli olarak gerçek, derinden tutarlı olarak ve gerçekten önemsediğimi göstererek.", ar: "من خلال كوني حقيقيًا بثبات، ومتسقًا بعمق، وإظهار أنني أهتم حقًا." } },
          { c: 'B', text: { en: "By being pinpoint accurate, flawlessly thorough, and always following through.", es: "Siendo exacto, impecablemente exhaustivo y siempre cumpliendo lo acordado.", fr: "En étant d'une précision extrême, parfaitement minutieux et en allant toujours jusqu'au bout.", de: "Indem ich haargenau, makellos gründlich bin und die Dinge immer zu Ende führe.", it: "Essendo estremamente preciso, impeccabilmente meticoloso e portando sempre a termine le cose.", pt: "Sendo rigorosamente preciso, impecavelmente meticuloso e indo sempre até ao fim.", nl: "Door uiterst nauwkeurig, vlekkeloos grondig te zijn en altijd door te pakken.", pl: "Będąc niezwykle precyzyjnym, bezbłędnie dokładnym i zawsze doprowadzając sprawy do końca.", tr: "Nokta atışı doğru, kusursuz derecede eksiksiz olarak ve her zaman sonuna kadar giderek.", ar: "من خلال كوني دقيقًا تمامًا، وشاملًا بلا عيب، والمتابعة دائمًا." } }
        ]
      },
      { text: { en: "When assigned to a cross-functional group, your natural role effortlessly becomes…", es: "Cuando se te asigna a un grupo interfuncional, tu rol natural se convierte sin esfuerzo en…", fr: "Lorsqu'on vous assigne à un groupe interfonctionnel, votre rôle naturel devient sans effort…", de: "Wenn Sie einer funktionsübergreifenden Gruppe zugewiesen werden, wird Ihre natürliche Rolle mühelos zu…", it: "Quando vieni assegnato a un gruppo interfunzionale, il tuo ruolo naturale diventa senza sforzo…", pt: "Quando é atribuído a um grupo multifuncional, o seu papel natural torna-se sem esforço…", nl: "Wanneer je aan een cross-functionele groep wordt toegewezen, wordt je natuurlijke rol moeiteloos…", pl: "Kiedy zostajesz przydzielony do grupy wielofunkcyjnej, twoją naturalną rolą bez wysiłku staje się…", tr: "Çapraz işlevli bir gruba atandığınızda, doğal rolünüz zahmetsizce şu hale gelir…", ar: "عند تكليفك بمجموعة متعددة الوظائف، يصبح دورك الطبيعي بسهولة…" },
        options: [
          { c: 'R', text: { en: "The driver who forces progress and holds everyone strictly accountable.", es: "El impulsor que fuerza el progreso y responsabiliza estrictamente a todos.", fr: "Le moteur qui force le progrès et tient chacun strictement responsable.", de: "Der Antreiber, der den Fortschritt erzwingt und jeden strikt in die Pflicht nimmt.", it: "Il motore che forza il progresso e ritiene tutti strettamente responsabili.", pt: "O impulsionador que força o progresso e responsabiliza estritamente todos.", nl: "De aanjager die vooruitgang afdwingt en iedereen strikt verantwoordelijk houdt.", pl: "Siła napędowa, która wymusza postęp i pociąga wszystkich do surowej odpowiedzialności.", tr: "İlerlemeyi zorlayan ve herkesi kesinlikle sorumlu tutan sürücü.", ar: "المحرك الذي يفرض التقدم ويحمل الجميع المسؤولية بصرامة." } },
          { c: 'Y', text: { en: "The spark who generates big ideas and keeps the team's spirit flying high.", es: "La chispa que genera grandes ideas y mantiene el espíritu del equipo por las nubes.", fr: "L'étincelle qui génère de grandes idées et maintient le moral de l'équipe au beau fixe.", de: "Der Funke, der große Ideen generiert und den Teamgeist hoch fliegen lässt.", it: "La scintilla che genera grandi idee e mantiene alto lo spirito del team.", pt: "A faísca que gera grandes ideias e mantém o espírito da equipa em alta.", nl: "De vonk die grote ideeën genereert en de teamgeest hoog houdt.", pl: "Iskra, która generuje wielkie pomysły i utrzymuje ducha zespołu na wysokim poziomie.", tr: "Büyük fikirler üreten ve takımın ruhunu yüksek tutan kıvılcım.", ar: "الشرارة التي تولد أفكارًا كبيرة وتحافظ على روح الفريق عالية." } },
          { c: 'G', text: { en: "The anchor who keeps the peace, mediates, and ensures no one is left behind.", es: "El ancla que mantiene la paz, media y se asegura de que nadie se quede atrás.", fr: "Le pilier qui maintient la paix, fait la médiation et s'assure que personne n'est laissé pour compte.", de: "Der Anker, der den Frieden bewahrt, vermittelt und sicherstellt, dass niemand zurückgelassen wird.", it: "L'ancora che mantiene la pace, media e si assicura che nessuno venga lasciato indietro.", pt: "A âncora que mantém a paz, faz a mediação e garante que ninguém fica para trás.", nl: "Het anker dat de vrede bewaart, bemiddelt en ervoor zorgt dat niemand achterblijft.", pl: "Kotwica, która utrzymuje spokój, mediuje i dba o to, by nikt nie został w tyle.", tr: "Barışı koruyan, arabuluculuk yapan ve kimsenin geride kalmamasını sağlayan çapa.", ar: "المرساة التي تحافظ على السلام، وتتوسط، وتتأكد من عدم ترك أي شخص خلف الركب." } },
          { c: 'B', text: { en: "The auditor who spots the hidden flaws and fiercely protects output quality.", es: "El auditor que detecta los fallos ocultos y protege ferozmente la calidad de la producción.", fr: "L'auditeur qui repère les failles cachées et protège farouchement la qualité de la production.", de: "Der Prüfer, der versteckte Mängel erkennt und die Ausgabequalität vehement schützt.", it: "L'auditor che individua i difetti nascosti e protegge ferocemente la qualità dei risultati.", pt: "O auditor que deteta as falhas ocultas e protege ferozmente a qualidade do trabalho.", nl: "De auditor die verborgen gebreken opspoort en de uitvoerkwaliteit fel beschermt.", pl: "Audytor, który dostrzega ukryte wady i zaciekle chroni jakość wyników.", tr: "Gizli kusurları tespit eden ve çıktı kalitesini şiddetle koruyan denetçi.", ar: "المدقق الذي يكتشف العيوب الخفية ويحمي جودة المخرجات بشراسة." } }
        ]
      },
      { text: { en: "At the conclusion of a deeply gruelling week, you feel the most immense satisfaction when…", es: "Al concluir una semana profundamente agotadora, sientes la satisfacción más inmensa cuando…", fr: "À l'issue d'une semaine particulièrement éprouvante, vous ressentez l'immense satisfaction de…", de: "Am Ende einer zutiefst aufreibenden Woche spüren Sie die allergrößte Zufriedenheit, wenn…", it: "Al termine di una settimana profondamente estenuante, provi l'immensa soddisfazione di…", pt: "No final de uma semana profundamente extenuante, sente a mais imensa satisfação quando…", nl: "Aan het einde van een zeer slopende week voel je de meest immense voldoening wanneer…", pl: "Na koniec głęboko wyczerpującego tygodnia czujesz największą satysfakcję, gdy…", tr: "Derinden yorucu bir haftanın sonunda en büyük tatmini şu zaman hissedersiniz…", ar: "في نهاية أسبوع مرهق للغاية، تشعر برضا هائل عندما…" },
        options: [
          { c: 'R', text: { en: "You aggressively hit every single target and obliterated the obstacles.", es: "Alcanzaste agresivamente todos y cada uno de los objetivos y aniquilaste los obstáculos.", fr: "Vous avez agressivement atteint chacun de vos objectifs et réduit les obstacles à néant.", de: "Sie jedes einzelne Ziel aggressiv erreicht und die Hindernisse aus dem Weg geräumt haben.", it: "Hai raggiunto in modo aggressivo ogni singolo obiettivo e annientato gli ostacoli.", pt: "Atingiu agressivamente todos os objetivos e obliterou os obstáculos.", nl: "Je agressief elk doel hebt gehaald en de obstakels hebt weggevaagd.", pl: "Agresywnie osiągnąłeś każdy pojedynczy cel i zniszczyłeś przeszkody.", tr: "Tüm hedefleri agresif bir şekilde vurdunuz ve engelleri yok ettiniz.", ar: "لقد حققت كل هدف بقوة ودمرت العقبات." } },
          { c: 'Y', text: { en: "You fostered brilliant conversations and made the tough grind genuinely fun.", es: "Fomentaste conversaciones brillantes e hiciste que el trabajo duro fuera genuinamente divertido.", fr: "Vous avez favorisé des conversations brillantes et rendu le travail acharné véritablement amusant.", de: "Sie brillante Gespräche gefördert und die harte Arbeit wirklich unterhaltsam gemacht haben.", it: "Hai favorito conversazioni brillanti e reso il duro lavoro genuinamente divertente.", pt: "Promoveu conversas brilhantes e tornou o trabalho árduo genuinamente divertido.", nl: "Je briljante gesprekken hebt gevoerd en het zware werk echt leuk hebt gemaakt.", pl: "Przeprowadziłeś wspaniałe rozmowy i sprawiłeś, że ciężka praca była naprawdę zabawna.", tr: "Harika sohbetler geliştirdiniz ve zorlu işleri gerçekten eğlenceli hale getirdiniz.", ar: "لقد عززت محادثات رائعة وجعلت العمل الشاق ممتعًا حقًا." } },
          { c: 'G', text: { en: "Your team felt totally supported and the entire operation ran smoothly.", es: "Tu equipo se sintió totalmente apoyado y toda la operación funcionó sin problemas.", fr: "Votre équipe s'est sentie totalement soutenue et l'ensemble de l'opération s'est déroulé sans accroc.", de: "Sich Ihr Team voll und ganz unterstützt fühlte und der gesamte Betrieb reibungslos lief.", it: "Il tuo team si è sentito totalmente supportato e l'intera operazione si è svolta senza intoppi.", pt: "A sua equipa sentiu-se totalmente apoiada e toda a operação decorreu sem problemas.", nl: "Je team zich volledig gesteund voelde en de hele operatie soepel verliep.", pl: "Twój zespół czuł całkowite wsparcie, a cała operacja przebiegła gładko.", tr: "Ekibiniz tamamen desteklendiğini hissetti ve tüm operasyon sorunsuz bir şekilde ilerledi.", ar: "شعر فريقك بالدعم الكامل وسارت العملية بأكملها بسلاسة." } },
          { c: 'B', text: { en: "You produced work that was flawlessly accurate, thorough, and of the highest quality.", es: "Produjiste un trabajo que fue impecablemente preciso, exhaustivo y de la más alta calidad.", fr: "Vous avez produit un travail d'une précision irréprochable, minutieux et de la plus haute qualité.", de: "Sie Arbeit geleistet haben, die fehlerfrei genau, gründlich und von höchster Qualität war.", it: "Hai prodotto un lavoro che era impeccabilmente accurato, meticoloso e della massima qualità.", pt: "Produziu um trabalho que foi impecavelmente preciso, rigoroso e da mais alta qualidade.", nl: "Je werk hebt afgeleverd dat foutloos accuraat, grondig en van de hoogste kwaliteit was.", pl: "Wyprodukowałeś pracę, która była bezbłędnie dokładna, skrupulatna i najwyższej jakości.", tr: "Kusursuz derecede doğru, eksiksiz ve en yüksek kalitede bir iş ürettiniz.", ar: "لقد أنتجت عملاً دقيقًا وشاملاً وخاليًا من العيوب وبأعلى جودة." } }
        ]
      },
      { text: { en: "When you are absolutely forced to give someone difficult news, you…", es: "Cuando te ves absolutamente obligado a darle a alguien noticias difíciles, tú…", fr: "Lorsque vous êtes absolument obligé d'annoncer une nouvelle difficile à quelqu'un, vous…", de: "Wenn Sie absolut gezwungen sind, jemandem eine schwierige Nachricht zu überbringen, Sie…", it: "Quando sei assolutamente costretto a dare a qualcuno una notizia difficile, tu…", pt: "Quando é absolutamente forçado a dar más notícias a alguém, você…", nl: "Wanneer je absoluut gedwongen bent om iemand slecht nieuws te brengen, jij…", pl: "Kiedy jesteś absolutnie zmuszony do przekazania komuś trudnej wiadomości, ty…", tr: "Birine zor bir haber vermek zorunda kaldığınızda, siz…", ar: "عندما تضطر تمامًا إلى إخبار شخص ما بأخبار صعبة، فإنك…" },
        options: [
          { c: 'R', text: { en: "Cut to the chase and deliver it immediately — delaying only causes pain.", es: "Vas al grano y la entregas de inmediato: retrasarla solo causa dolor.", fr: "Allez droit au but et l'annoncez immédiatement — retarder ne fait que causer de la douleur.", de: "Kommen direkt zur Sache und überbringen sie sofort – Verzögerung verursacht nur Schmerz.", it: "Arrivi al sodo e la comunichi immediatamente — ritardare causa solo dolore.", pt: "Vai direto ao assunto e dá a notícia imediatamente — atrasar só causa dor.", nl: "Komt direct ter zake en brengt het onmiddellijk — uitstellen veroorzaakt alleen maar pijn.", pl: "Przechodzisz do setki i przekazujesz ją natychmiast — opóźnianie powoduje tylko ból.", tr: "Sadede gelir ve hemen verirsiniz — ertelemek sadece acıya neden olur.", ar: "ادخل في صلب الموضوع وقم بتسليمها على الفور - فالتأخير لا يسبب سوى الألم." } },
          { c: 'Y', text: { en: "Frame it around future hope, focusing heavily on the positives that come next.", es: "La enmarcas en torno a la esperanza futura, centrándote fuertemente en los aspectos positivos que vienen después.", fr: "L'encadrez autour de l'espoir futur, en vous concentrant fortement sur les aspects positifs qui suivront.", de: "Formulieren sie im Hinblick auf zukünftige Hoffnung und konzentrieren sich stark auf das Positive, das als Nächstes kommt.", it: "La inquadri intorno alla speranza futura, concentrandoti pesantemente sugli aspetti positivi che verranno dopo.", pt: "Enquadra-a em torno da esperança futura, focando-se fortemente nos aspetos positivos que se seguem.", nl: "Kadert het rond toekomstige hoop, sterk gefocust op de positieve dingen die daarna komen.", pl: "Opierasz ją na nadziei na przyszłość, silnie koncentrując się na pozytywach, które nadejdą później.", tr: "Gelecek umuduna odaklanarak ve bir sonraki olumlu yönlere ağırlık vererek çerçevelersiniz.", ar: "صُغها حول أمل المستقبل، مع التركيز بشدة على الإيجابيات التي ستأتي بعد ذلك." } },
          { c: 'G', text: { en: "Choose your words with supreme care and prioritise checking in on their feelings.", es: "Eliges tus palabras con sumo cuidado y priorizas consultar sobre sus sentimientos.", fr: "Choisissez vos mots avec un soin extrême et donnez la priorité à vérifier ce qu'ils ressentent.", de: "Wählen Ihre Worte mit größter Sorgfalt und priorisieren es, nach ihren Gefühlen zu sehen.", it: "Scegli le tue parole con estrema cura e dai la priorità al controllo dei loro sentimenti.", pt: "Escolhe as suas palavras com extremo cuidado e prioriza verificar os seus sentimentos.", nl: "Kiest je woorden met uiterste zorg en geeft prioriteit aan het checken van hun gevoelens.", pl: "Wybierasz słowa z najwyższą starannością i priorytetowo traktujesz sprawdzenie ich uczuć.", tr: "Kelimelerinizi son derece dikkatli seçer ve duygularını kontrol etmeye öncelik verirsiniz.", ar: "اختر كلماتك بعناية فائقة وقم بإعطاء الأولوية للتحقق من مشاعرهم." } },
          { c: 'B', text: { en: "Script the facts meticulously to ensure total clarity and prevent any emotional misunderstanding.", es: "Elaboras un guión minucioso de los hechos para garantizar una claridad total y evitar cualquier malentendido emocional.", fr: "Rédigez les faits méticuleusement pour garantir une clarté totale et éviter tout malentendu émotionnel.", de: "Verfassen die Fakten akribisch, um völlige Klarheit zu gewährleisten und emotionale Missverständnisse zu vermeiden.", it: "Scrivi i fatti meticolosamente per garantire totale chiarezza e prevenire qualsiasi malinteso emotivo.", pt: "Escreve os factos meticulosamente para garantir clareza total e prevenir qualquer mal-entendido emocional.", nl: "Schrijft de feiten nauwgezet op om totale duidelijkheid te garanderen en emotionele misverstanden te voorkomen.", pl: "Skrupulatnie spisujesz fakty, aby zapewnić całkowitą jasność i zapobiec emocjonalnym nieporozumieniom.", tr: "Tam bir netlik sağlamak ve herhangi bir duygusal yanlış anlaşılmayı önlemek için gerçekleri titizlikle yazarsınız.", ar: "قم بصياغة الحقائق بدقة لضمان الوضوح التام ومنع أي سوء فهم عاطفي." } }
        ]
      },
      { text: { en: "In your private personal life, your closest friends would most likely describe you as…", es: "En tu vida personal privada, lo más probable es que tus amigos más cercanos te describan como…", fr: "Dans votre vie personnelle privée, vos amis les plus proches vous décriraient très probablement comme…", de: "In Ihrem privaten Privatleben würden Ihre engsten Freunde Sie höchstwahrscheinlich beschreiben als…", it: "Nella tua vita personale privata, i tuoi amici più stretti ti descriverebbero molto probabilmente come…", pt: "Na sua vida pessoal privada, os seus amigos mais chegados provavelmente descrevê-lo-iam como…", nl: "In je privéleven zouden je beste vrienden je hoogstwaarschijnlijk omschrijven als…", pl: "W twoim życiu prywatnym twoi najbliżsi przyjaciele najprawdopodobniej opisaliby cię jako…", tr: "Özel kişisel yaşamınızda, en yakın arkadaşlarınız sizi büyük ihtimalle şöyle tanımlardı…", ar: "في حياتك الشخصية الخاصة، من المرجح أن يصفك أصدقاؤك المقربون بأنك…" },
        options: [
          { c: 'R', text: { en: "The initiator who gets everyone off the sofa and makes big things happen.", es: "El iniciador que levanta a todos del sofá y hace que sucedan grandes cosas.", fr: "L'initiateur qui fait lever tout le monde du canapé et permet de réaliser de grandes choses.", de: "Der Initiator, der alle vom Sofa holt und große Dinge möglich macht.", it: "L'iniziatore che fa alzare tutti dal divano e fa succedere grandi cose.", pt: "O iniciador que tira todos do sofá e faz acontecer grandes coisas.", nl: "De initiatiefnemer die iedereen van de bank krijgt en grote dingen laat gebeuren.", pl: "Inicjator, który podrywa wszystkich z kanapy i sprawia, że dzieją się wielkie rzeczy.", tr: "Herkesi kanepeden kaldıran ve büyük şeylerin olmasını sağlayan başlatıcı.", ar: "المبادر الذي ينهض الجميع من على الأريكة ويجعل الأشياء العظيمة تحدث." } },
          { c: 'Y', text: { en: "The lively one — always up for a wild adventure and full of infectious energy.", es: "El animado: siempre dispuesto a una aventura salvaje y lleno de energía contagiosa.", fr: "Le boute-en-train — toujours prêt pour une aventure folle et plein d'une énergie contagieuse.", de: "Der Lebhafte – immer bereit für ein wildes Abenteuer und voller ansteckender Energie.", it: "Quello vivace — sempre pronto per un'avventura selvaggia e pieno di energia contagiosa.", pt: "O animado — sempre pronto para uma aventura selvagem e cheio de energia contagiante.", nl: "De levendige — altijd in voor een wild avontuur en vol aanstekelijke energie.", pl: "Żywiołowy — zawsze gotowy na szaloną przygodę i pełen zaraźliwej energii.", tr: "Hayat dolu olan — her zaman çılgın bir maceraya hazır ve bulaşıcı enerjiyle dolu.", ar: "الشخص المليء بالحيوية - مستعد دائمًا لمغامرة برية ومليء بالطاقة المعدية." } },
          { c: 'G', text: { en: "The fiercely loyal one — always silently there when it matters, without ever being asked.", es: "El ferozmente leal: siempre silenciosamente allí cuando importa, sin que se lo pidan jamás.", fr: "Le farouchement fidèle — toujours présent silencieusement quand ça compte, sans jamais qu'on le lui demande.", de: "Der extrem Loyale – immer still zur Stelle, wenn es darauf ankommt, ohne jemals gefragt zu werden.", it: "Quello ferocemente leale — sempre silenziosamente presente quando conta, senza che gli venga mai chiesto.", pt: "O ferozmente leal — sempre silenciosamente presente quando é preciso, sem nunca lhe ser pedido.", nl: "De enorm loyale — er altijd stilletjes als het er toe doet, zonder dat er ooit om is gevraagd.", pl: "Zaciekle lojalny — zawsze bezgłośnie obecny, gdy ma to znaczenie, bez żadnej prośby.", tr: "Son derece sadık olan — sorulmadan, önemli olduğunda her zaman sessizce orada olan.", ar: "الشخص المخلص بشراسة - دائمًا ما يكون موجودًا بصمت عندما يهم الأمر، دون أن يُطلب منه ذلك أبدًا." } },
          { c: 'B', text: { en: "The highly thoughtful one — deeply considered, entirely reliable, and endlessly well-prepared.", es: "El muy reflexivo: profundamente considerado, completamente confiable e infinitamente bien preparado.", fr: "Le très réfléchi — profondément réfléchi, entièrement fiable et infiniment bien préparé.", de: "Der überaus Nachdenkliche – tief überlegt, absolut zuverlässig und unendlich gut vorbereitet.", it: "Quello altamente riflessivo — profondamente ponderato, interamente affidabile e infinitamente ben preparato.", pt: "O altamente atencioso — profundamente ponderado, inteiramente fiável e infinitamente bem preparado.", nl: "De zeer bedachtzame — diep overwogen, volledig betrouwbaar en eindeloos goed voorbereid.", pl: "Wysoce rozważny — głęboko przemyślany, całkowicie niezawodny i nieskończenie dobrze przygotowany.", tr: "Oldukça düşünceli olan — derinlemesine düşünülmüş, tamamen güvenilir ve sonsuz derecede iyi hazırlanmış.", ar: "الشخص المدروس للغاية - مدروس بعمق، وموثوق به تمامًا، ومستعد دائمًا بشكل لا نهائي." } }
        ]
      },
      { text: { en: "When you are thrust into learning a deeply complex new system, you strongly prefer to…", es: "Cuando te ves obligado a aprender un sistema nuevo y profundamente complejo, prefieres firmemente…", fr: "Lorsque vous êtes contraint d'apprendre un nouveau système profondément complexe, vous préférez fortement…", de: "Wenn Sie gezwungen sind, ein zutiefst komplexes neues System zu erlernen, bevorzugen Sie es stark…", it: "Quando sei costretto a imparare un nuovo sistema profondamente complesso, preferisci fortemente…", pt: "Quando é forçado a aprender um sistema novo e profundamente complexo, prefere fortemente…", nl: "Wanneer je in het diepe wordt gegooid om een zeer complex nieuw systeem te leren, geef je er sterk de voorkeur aan om…", pl: "Kiedy jesteś zmuszony do nauki głęboko złożonego nowego systemu, zdecydowanie wolisz…", tr: "Oldukça karmaşık yeni bir sistemi öğrenmeye itildiğinizde, şunları tercih edersiniz…", ar: "عندما تُضطر إلى تعلم نظام جديد معقد للغاية، فإنك تفضل بشدة أن…" },
        options: [
          { c: 'R', text: { en: "Break it immediately, try it straight away, and learn aggressively by doing.", es: "Romperlo de inmediato, probarlo al instante y aprender agresivamente haciendo.", fr: "Le casser immédiatement, l'essayer tout de suite et apprendre agressivement par la pratique.", de: "Es sofort auszuprobieren, es notfalls kaputtzumachen und aggressiv durch Tun zu lernen.", it: "Romperlo immediatamente, provarlo subito e imparare in modo aggressivo facendo.", pt: "Quebrá-lo imediatamente, experimentá-lo logo e aprender agressivamente fazendo.", nl: "Het direct kapot te maken, het meteen te proberen en agressief al doende te leren.", pl: "Od razu spróbować, zaryzykować zepsucie i agresywnie uczyć się w działaniu.", tr: "Hemen kırmak, hemen denemek ve yaparak agresif bir şekilde öğrenmek.", ar: "اكسرها على الفور، وجربها على الفور، وتعلم بقوة من خلال الممارسة." } },
          { c: 'Y', text: { en: "Discuss it actively with others, share theories, and explore it socially together.", es: "Discutirlo activamente con otros, compartir teorías y explorarlo socialmente juntos.", fr: "En discuter activement avec d'autres, partager des théories et l'explorer socialement ensemble.", de: "Aktiv mit anderen darüber zu diskutieren, Theorien auszutauschen und es sozial gemeinsam zu erkunden.", it: "Discuterne attivamente con gli altri, condividere teorie ed esplorarlo socialmente insieme.", pt: "Discuti-lo ativamente com os outros, partilhar teorias e explorá-lo socialmente em conjunto.", nl: "Er actief met anderen over te discussiëren, theorieën te delen en het sociaal samen te verkennen.", pl: "Aktywnie dyskutować o tym z innymi, dzielić się teoriami i wspólnie odkrywać.", tr: "Başkalarıyla aktif olarak tartışmak, teorileri paylaşmak ve birlikte sosyal olarak keşfetmek.", ar: "ناقشه بنشاط مع الآخرين، وشارك النظريات، واستكشفه اجتماعيًا معًا." } },
          { c: 'G', text: { en: "Take your absolute time, ask gentle questions, and ensure complete understanding before moving.", es: "Tomarte todo el tiempo necesario, hacer preguntas suaves y asegurar una comprensión completa antes de moverte.", fr: "Prendre tout votre temps, poser des questions douces et vous assurer d'une compréhension totale avant de bouger.", de: "Sich absolut Zeit zu nehmen, sanfte Fragen zu stellen und ein vollständiges Verständnis sicherzustellen, bevor Sie sich bewegen.", it: "Prenderti tutto il tuo tempo, fare domande gentili e garantire una comprensione completa prima di muoverti.", pt: "Levar todo o tempo necessário, fazer perguntas gentis e garantir compreensão total antes de se mover.", nl: "Absoluut je tijd te nemen, voorzichtige vragen te stellen en zorgen voor volledig begrip voordat je verdergaat.", pl: "Nie spieszyć się absolutnie, zadawać łagodne pytania i zapewnić pełne zrozumienie przed wykonaniem ruchu.", tr: "Gereken tüm zamanı ayırmak, nazik sorular sormak ve hareket etmeden önce tam bir anlayış sağlamak.", ar: "خذ وقتك المطلق، واسأل أسئلة لطيفة، وتأكد من الفهم الكامل قبل التحرك." } },
          { c: 'B', text: { en: "Read the manual cover-to-cover, study the intricate detail, and build a theoretical understanding first.", es: "Leer el manual de principio a fin, estudiar los detalles intrincados y construir primero una comprensión teórica.", fr: "Lire le manuel de bout en bout, étudier les détails complexes et bâtir d'abord une compréhension théorique.", de: "Das Handbuch von vorne bis hinten zu lesen, die komplizierten Details zu studieren und zuerst ein theoretisches Verständnis aufzubauen.", it: "Leggere il manuale da cima a fondo, studiare i dettagli intricati e costruire prima una comprensione teorica.", pt: "Ler o manual de capa a capa, estudar os detalhes intrincados e construir primeiro uma compreensão teórica.", nl: "De handleiding van kaft tot kaft te lezen, de ingewikkelde details te bestuderen en eerst een theoretisch begrip op te bouwen.", pl: "Przeczytać instrukcję od deski do deski, przestudiować zawiłe szczegóły i najpierw zbudować zrozumienie teoretyczne.", tr: "Kılavuzu baştan sona okumak, karmaşık detayları incelemek ve önce teorik bir anlayış oluşturmak.", ar: "اقرأ الدليل من الغلاف إلى الغلاف، وادرس التفاصيل المعقدة، وابنِ فهمًا نظريًا أولاً." } }
        ]

      { text: { en: "Which of these specific internal mantras feels the most genuinely authentic to you?", es: "¿Cuál de estos mantras internos específicos se siente más genuinamente auténtico para ti?", fr: "Lequel de ces mantras internes spécifiques vous semble le plus sincèrement authentique ?", de: "Welches dieser spezifischen internen Mantras fühlt sich für Sie am ehrlichsten authentisch an?", it: "Quale di questi specifici mantra interni ti sembra più genuinamente autentico?", pt: "Qual destes mantras internos específicos lhe parece mais genuinamente autêntico?", nl: "Welke van deze specifieke interne mantra's voelt voor jou het meest oprecht authentiek?", pl: "Która z tych konkretnych wewnętrznych mantr wydaje ci się najbardziej autentyczna?", tr: "Bu özel içsel mantralardan hangisi size en içten ve otantik hissettiriyor?", ar: "أي من هذه المانترا الداخلية المحددة تشعر أنها حقيقية وأصيلة بالنسبة لك؟" },
        options: [
          { c: 'R', text: { en: "Just stop talking and get it done.", es: "Simplemente deja de hablar y hazlo.", fr: "Arrêtez de parler et faites-le.", de: "Hör einfach auf zu reden und erledige es.", it: "Smetti di parlare e fallo.", pt: "Apenas pare de falar e faça-o.", nl: "Stop gewoon met praten en doe het.", pl: "Po prostu przestań gadać i to zrób.", tr: "Sadece konuşmayı bırak ve hallet.", ar: "توقف عن الكلام وأنجز الأمر." } },
          { c: 'Y', text: { en: "Let's make this an unforgettable, fun experience.", es: "Hagamos de esto una experiencia inolvidable y divertida.", fr: "Faisons-en une expérience inoubliable et amusante.", de: "Lasst uns dies zu einem unvergesslichen, lustigen Erlebnis machen.", it: "Rendiamo questa un'esperienza indimenticabile e divertente.", pt: "Vamos tornar isto numa experiência inesquecível e divertida.", nl: "Laten we hier een onvergetelijke, leuke ervaring van maken.", pl: "Sprawmy, by było to niezapomniane, zabawne doświadczenie.", tr: "Bunu unutulmaz ve eğlenceli bir deneyim haline getirelim.", ar: "لنجعل هذه تجربة ممتعة لا تُنسى." } },
          { c: 'G', text: { en: "Let's ensure that absolutely everybody is genuinely okay.", es: "Asegurémonos de que absolutamente todos estén genuinamente bien.", fr: "Assurons-nous que tout le monde va vraiment bien.", de: "Lasst uns sicherstellen, dass es absolut jedem wirklich gut geht.", it: "Assicuriamoci che assolutamente tutti stiano sinceramente bene.", pt: "Vamos garantir que absolutamente todos estão genuinamente bem.", nl: "Laten we ervoor zorgen dat absoluut iedereen oprecht oké is.", pl: "Upewnijmy się, że absolutnie wszyscy czują się naprawdę dobrze.", tr: "Kesinlikle herkesin gerçekten iyi olduğundan emin olalım.", ar: "لنتأكد من أن الجميع بخير حقًا." } },
          { c: 'B', text: { en: "Let's make absolutely certain we're doing it flawlessly right.", es: "Asegurémonos absolutamente de que lo estamos haciendo impecablemente bien.", fr: "Assurons-nous absolument que nous le faisons de manière irréprochable.", de: "Lasst uns absolut sichergehen, dass wir es fehlerfrei richtig machen.", it: "Assicuriamoci assolutamente di farlo in modo impeccabile.", pt: "Vamos ter a certeza absoluta de que estamos a fazê-lo de forma impecável.", nl: "Laten we absoluut zeker weten dat we het vlekkeloos goed doen.", pl: "Upewnijmy się absolutnie, że robimy to bezbłędnie dobrze.", tr: "Bunu kusursuz bir şekilde doğru yaptığımızdan kesinlikle emin olalım.", ar: "لنتأكد تمامًا من أننا نفعل ذلك بشكل لا تشوبه شائبة." } }
        ]
