<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Colour Insights — 16 Type Multilingual</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --border:#d8e1ec;
      --ink:#0f172a;
      --ink2:#475569;
      --ink3:#64748b;
      --accent:#2563eb;
      --accent2:#1d4ed8;
      --red:#e05a47;
      --yellow:#d8a73c;
      --green:#2f8f6b;
      --blue:#2563eb;
      --redSoft:#fff1ee;
      --yellowSoft:#fff8e8;
      --greenSoft:#eef9f4;
      --blueSoft:#eef4ff;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(180deg,#f7fafc 0%,#f3f7fb 100%);
      color:var(--ink);
    }
    .page{
      max-width:980px;
      margin:0 auto;
      padding:20px 18px 64px;
    }
    .toolbar{
      display:flex;
      justify-content:flex-end;
      margin-bottom:18px;
    }
    .lang-wrap{
      background:rgba(255,255,255,0.96);
      border:1px solid var(--border);
      border-radius:16px;
      padding:14px;
      min-width:260px;
      box-shadow:0 8px 24px rgba(15,23,42,0.06);
    }
    .lang-label{
      display:block;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--ink3);
      margin-bottom:8px;
      font-weight:700;
    }
    select,input{
      width:100%;
      padding:12px 14px;
      border:1px solid #cbd5e1;
      border-radius:10px;
      font-size:15px;
      background:#fff;
      color:var(--ink);
    }
    .screen{display:none}
    .screen.active{display:block}
    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:24px;
      margin-bottom:16px;
      box-shadow:0 10px 28px rgba(15,23,42,0.04);
    }
    .eyebrow{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:var(--accent);
      margin-bottom:12px;
      font-weight:700;
    }
    h1{
      font-size:40px;
      line-height:1.04;
      margin:0 0 14px;
    }
    h2{
      font-size:28px;
      line-height:1.2;
      margin:0 0 16px;
    }
    h3{
      font-size:18px;
      margin:0 0 12px;
    }
    p{
      line-height:1.75;
      color:var(--ink2);
      margin:0 0 14px;
    }
    .legend{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      margin:22px 0 26px;
    }
    .legend-item{
      display:flex;
      gap:12px;
      align-items:center;
      border:1px solid var(--border);
      border-radius:12px;
      padding:14px;
      background:#fff;
    }
    .swatch{
      width:8px;height:38px;border-radius:999px;flex-shrink:0;
    }
    .legend-title{
      font-size:13px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.05em;
      margin-bottom:4px;
    }
    .legend-sub{
      color:var(--ink3);
      font-size:13px;
    }
    .field-label{
      display:block;
      margin:0 0 8px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.08em;
      color:var(--ink3);
      font-weight:700;
    }
    button{
      border:none;
      border-radius:12px;
      padding:14px 20px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
    }
    .btn-primary{
      background:var(--accent);
      color:#fff;
    }
    .btn-secondary{
      background:#fff;
      color:var(--ink2);
      border:1px solid #cbd5e1;
    }
    .btn-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border:none;
      border-radius:12px;
      padding:14px 20px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      background:var(--accent);
      color:#fff;
      text-decoration:none;
    }
    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }
    .progress-top{
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:center;
      margin-bottom:10px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:var(--ink3);
      font-weight:700;
    }
    .progress-track{
      height:8px;
      background:#e7eef7;
      border-radius:999px;
      overflow:hidden;
      margin-bottom:20px;
    }
    .progress-fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#3b82f6,#2563eb);
    }
    .qnum{
      margin-bottom:12px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.14em;
      color:var(--ink3);
      font-weight:700;
    }
    .options{
      display:grid;
      gap:10px;
    }
    .option{
      width:100%;
      text-align:left;
      padding:16px;
      border:1px solid var(--border);
      border-radius:14px;
      background:#fff;
      color:var(--ink2);
      font-weight:500;
    }
    .option:hover{
      border-color:#93c5fd;
      background:#f8fbff;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 14px;
      border-radius:999px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      font-weight:700;
      margin-bottom:10px;
    }
    .badge-dot{
      width:8px;height:8px;border-radius:50%;
      flex-shrink:0;
    }
    .bars{
      display:grid;
      gap:12px;
    }
    .bar-row{
      display:grid;
      grid-template-columns:160px 1fr 48px;
      gap:12px;
      align-items:center;
    }
    .bar-track{
      height:10px;
      background:#e2e8f0;
      border-radius:999px;
      overflow:hidden;
    }
    .bar-fill{
      height:100%;
      width:0%;
    }
    .list{
      margin:0;
      padding-left:18px;
      color:var(--ink2);
      line-height:1.85;
    }
    .grid-2{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
    }
    .rtl{
      direction:rtl;
      text-align:right;
    }
    .rtl .toolbar{justify-content:flex-start}
    .rtl .bar-row{grid-template-columns:48px 1fr 160px}
    .rtl .list{padding-left:0;padding-right:18px}
    .rtl .option{text-align:right}
    @media print{
      .toolbar{display:none !important;}
      .no-print{display:none !important;}
      body{background:#fff;}
      .card{box-shadow:none;}
    }
    @media (max-width:760px){
      .legend,.grid-2{grid-template-columns:1fr}
      .bar-row{grid-template-columns:1fr}
      .rtl .bar-row{grid-template-columns:1fr}
      h1{font-size:30px}
      h2{font-size:24px}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="toolbar no-print">
      <div class="lang-wrap">
        <label class="lang-label" id="languageLabel" for="languageSelect">Language</label>
        <select id="languageSelect"></select>
      </div>
    </div>

    <div id="intro" class="screen active">
      <div class="card">
        <div class="eyebrow" id="introEyebrow"></div>
        <h1 id="introTitle"></h1>
        <p id="introSubtitle"></p>

        <div class="legend">
          <div class="legend-item">
            <div class="swatch" style="background:var(--red)"></div>
            <div>
              <div class="legend-title" id="redName"></div>
              <div class="legend-sub" id="redTag"></div>
            </div>
          </div>
          <div class="legend-item">
            <div class="swatch" style="background:var(--yellow)"></div>
            <div>
              <div class="legend-title" id="yellowName"></div>
              <div class="legend-sub" id="yellowTag"></div>
            </div>
          </div>
          <div class="legend-item">
            <div class="swatch" style="background:var(--green)"></div>
            <div>
              <div class="legend-title" id="greenName"></div>
              <div class="legend-sub" id="greenTag"></div>
            </div>
          </div>
          <div class="legend-item">
            <div class="swatch" style="background:var(--blue)"></div>
            <div>
              <div class="legend-title" id="blueName"></div>
              <div class="legend-sub" id="blueTag"></div>
            </div>
          </div>
        </div>

        <label class="field-label" id="nameLabel" for="userName"></label>
        <input id="userName" type="text" />

        <div class="actions">
          <button class="btn-primary" onclick="startQuiz()" id="startBtn"></button>
        </div>
      </div>
    </div>

    <div id="quiz" class="screen">
      <div class="card">
        <div class="progress-top">
          <span id="progressLabel"></span>
          <span id="progressPct"></span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="qnum" id="questionNumber"></div>
        <h2 id="questionText"></h2>
        <div class="options" id="options"></div>
      </div>
    </div>

    <div id="report" class="screen">
      <div class="card">
        <div class="eyebrow" id="reportEyebrow"></div>
        <h1 id="reportName"></h1>
        <div class="badge" id="reportBadge">
          <span class="badge-dot" id="badgeDot"></span>
          <span id="reportType"></span>
        </div>
        <p id="reportTagline"></p>
      </div>

      <div class="card">
        <h3 id="breakdownTitle"></h3>
        <div class="bars">
          <div class="bar-row">
            <div id="labelR"></div>
            <div class="bar-track"><div id="barR" class="bar-fill" style="background:var(--red)"></div></div>
            <div id="pctR"></div>
          </div>
          <div class="bar-row">
            <div id="labelY"></div>
            <div class="bar-track"><div id="barY" class="bar-fill" style="background:var(--yellow)"></div></div>
            <div id="pctY"></div>
          </div>
          <div class="bar-row">
            <div id="labelG"></div>
            <div class="bar-track"><div id="barG" class="bar-fill" style="background:var(--green)"></div></div>
            <div id="pctG"></div>
          </div>
          <div class="bar-row">
            <div id="labelB"></div>
            <div class="bar-track"><div id="barB" class="bar-fill" style="background:var(--blue)"></div></div>
            <div id="pctB"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <h3 id="overviewTitle"></h3>
        <p id="overviewText"></p>
      </div>

      <div class="card">
        <h3 id="communicationTitle"></h3>
        <p id="communicationText"></p>
      </div>

      <div class="grid-2">
        <div class="card">
          <h3 id="workStyleTitle"></h3>
          <p id="workStyleText"></p>
        </div>
        <div class="card">
          <h3 id="motivationTitle"></h3>
          <p id="motivationText"></p>
        </div>
      </div>

      <div class="grid-2">
        <div class="card">
          <h3 id="decisionTitle"></h3>
          <p id="decisionText"></p>
        </div>
        <div class="card">
          <h3 id="misreadTitle"></h3>
          <p id="misreadText"></p>
        </div>
      </div>

      <div class="grid-2">
        <div class="card">
          <h3 id="strengthsTitle"></h3>
          <ul class="list" id="strengthsList"></ul>
        </div>
        <div class="card">
          <h3 id="watchoutsTitle"></h3>
          <ul class="list" id="watchoutsList"></ul>
        </div>
      </div>

      <div class="grid-2">
        <div class="card">
          <h3 id="tipsTitle"></h3>
          <ul class="list" id="tipsList"></ul>
        </div>
        <div class="card">
          <h3 id="growthTitle"></h3>
          <p id="growthText"></p>
        </div>
      </div>

      <div class="card no-print">
        <div class="actions">
          <a id="openReportBtn" class="btn-link" href="#" target="_blank" rel="noreferrer">
            <span id="openReportText">Open full report</span>
          </a>
          <button class="btn-secondary" onclick="restart()" id="restartBtn"></button>
        </div>
      </div>
    </div>
  </div>

          blendWork: "This often makes you more relational, trusted, and aware of emotional impact than people expect at first glance.",
          blendRisk: "Under stress, this can show up as over-accommodation, carrying too much for others, or softening your true view."
        },
        B: {
          addition: "Your secondary Blue energy adds structure, precision, and a stronger drive to get things right as well as get them done.",
          blendWork: "This often gives you more discipline, analysis, and quality-control than people initially notice.",
          blendRisk: "Under stress, this can show up as over-analysis, caution, or being harder to satisfy."
        }
      },

      strengths: {
        RR:["Moves quickly to decisions","Sets direction clearly","Thrives with ownership","Pushes work forward decisively","Keeps attention on outcomes"],
        RY:["Creates momentum fast","Combines drive with visibility","Persuades people into action","Makes ambition feel exciting","Raises the energy around goals"],
        RG:["Balances challenge with care","Builds trust while moving forward","Leads firmly without losing people","Can be direct without being cold","Supports performance and relationships together"],
        RB:["Combines action with rigour","Makes sharp decisions","Focuses on both speed and quality","Cuts through noise with logic","Brings strong performance standards"],
        YR:["Inspires and mobilises quickly","Brings optimism with ambition","Raises energy around goals","Makes ideas feel alive and urgent","Encourages action through enthusiasm"],
        YY:["Builds excitement naturally","Connects with people easily","Keeps energy high","Creates positive momentum","Helps people feel engaged and included"],
        YG:["Creates warm, inclusive energy","Builds rapport quickly","Encourages people naturally","Makes collaboration feel safe","Brings care and positivity together"],
        YB:["Connects ideas creatively","Explains things in engaging ways","Balances curiosity with thoughtfulness","Makes complex things accessible","Combines imagination with reflection"],
        GR:["Supports people while staying firm","Builds commitment through trust","Handles sensitive situations with strength","Creates safety without losing direction","Keeps relationships steady under pressure"],
        GY:["Creates belonging and warmth","Lifts people gently","Keeps morale steady and positive","Supports culture and connection","Helps people feel seen and valued"],
        GG:["Builds deep trust","Offers reliable support","Creates steadiness and calm","Listens carefully","Strengthens cohesion quietly but powerfully"],
        GB:["Balances care with precision","Thinks carefully about impact","Builds dependable judgement","Supports people responsibly","Combines empathy with thoughtfulness"],
        BR:["Holds high standards","Acts with logic and authority","Brings discipline to decisions","Protects quality under pressure","Sees weaknesses before others do"],
        BY:["Combines depth with imagination","Brings fresh perspective","Makes complex ideas accessible","Thinks creatively without losing logic","Links insight with originality"],
        BG:["Thinks carefully and acts responsibly","Brings calm judgement","Protects quality and people","Sees both risk and relationship impact","Builds trust through thoughtful standards"],
        BB:["Analyses deeply","Protects standards","Brings consistency and accuracy","Thinks ahead carefully","Improves quality through rigour"]
      },

      watchouts: {
        RR:["May become too forceful when things move slowly","Can overlook emotional impact in pursuit of speed","May expect others to operate at the same intensity"],
        RY:["Can over-promise or move too fast","May dominate discussion with pace and energy","Can lose patience with detail-heavy execution"],
        RG:["May feel tension between harmony and directness","Can take on too much responsibility for people outcomes","May soften hard truths more than is useful"],
        RB:["Can become demanding when standards slip","May expect others to process as quickly and rigorously as you do","Can appear intimidating even when simply being clear"],
        YR:["May chase momentum before enough structure exists","Can say yes too quickly","May struggle when energy drops and discipline is required"],
        YY:["Can lose focus when novelty fades","May avoid friction or hard accountability","Can underestimate the importance of follow-through"],
        YG:["May over-prioritise relationships over clarity","Can hesitate to challenge others directly","May absorb too much emotional responsibility"],
        YB:["Can stay in ideas longer than action needs","May sound clear externally while still feeling internally undecided","Can drift between inspiration and over-analysis"],
        GR:["May stay patient past the point where directness is needed","Can carry people too far instead of letting them own outcomes","May avoid visible conflict even when necessary"],
        GY:["Can hide disappointment behind warmth","May struggle to state needs clearly","Can become over-committed to keeping everyone comfortable"],
        GG:["May stay too quiet in high-voice environments","Can delay difficult conversations","May understate the value of your own view"],
        GB:["Can over-process before speaking or deciding","May seem more distant than intended","Can hold back until thinking feels complete"],
        BR:["Can become overly exacting under pressure","May not realise how much intensity others feel from you","Can prefer being right to being relational"],
        BY:["Can get pulled between imagination and caution","Can delay commitment while exploring options","May undervalue simple execution"],
        BG:["Can overweigh risk and responsibility","May keep too much internal rather than sharing earlier","Can struggle to act before all variables feel understood"],
        BB:["Can overthink or over-perfect","May appear colder than intended","Can become overly critical when standards are not met"]
      },

      tips: {
        RR:["Be concise and direct","Focus on results and timelines","Give autonomy with clear targets","Do not over-explain unless asked"],
        RY:["Bring energy and pace","Connect work to visible wins","Avoid overloading with process","Let them influence and drive momentum"],
        RG:["Be honest and respectful","Show how outcomes help people","Balance clarity with support","Acknowledge both results and relationships"],
        RB:["Arrive prepared","Use evidence and clear recommendations","Respect time and standards","Show both commercial and quality logic"],
        YR:["Make it feel exciting","Link work to impact and momentum","Give room for visibility and initiative","Keep things moving without becoming heavy"],
        YY:["Keep things positive and interactive","Recognise contributions openly","Avoid overly rigid structure","Use energy, not just process"],
        YG:["Be warm and inclusive","Show genuine interest","Make collaboration feel safe and meaningful","Give feedback kindly but clearly"],
        YB:["Engage curiosity","Mix inspiration with logic","Give space to think and explore","Use examples, not just abstractions"],
        GR:["Build trust first","Be clear without being cold","Show purpose as well as expectations","Respect their care for people"],
        GY:["Lead with kindness","Acknowledge effort and people impact","Avoid overly harsh delivery","Create safety before challenge"],
        GG:["Be patient and genuine","Give feedback carefully","Create stability and trust","Avoid forcing rushed responses"],
        GB:["Be thoughtful and prepared","Use written clarity when useful","Show both logic and human impact","Allow time to think before deciding"],
        BR:["Be precise and well prepared","Come with evidence","Keep discussions efficient","Do not confuse warmth with vagueness"],
        BY:["Bring interesting ideas","Allow exploration before closure","Back creativity with rationale","Invite thought, then agree action"],
        BG:["Respect thought time","Be calm and clear","Show how decisions affect people and quality","Do not rush complexity unnecessarily"],
        BB:["Be specific and organised","Use facts over emotion","Give time to process before deciding","Keep requests clear and well structured"]
      }
    };

    function translateProfile(lang, type, name) {
      const labels = colourLabels[lang] || colourLabels.en;
      const primary = type[0];
      const secondary = type[1];
      const tagline = (pairTaglines[lang] || pairTaglines.en)[type];

      const primaryBlock = profileTexts.primary[primary];
      const secondaryBlock = profileTexts.secondary[secondary];

      const overview =
        primaryBlock.overview.replace("{name}", name) + " " +
        secondaryBlock.addition + " " +
        secondaryBlock.blendWork;

      const comm =
        primaryBlock.comm + " " +
        secondaryBlock.addition;

      const workStyle =
        primaryBlock.workStyle + " " +
        secondaryBlock.blendWork;

      const motivation =
        primaryBlock.motivation;

      const decisions =
        primaryBlock.decisions + " " +
        secondaryBlock.blendWork;

      const misread =
        primaryBlock.misread;

      const growth =
        primaryBlock.growth + " " +
        secondaryBlock.blendRisk;

      const strengths = profileTexts.strengths[type];
      const watchouts = profileTexts.watchouts[type];
      const tips = profileTexts.tips[type];

      return {
        tagline,
        overview,
        comm,
        workStyle,
        motivation,
        decisions,
        misread,
        growth,
        strengths,
        watchouts,
        tips,
        labels
      };
    }

    function t(key) {
      return (ui[currentLanguage] && ui[currentLanguage][key]) || ui.en[key] || key;
    }

    function fmt(str, vars) {
      return str.replace(/\{(\w+)\}/g, (_, k) => vars[k] ?? "");
    }

    function shuffleArray(arr) {
      const copy = [...arr];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    const optionLetters = ["A","B","C","D"];
    let currentLanguage = localStorage.getItem("colourInsightsLang") || "en";
    let currentQuestion = 0;
    let answers = [];
    let participantName = "";
    let shuffledQuestions = [];

    function applyDirection() {
      const isRtl = RTL_LANGS.includes(currentLanguage);
      document.documentElement.lang = currentLanguage;
      document.documentElement.dir = isRtl ? "rtl" : "ltr";
      document.body.classList.toggle("rtl", isRtl);
    }

    function populateLanguageSelect() {
      const select = document.getElementById("languageSelect");
      if (!select) return;
      select.innerHTML = Object.entries(languages)
        .map(([code, label]) => `<option value="${code}">${label}</option>`)
        .join("");
      if (!languages[currentLanguage]) currentLanguage = "en";
      select.value = currentLanguage;
      select.onchange = (e) => {
        currentLanguage = e.target.value;
        localStorage.setItem("colourInsightsLang", currentLanguage);
        renderApp();
      };
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      const el = document.getElementById(id);
      if (el) el.classList.add("active");
      window.scrollTo({top:0,behavior:"smooth"});
    }

    function renderIntro() {
      const labels = colourLabels[currentLanguage] || colourLabels.en;
      const languageLabel = document.getElementById("languageLabel");
      if (languageLabel) languageLabel.textContent = t("languageLabel");
      document.getElementById("introEyebrow").textContent = t("introEyebrow");
      document.getElementById("introTitle").textContent = t("introTitle");
      document.getElementById("introSubtitle").textContent = t("introSubtitle");
      document.getElementById("nameLabel").textContent = t("nameLabel");
      document.getElementById("userName").placeholder = t("namePlaceholder");
      document.getElementById("startBtn").textContent = t("startBtn");

      document.getElementById("redName").textContent = labels.R.name;
      document.getElementById("redTag").textContent = labels.R.tag;
      document.getElementById("yellowName").textContent = labels.Y.name;
      document.getElementById("yellowTag").textContent = labels.Y.tag;
      document.getElementById("greenName").textContent = labels.G.name;
      document.getElementById("greenTag").textContent = labels.G.tag;
      document.getElementById("blueName").textContent = labels.B.name;
      document.getElementById("blueTag").textContent = labels.B.tag;
    }

    function startQuiz() {
      participantName = document.getElementById("userName").value.trim() || t("participant");
      answers = [];
      currentQuestion = 0;

      shuffledQuestions = shuffleArray(
        originalQuestions.map(q => ({
          text: q.text,
          options: shuffleArray(q.options.map(opt => ({...opt})))
        }))
      );

      showScreen("quiz");
      renderQuestion();
    }

    function renderQuestion() {
      const q = shuffledQuestions[currentQuestion];
      const total = shuffledQuestions.length;
      const pct = Math.round((currentQuestion / total) * 100);

      document.getElementById("progressLabel").textContent = fmt(t("questionOf"), {n: currentQuestion + 1, total});
      document.getElementById("progressPct").textContent = pct + "%";
      document.getElementById("progressFill").style.width = pct + "%";
      document.getElementById("questionNumber").textContent = fmt(t("qnum"), {
        n: String(currentQuestion + 1).padStart(2, "0"),
        total
      });
      document.getElementById("questionText").textContent = q.text;

      const options = document.getElementById("options");
      options.innerHTML = "";
      q.options.forEach((opt, idx) => {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.innerHTML = `<strong style="display:inline-block;width:28px">${optionLetters[idx]}</strong> ${opt.text}`;
        btn.onclick = () => {
          answers.push(opt.c);
          currentQuestion++;
          if (currentQuestion >= shuffledQuestions.length) {
            buildReport();
          } else {
            renderQuestion();
          }
        };
        options.appendChild(btn);
      });
    }

    function computeScores() {
      const counts = {R:0,Y:0,G:0,B:0};
      answers.forEach(a => counts[a]++);
      const total = answers.length || 1;
      return {
        counts,
        pct: {
          R: Math.round(counts.R / total * 100),
          Y: Math.round(counts.Y / total * 100),
          G: Math.round(counts.G / total * 100),
          B: Math.round(counts.B / total * 100)
        }
      };
    }

    function buildReportUrl(type, sorted, pct) {
      const params = new URLSearchParams({
        report: "1",
        lang: currentLanguage,
        name: participantName,
        type: type,
        primary: sorted[0],
        secondary: sorted[1],
        R: String(pct.R),
        Y: String(pct.Y),
        G: String(pct.G),
        B: String(pct.B)
      });
      const url = new URL(window.location.href);
      url.search = params.toString();
      url.hash = "";
      return url.toString();
    }

    function setOpenReportLink(type, sorted, pct) {
      const btn = document.getElementById("openReportBtn");
      const text = document.getElementById("openReportText");
      if (!btn || !text) return;
      btn.href = buildReportUrl(type, sorted, pct);
      text.textContent = t("openReportBtn");
    }

    function buildReport() {
      const { counts, pct } = computeScores();
      const sorted = ["R","Y","G","B"].sort(
        (a,b) => counts[b] - counts[a] || ["R","Y","G","B"].indexOf(a) - ["R","Y","G","B"].indexOf(b)
      );
      const type = sorted[0] + sorted[1];
      const profile = translateProfile(currentLanguage, type, participantName);
      const labels = profile.labels;

      document.getElementById("reportEyebrow").textContent = t("reportEyebrow");
      document.getElementById("reportName").textContent = participantName;
      document.getElementById("reportType").textContent = labels[sorted[0]].name + " / " + labels[sorted[1]].name;
      document.getElementById("reportTagline").textContent = profile.tagline;

      const badge = document.getElementById("reportBadge");
      const dot = document.getElementById("badgeDot");
      dot.style.background =
        sorted[0] === "R" ? "var(--red)" :
        sorted[0] === "Y" ? "var(--yellow)" :
        sorted[0] === "G" ? "var(--green)" : "var(--blue)";

      if (sorted[0] === "R") { badge.style.background = "var(--redSoft)"; badge.style.color = "var(--red)"; }
      if (sorted[0] === "Y") { badge.style.background = "var(--yellowSoft)"; badge.style.color = "#946200"; }
      if (sorted[0] === "G") { badge.style.background = "var(--greenSoft)"; badge.style.color = "var(--green)"; }
      if (sorted[0] === "B") { badge.style.background = "var(--blueSoft)"; badge.style.color = "var(--blue)"; }

      document.getElementById("breakdownTitle").textContent = t("breakdownTitle");
      document.getElementById("overviewTitle").textContent = t("overviewTitle");
      document.getElementById("communicationTitle").textContent = t("communicationTitle");
      document.getElementById("workStyleTitle").textContent = t("workStyleTitle");
      document.getElementById("motivationTitle").textContent = t("motivationTitle");
      document.getElementById("decisionTitle").textContent = t("decisionTitle");
      document.getElementById("misreadTitle").textContent = t("misreadTitle");
      document.getElementById("strengthsTitle").textContent = t("strengthsTitle");
      document.getElementById("watchoutsTitle").textContent = t("watchoutsTitle");
      document.getElementById("tipsTitle").textContent = t("tipsTitle");
      document.getElementById("growthTitle").textContent = t("growthTitle");
      document.getElementById("restartBtn").textContent = t("restartBtn");

      document.getElementById("labelR").textContent = labels.R.name;
      document.getElementById("labelY").textContent = labels.Y.name;
      document.getElementById("labelG").textContent = labels.G.name;
      document.getElementById("labelB").textContent = labels.B.name;

      document.getElementById("pctR").textContent = pct.R + "%";
      document.getElementById("pctY").textContent = pct.Y + "%";
      document.getElementById("pctG").textContent = pct.G + "%";
      document.getElementById("pctB").textContent = pct.B + "%";

      document.getElementById("barR").style.width = pct.R + "%";
      document.getElementById("barY").style.width = pct.Y + "%";
      document.getElementById("barG").style.width = pct.G + "%";
      document.getElementById("barB").style.width = pct.B + "%";

      document.getElementById("overviewText").textContent = profile.overview;
      document.getElementById("communicationText").textContent = profile.comm;
      document.getElementById("workStyleText").textContent = profile.workStyle;
      document.getElementById("motivationText").textContent = profile.motivation;
      document.getElementById("decisionText").textContent = profile.decisions;
      document.getElementById("misreadText").textContent = profile.misread;
      document.getElementById("growthText").textContent = profile.growth;

      document.getElementById("strengthsList").innerHTML =
        profile.strengths.map(item => `<li>${item}</li>`).join("");

      document.getElementById("watchoutsList").innerHTML =
        profile.watchouts.map(item => `<li>${item}</li>`).join("");

      document.getElementById("tipsList").innerHTML =
        profile.tips.map(item => `<li>${item}</li>`).join("");

      setOpenReportLink(type, sorted, pct);
      showScreen("report");
    }

    function renderStandaloneReportFromUrl() {
      const params = new URLSearchParams(window.location.search);
      if (params.get("report") !== "1") return false;

      currentLanguage = params.get("lang") || currentLanguage;
      participantName = params.get("name") || t("participant");

      applyDirection();

      const type = params.get("type") || "RY";
      const primary = params.get("primary") || type[0];
      const secondary = params.get("secondary") || type[1];
      const pct = {
        R: parseInt(params.get("R") || "0", 10),
        Y: parseInt(params.get("Y") || "0", 10),
        G: parseInt(params.get("G") || "0", 10),
        B: parseInt(params.get("B") || "0", 10)
      };

      const profile = translateProfile(currentLanguage, type, participantName);
      const labels = profile.labels;

      document.querySelector(".page").innerHTML = `
        <div class="card">
          <div class="eyebrow">${t("reportEyebrow")}</div>
          <h1>${participantName}</h1>
          <div class="badge" style="
            background:${primary === "R" ? "var(--redSoft)" : primary === "Y" ? "var(--yellowSoft)" : primary === "G" ? "var(--greenSoft)" : "var(--blueSoft)"};
            color:${primary === "R" ? "var(--red)" : primary === "Y" ? "#946200" : primary === "G" ? "var(--green)" : "var(--blue)"};
          ">
            <span class="badge-dot" style="background:${primary === "R" ? "var(--red)" : primary === "Y" ? "var(--yellow)" : primary === "G" ? "var(--green)" : "var(--blue)"}"></span>
            <span>${labels[primary].name} / ${labels[secondary].name}</span>
          </div>
          <p>${profile.tagline}</p>
        </div>

        <div class="card">
          <h3>${t("breakdownTitle")}</h3>
          <div class="bars">
            <div class="bar-row">
              <div>${labels.R.name}</div>
              <div class="bar-track"><div class="bar-fill" style="background:var(--red);width:${pct.R}%"></div></div>
              <div>${pct.R}%</div>
            </div>
            <div class="bar-row">
              <div>${labels.Y.name}</div>
              <div class="bar-track"><div class="bar-fill" style="background:var(--yellow);width:${pct.Y}%"></div></div>
              <div>${pct.Y}%</div>
            </div>
            <div class="bar-row">
              <div>${labels.G.name}</div>
              <div class="bar-track"><div class="bar-fill" style="background:var(--green);width:${pct.G}%"></div></div>
              <div>${pct.G}%</div>
            </div>
            <div class="bar-row">
              <div>${labels.B.name}</div>
              <div class="bar-track"><div class="bar-fill" style="background:var(--blue);width:${pct.B}%"></div></div>
              <div>${pct.B}%</div>
            </div>
          </div>
        </div>

        <div class="card">
          <h3>${t("overviewTitle")}</h3>
          <p>${profile.overview}</p>
        </div>

        <div class="card">
          <h3>${t("communicationTitle")}</h3>
          <p>${profile.comm}</p>
        </div>

        <div class="grid-2">
          <div class="card">
            <h3>${t("workStyleTitle")}</h3>
            <p>${profile.workStyle}</p>
          </div>
          <div class="card">
            <h3>${t("motivationTitle")}</h3>
            <p>${profile.motivation}</p>
          </div>
        </div>

        <div class="grid-2">
          <div class="card">
            <h3>${t("decisionTitle")}</h3>
            <p>${profile.decisions}</p>
          </div>
          <div class="card">
            <h3>${t("misreadTitle")}</h3>
            <p>${profile.misread}</p>
          </div>
        </div>

        <div class="grid-2">
          <div class="card">
            <h3>${t("strengthsTitle")}</h3>
            <ul class="list">${profile.strengths.map(item => `<li>${item}</li>`).join("")}</ul>
          </div>
          <div class="card">
            <h3>${t("watchoutsTitle")}</h3>
            <ul class="list">${profile.watchouts.map(item => `<li>${item}</li>`).join("")}</ul>
          </div>
        </div>

        <div class="grid-2">
          <div class="card">
            <h3>${t("tipsTitle")}</h3>
            <ul class="list">${profile.tips.map(item => `<li>${item}</li>`).join("")}</ul>
          </div>
          <div class="card">
            <h3>${t("growthTitle")}</h3>
            <p>${profile.growth}</p>
          </div>
        </div>

        <div class="card no-print" style="text-align:center">
          <button class="btn-primary" onclick="window.print()">${t("printBtn")}</button>
        </div>
      `;
      return true;
    }

    function restart() {
      answers = [];
      currentQuestion = 0;
      shuffledQuestions = [];
      showScreen("intro");
      renderIntro();
    }

    function renderApp() {
      applyDirection();

      if (renderStandaloneReportFromUrl()) {
        return;
      }

      populateLanguageSelect();
      renderIntro();

      const active = document.querySelector(".screen.active")?.id;
      if (active === "quiz" && shuffledQuestions.length) renderQuestion();
      if (active === "report") buildReport();
    }

    renderApp();
  </script>
</body>
</html>
